ān yǒu"}, {"zh": "晚上常常有好看的电视剧，一天两集。", "ko": "저녁에 종종 재미있는 드라마를 하루에 두 편씩 해 주거든.", "py": "Rén gēn rén bù yīyàng. Ná wǒ lái shuō ba, zhǔyào shì kàn diànshì. Wǎnshang chángcháng yǒu hǎokàn de diànshìjù, yītiān liǎng jí. Yīgè diànshìjù yībān yǒu"}, {"zh": "一个电视剧一般有二三十集，有的四五十集。", "ko": "드라마 한 편은 보통 20~30회 정도인데 40~50회까지 하는 것도 있어", "py": "Rén gēn rén bù yīyàng. Ná wǒ lái shuō ba, zhǔyào shì kàn diànshì. Wǎnshang chángcháng yǒu hǎokàn de diànshìjù, yītiān liǎng jí. Yīgè diànshìjù yībān yǒu"}, {"zh": "如果好看就不觉得长。", "ko": "만약 재미있으면 그다지 길게 느껴지지 않아.", "py": "Rúguǒ hǎokàn jiù bù juéde cháng."}, {"zh": "除了看电视，还干什么？", "ko": "TV 시청 외에 또 무엇을 하니?", "py": "Chúle kàn diànshì, hái gàn shénme?"}, {"zh": "已经退休的，有的打牌，有的打麻将。", "ko": "이미 은퇴한 사람들은 어떤 사람은 카드를 하고 어떤 사람은 마작을 하기도 해.", "py": "Yǐjīng tuìxiū de, yǒu de dǎ pái, yǒu de dǎ májiàng."}, {"zh": "没退休的，拿我姐姐来说，她是教师，一般是备备课，陪孩子玩儿一会儿，再做点儿家务什么的，就差不多该睡觉了。", "ko": "아직 은퇴하지 않은 사람들, 우리 언니를 예로 들면 그녀는 교사인데 보통은 수업 준비를 하거나 아이들과 놀아주거나 집안일 등을 해. 그럼 거의 잠 잘 시간이 되지.", "py": "Yǐjīng tuìxiū de, yǒu de dǎ pái, yǒu de dǎ májiàng. Méi tuìxiū de, ná wǒ jiějie lái shuō, tā shì jiàoshī, yībān shì bèi bèi kè, péi háizi wánr yīhuìr, zài zuò"}, {"zh": "其他年轻人呢？", "ko": "다른 젊은이들은?", "py": "Qítā niánqīngrén ne?"}, {"zh": "有的去逛逛街，跳跳舞，唱唱卡拉OK什么的", "ko": "어떤 이들은 쇼핑하거나 춤을 추기도 하고 노래방에서 노래를 부르기도 해. ，", "py": "Yǒu de qù guàngguàng jiē, tiàotiào wǔ, chàngchàng kǎlā OK shénme de."}, {"zh": "有的上网聊聊天儿。", "ko": "어떤 이들은 인터넷 채팅을 하기도 하고", "py": "Yǒu de qù guàngguàng jiē, tiàotiào wǔ, chàngchàng kǎlā OK shénme de, yǒu de shàngwǎng liáoliáo tiānr. Nǐ ne?"}, {"zh": "吃完晚饭先出去散散步，然后回房间复习复习白天学的新课。", "ko": "저녁을 먹은 후 밖에 나가서 산책한 다음 방에 돌아와서 낮에 배운 새로운 과를 복습해.", "py": "Chī wán wǎnfàn xiān chūqù sàn sànbù, ránhòu huí fángjiān fùxí fùxí báitiān xué de xīn kè. Yǒu de shíhou gěi jiālǐ dǎdǎ diànhuà, huòzhě shàngshàng wǎng"}, {"zh": "有的时候给家里打打电话，或者上上网，给朋友发发E-mail什么的。", "ko": "어떤 때에는 집에 전화를 걸거나 인터넷을 하고 친구에게 이메일을 보내기도 해.", "py": "Yǒu de shíhou gěi jiālǐ dǎdǎ diànhuà, huòzhě shàngshàng wǎng, gěi péngyou fāfā E-mail shénme de."}, {"zh": "难道有困难就不学了吗？", "ko": "설마 어렵다고 배우지 않을까?", "py": "Nándào yǒu kùnnán jiù bù xué le ma?"}, {"zh": "难道不吃药，不打针病就能好了不成？", "ko": "설마 악을 안 먹고 주사를 안 맞는다고 병이 안 낫지 않을까?", "py": "Nándào bù chī yào, bù dǎ zhēn bìng jiù néng hǎo le bùchéng?"}, {"zh": "不论下雨或者（还是）刮风，他都骑自行车上班。", "ko": "비가 오나 바람이 부나 그는 자전거를 타고 출근한다.", "py": "Búlùn xià yǔ huòzhě guāfēng, tā dōu qí zìxíngchē shàngbān."}, {"zh": "学历史还是学文学？", "ko": "역사를 배울래 아니면 문학을 배울래?", "py": "Xué lìshǐ háishi xué wénxué?"}, {"zh": "你快点儿决定把。", "ko": "너 빨리 결정해라.", "py": "Nǐ kuài diǎnr juédìng ba."}, {"zh": "我不知道学文学好还是学历史好。", "ko": "나는 문학을 배우는 것이 좋을지 아니면 역사를 배우는 것이 좋을지 모르겠다.", "py": "Wǒ bù zhīdào xué wénxué hǎo háishi xué lìshǐ hǎo."}, {"zh": "她是努力了，还是没努力，考试以后就清楚了。", "ko": "그가 열심히 노력했는지 노력하지 않았는지는 시험을 보고 나면 알 수 있다.", "py": "Tā shì nǔlì le, háishi méi nǔlì, kǎoshì yǐhòu jiù qīngchǔ le."}, {"zh": "你今天来或者明天来都行。", "ko": "네가 오늘 오든 내일 오든 다 괜찮다.", "py": "Nǐ jīntiān lái huòzhě míngtiān lái dōu xíng."}, {"zh": "快来听，我下载的这首歌太好听了。", "ko": "어서 와서 들어봐, 내가 다운로드 받은 이 노래가 아주 듣기 좋아", "py": "Kuài lái tīng, wǒ xiàzài de zhè shǒu gē tài hǎotīng le."}, {"zh": "我听听，我怎么不觉得好听？老了。", "ko": "어디 좀 들어보자. 나는 왜 좋다고 생각되지 않지? 늙었나 봐", "py": "Wǒ tīngting, wǒ zěnme bù juéde hǎotīng? Lǎo le."}, {"zh": "你别这么说，你才比我大两岁。", "ko": "그렇게 말하지 마. 너는 나보다 겨우 두 살밖에 많지 않은 걸", "py": "Nǐ bié zhème shuō, nǐ cái bǐ wǒ dà liǎng suì."}, {"zh": "难道你不喜欢流行歌曲吗？", "ko": "설마 너 유행가를 좋아하지 않는 거니?", "py": "Nándào nǐ bù xǐhuan liúxíng gēqǔ ma?"}, {"zh": "不太喜欢，主要是不常听。", "ko": "별로 좋아하지 않아요, 주로 자주 안 듣거든요.", "py": "Bù tài xǐhuan, zhǔyào shì bù cháng tīng."}, {"zh": "我还是喜欢老歌。以前的老歌，可好听了。", "ko": "난 역시 오래된 노래가 좋더라. 옛날 노래는 정말 듣기 좋아", "py": "Wǒ háishi xǐhuan lǎogē. Yǐqián de lǎogē, kě hǎotīng le."}, {"zh": "我发现咱们俩虽然都是歌迷，可是迷的对象大不一样。", "ko": "우리는 비록 모두 노래 애호가지만 좋아하는 노래가 서로 다른 것 같아.", "py": "Wǒ fāxiàn zánmen liǎ suīrán dōu shì gēmí, kěshì mí de duìxiàng dà bù yīyàng."}, {"zh": "电影你爱看老的，歌曲也爱听老的。", "ko": "너는 영화도 옛날 영화를 즐겨보고 노래도 옛날 노래를 즐겨 듣는구나.", "py": "Wǒ fāxiàn zánmen liǎ suīrán dōu shì gēmí, kěshì mí de duìxiàng dà bù yīyàng. Diànyǐng nǐ ài kàn lǎo de, gēqǔ yě ài tīng lǎo de. Wǒ zěnme duì lǎogē jiù"}, {"zh": "我怎么对老歌就没兴趣呢？", "ko": "나는 어째서 옛 노래에는 관심이 없을까?", "py": "Wǒ fāxiàn zánmen liǎ suīrán dōu shì gēmí, kěshì mí de duìxiàng dà bù yīyàng. Diànyǐng nǐ ài kàn lǎo de, gēqǔ yě ài tīng lǎo de. Wǒ zěnme duì lǎogē jiù"}, {"zh": "这没什么奇怪的，各人有各人的爱好嘛。", "ko": "이상할 것 없어요, 각자 각자의 취미가 있잖아요.", "py": "Zhè méi shénme qíguài de, gèrén yǒu gèrén de àihào ma."}, {"zh": "不过，咱们有一点是相同的：", "ko": "그렇지만 우린 한 가지는 같아.", "py": "Bùguò, zánmen yǒu yīdiǎn shì xiāngtóng de:"}, {"zh": "咱们都爱好音乐，对吧？", "ko": "우리는 모두 음악을 좋아한다는 거지, 그렇지?", "py": "Zhè méi shénme qíguài de, kèrén yǒu kèrén de àihào ma. Bùguò, zánmen yǒu yīdiǎn shì xiāngtóng de: zánmen dōu àihào yīnyuè, duì ba?"}, {"zh": "我们每天不是上课就是考试，忙得很。", "ko": "우리는 매일 수업이 아니면 시험을 봐서 아주 바쁘다.", "py": "Wǒmen měitiān búshì shàngkè jiùshì kǎoshì, máng de hěn."}, {"zh": "食堂的饭不是馒头就是米饭，我想吃点儿别的。", "ko": "식당의 밥은 만두가 아니면 밥이라서 나는 다른 것을 좀 먹고 싶어.", "py": "Shítáng de fàn búshì mántou jiùshì mǐfàn, wǒ xiǎng chī diǎnr biéde."}, {"zh": "除了当过律师，还当过导游。", "ko": "변호사를 했을 뿐만 아니라, 관광 안내원도 했다.", "py": "Chúle dāng guò lǜshī, hái dāng guò dǎoyóu."}, {"zh": "除了上网，还喜欢什么？", "ko": "인터넷을 하는 것 말고, 또 무엇을 좋아하나요?", "py": "Chúle shàngwǎng, hái xǐhuan shénme?"}, {"zh": "除了夸你帅，还夸你唱歌好听。", "ko": "잘생겼다고 칭찬할 뿐만 아니라, 노래도 잘한다고 칭찬했다.", "py": "Chúle kuā nǐ shuài, hái kuā nǐ chànggē hǎotīng."}, {"zh": "留学生，有的住校内，有的住校外。", "ko": "유학생들은 어떤 사람은 교내에 살고, 어떤 사람은 교외에 산다.", "py": "Liúxuéshēng, yǒu de zhù xiàonèi, yǒu de zhù xiàowài."}, {"zh": "服务员，有的服务热情，有的服务热情。", "ko": "종업원은 어떤 사람은 서비스가 친절하고, 어떤 사람은 서비스가 냉담하다.", "py": "Fúwùyuán, yǒu de fúwù rèqíng, yǒu de fúwù bù rèqíng."}, {"zh": "旅行的人，有的爱坐飞机，有的爱坐火车。", "ko": "여행하는 사람은 어떤 사람은 비행기를 좋아하고, 어떤 사람은 기차를 좋아한다.", "py": "Lǚxíng de rén, yǒu de ài zuò fēijī, yǒu de ài zuò huǒchē."}, {"zh": "我怎么对甜的就吃不够呢？", "ko": "나는 왜 단 것을 아무리 먹어도 부족할까?", "py": "Wǒ zěnme duì tián de jiù chī bú gòu ne?"}, {"zh": "老师怎么对学生就这么严呢？", "ko": "선생님은 왜 학생들에게 이렇게 엄격할까?", "py": "Lǎoshī zěnme duì xuésheng jiù zhème yán ne?"}, {"zh": "他们怎么对足球就那么迷呢？", "ko": "그들은 왜 축구에 그렇게 빠져 있을까?", "py": "Tāmen zěnme duì zúqiú jiù nàme mí ne?"}, {"zh": "各国有各国的法律嘛。", "ko": "각 나라에는 각 나라의 법이 있다.", "py": "Gè guó yǒu gè guó de fǎlǜ ma."}, {"zh": "各民族有各民族的传统嘛。", "ko": "각 민족에는 각 민족의 전통이 있다.", "py": "Gè mínzú yǒu gè mínzú de chuántǒng ma."}, {"zh": "各城市有各城市的特点嘛。", "ko": "각 도시는 각 도시의 특징이 있다.", "py": "Gè chéngshì yǒu gè chéngshì de tèdiǎn ma."}, {"zh": "下班回家，我不是在厨房，就是在书房。", "ko": "퇴근하고 집에 돌아오면 저는 주방에 있거나 서재에 있습니다.", "py": "Xiàbān huíjiā, wǒ búshì zài chúfáng, jiùshì zài shūfáng."}, {"zh": "我有两大爱好，一动一静，一个是做饭，一个是看书。", "ko": "저에게는 두 가지 취미가 있는데 하나는 동적이고 하나는 정적인 것으로 요리와 독서입니다.", "py": "Wǒ yǒu liǎng dà àihào, yī dòng yī jìng, yīgè shì zuòfàn, yīgè shì kànshū."}, {"zh": "做饭可以活动身体，看书可以丰富知识。", "ko": "요리는 몸을 움직일 수 있고 독서는 지식을 풍부하게 됩니다.", "py": "Wǒ yǒu liǎng dà àihào, yī dòng yī jìng, yīgè shì zuòfàn, yīgè shì kànshū. Zuòfàn kěyǐ huódòng shēntǐ, kànshū kěyǐ fēngfù zhīshi. Zěnmeyàng? Tǐng kēxué ba?"}, {"zh": "挺科学吧？", "ko": "매우 과학적이지 않나요?", "py": "Wǒ yǒu liǎng dà àihào, yī dòng yī jìng, yīgè shì zuòfàn, yīgè shì kànshū. Zuòfàn kěyǐ huódòng shēntǐ, kànshū kěyǐ fēngfù zhīshi. Zěnmeyàng? Tǐng kēxué ba?"}, {"zh": "你说我应该出去晒晒太阳？", "ko": "제가 밖으로 나가서 햇빛을 좀 받아야 한다고요?", "py": "Nǐ shuō wǒ yīnggāi chūqù shàishài tàiyáng? Búyòng chūqù. Zuò zài wǒ jiā de yángtái shàng, yībiān shài tàiyáng, yībiān kànshū, nà cái shūfu ne!"}, {"zh": "坐在我家的阳台上，一边晒太阳，一边看书，那才舒服呢！", "ko": "우리 집 베란다에 앉아서 일광욕하며 책을 보면 아주 편안합니다!", "py": "Zuò zài wǒ jiā de yángtái shàng, yībiān shài tàiyáng, yībiān kànshū, nà cái shūfu ne!"}, {"zh": "主要", "ko": "주로, 주요하다", "py": "zhǔyào"}, {"zh": "电视剧", "ko": "드라마", "py": "diànshìjù"}, {"zh": "退休", "ko": "은퇴하다", "py": "tuìxiū"}, {"zh": "麻将", "ko": "마작", "py": "májiàng"}, {"zh": "备课", "ko": "수업을 준비하다", "py": "bèikè"}, {"zh": "其他", "ko": "기타", "py": "Qítā niánqīngrén ne?"}, {"zh": "下载", "ko": "다운로드하다", "py": "xiàzǎi"}, {"zh": "难道", "ko": "설마 ~하겠는가?", "py": "nándào"}, {"zh": "歌曲", "ko": "노래", "py": "gēqǔ"}, {"zh": "奇怪", "ko": "이상하다, 의아하다", "py": "qíguài"}, {"zh": "相同", "ko": "똑같다", "py": "xiāngtóng"}, {"zh": "厨房", "ko": "주방", "py": "chúfáng"}, {"zh": "书房", "ko": "서재", "py": "shūfáng"}, {"zh": "科学", "ko": "과학적이다, 과학", "py": "Wǒ yǒu liǎng dà àihào, yī dòng yī jìng, yīgè shì zuòfàn, yīgè shì kànshū. Zuòfàn kěyǐ huódòng shēntǐ, kànshū kěyǐ fēngfù zhīshi. Zěnmeyàng? Tǐng kēxué ba?"}, {"zh": "阳台", "ko": "베란다", "py": "yángtái"}, {"zh": "决定", "ko": "결정(하다)", "py": "Wǒ xiān huíjiā shāngliang shāngliang zài zuò juédìng."}], "vocab": []}, "12과": {"pairs": [{"zh": "你别笑话我，我的声调不太准。", "ko": "내 성조가 부정확하다고 비웃지 마라.", "py": "Nǐ bié xiàhua wǒ, wǒ de shēngdiào bú tài zhǔn."}, {"zh": "你别笑话我， 我第一次吃中餐，还不会用刀叉。", "ko": "비웃지 마, 나는 양식을 처음 먹는 거라서 나이프와 포크를 어떻게 쓰는지 잘 몰라", "py": "Nǐ bié xiàhua wǒ, wǒ dì yī cì chī zhōngcān, hái bú huì yòng dāo chā."}, {"zh": "你这个人真是口福不浅。", "ko": "너란 사람은 정말 먹을 복이 있구나.", "py": "Nǐ zhège rén zhēnshi kǒufú bùqiǎn."}, {"zh": "今天只有眼福没有口服。", "ko": "오늘 눈요기만 했지 먹을 복은 없었다.", "py": "Jīntiān zhǐyǒu yǎnfú méiyǒu kǒufú."}, {"zh": "咱们刚搬了新房子，请朋友们来聚聚，吃顿饭吧？", "ko": "우리 막 새집으로 이사했는데, 친구들을 모아서 식사 한 끼 할까요?", "py": "Zánmen gāng bān le xīn fángzi, qǐng péngyoumen lái jùjù, chī dùn fàn ba?"}, {"zh": "好啊，我建议来个自助餐。", "ko": "좋지요, 나는 뷔페 형식을 추천해요.", "py": "Hǎo a, wǒ jiànyì lái gè zìzhùcān."}, {"zh": "准备一些凉菜，再做几个热菜，", "ko": "냉채 몇 가지를 준비하고 요리도 몇 가지를 할게요.", "py": "Zhǔnbèi yīxiē liángcài, zài zuò jǐ gè rècài, shéi ài chī shénme jiù qǔ shénme. Yào zhǔnbèi jiǔ ma?"}, {"zh": "谁爱吃什么就取什么。", "ko": "먹고싶으면 누구든 가져다 먹게요.", "py": "Shéi ài chī shénme jiù qǔ shénme."}, {"zh": "要准备酒吗？", "ko": "술을 준비해야 할까요?", "py": "Zhǔnbèi yīxiē liángcài, zài zuò jǐ gè rècài, shéi ài chī shénme jiù qǔ shénme. Yào zhǔnbèi jiǔ ma?"}, {"zh": "当然得准备了。", "ko": "당연히 준비해야죠.", "py": "Dāngrán děi zhǔnbèi le. Chúle píjiǔ, zài lái diǎnr pútaojiǔ shénme de."}, {"zh": "除了啤酒，再来点儿葡萄酒什么的。", "ko": "맥주 외에 와인 같은 것들도 좀 두죠.", "py": "Dāngrán děi zhǔnbèi le. Chúle píjiǔ, zài lái diǎnr pútaojiǔ shénme de."}, {"zh": "要不要白酒？", "ko": "바이주는 필요할까요?", "py": "Yào bú yào báijiǔ?"}, {"zh": "不要了吧？", "ko": "필요없겠죠?", "py": "Bú yào le ba? Báijiǔ tài lìhai, hē le róngyì zuì."}, {"zh": "白酒太厉害，喝了容易醉。", "ko": "바이주는 너무 세서 쉽게 취해요.", "py": "Bú yào le ba? Báijiǔ tài lìhai, hē le róngyì zuì."}, {"zh": "你怎么不吃啊？", "ko": "너는 어째서 안 먹니?", "py": "Nǐ zěnme bù chī a?"}, {"zh": "我早上起得晚，还不太饿。", "ko": "저는 아침에 늦게 일어나서 아직 별로 배가 안 고파요.", "py": "Wǒ zǎoshang qǐ de wǎn, hái bú tài è."}, {"zh": "你是不是在减肥？", "ko": "다이어트 하는 거 아니니?", "py": "Nǐ shì bú shì zài jiǎnféi?"}, {"zh": "你别笑话我，这几个月我有长了好几斤，越来越胖了。", "ko": "비웃지 마, 최근 몇 개월 몇 킬로가 더 늘었어, 갈수록 뚱뚱해지고 있단 말이야.", "py": "Nǐ bié xiàhua wǒ, zhè jǐ gè yuè wǒ yòu zhǎng le hǎo jǐ jīn, yuè lái yuè pàng le."}, {"zh": "你哪儿胖啊？身材多好啊!", "ko": "네가 어디가 뚱뚱한데? 몸매 참 좋은데 뭘!", "py": "Nǐ nǎr pàng a? Shēncái duō hǎo a!"}, {"zh": "我真羡慕你，吃什么都不长胖。", "ko": "난 네가 정말 부럽다. 뭘 먹어도 살이 안 찌잖니.", "py": "Wǒ zhēn xiànmù nǐ, chī shénme dōu bù zhǎng pàng."}, {"zh": "有口福啊！", "ko": "정말 먹을 복이 있어!", "py": "Wǒ zhēn xiànmù nǐ, chī shénme dōu zhǎng bú pàng. Yǒu kǒufú a!"}, {"zh": "我觉得健康是最重要的。", "ko": "난 건강이 가장 중요하다고 생각해.", "py": "Wǒ juéde jiànkāng shì zuì zhòngyào de."}, {"zh": "胖瘦都是给别人看的，", "ko": "뚱뚱하고 마르고는 모두 남에게 보여 주기 위한 거잖아.", "py": "Wǒ juéde jiànkāng shì zuì zhòngyào de. Pàng shòu dōu shì gěi biérén kàn de, shēntǐ hǎo, zìjǐ juéde shūfu bǐ shénme dōu qiáng."}, {"zh": "身体好，自己觉得舒服比什么都强。", "ko": "몸이 건강하고 스스로 편하게 느끼는 것이 무엇보다 중요해.", "py": "Wǒ juéde jiànkāng shì zuì zhòngyào de. Pàng shòu dōu shì gěi biérén kàn de, shēntǐ hǎo, zìjǐ juéde shūfu bǐ shénme dōu qiáng."}, {"zh": "放心地吃吧，", "ko": "맘 놓고 먹어.", "py": "Fàngxīn de chī ba, è shòu le, liǎnsè yě bù hǎo le. Yàoshi zhēn xiǎng shòu yīdiǎnr, zuì hǎo de bànfǎ shì yùndòng."}, {"zh": "饿瘦了，脸色也不好了。", "ko": "배고파서 홀쭉해지면 안색도 안 좋아져.", "py": "Fàngxīn de chī ba, è shòu le, liǎnsè yě bù hǎo le. Yàoshi zhēn xiǎng shòu yīdiǎnr, zuì hǎo de bànfǎ shì yùndòng."}, {"zh": "要是真想瘦一点儿，最好的办法是运动。", "ko": "만약 정말 날씬해지고 싶다면, 가장 좋은 방법은 운동이야.", "py": "Yàoshi zhēn xiǎng shòu yīdiǎnr, zuì hǎo de bànfǎ shì yùndòng."}, {"zh": "可是天天坚持不容易。", "ko": "하지만 매일 한다는 게 쉽지 않아.", "py": "Wǒ yě zhīdào, kěshì tiāntiān jiānchí bù róngyì. Yī tíng xiàlái, huì gèng pàng."}, {"zh": "一停下来，会更胖。", "ko": "그만두면 바로 체중이 더 늘어나.", "py": "Wǒ yě zhīdào, kěshì tiāntiān jiānchí bù róngyì. Yī tíng xiàlái, huì gèng pàng."}, {"zh": "我非学好汉语不可。", "ko": "나는 중국어를 배우지 않으면 안 된다.", "py": "Wǒ fēi xuéhǎo Hànyǔ bùkě."}, {"zh": "你非去不可吗？", "ko": "너 가지 않으면 안 되니?", "py": "Nǐ fēi qù bùkě ma?"}, {"zh": "学生不上课不行。", "ko": "학생은 수업을 듣지 않으면 안 된다.", "py": "Xuésheng bù shàngkè bùxíng."}, {"zh": "“你的病不做手术不行。”", "ko": "”당신의 병은 수술하지 않으면 안 됩니다.”"}, {"zh": "中国和美国的饮食习惯很不一样吧？", "ko": "중국과 미국은 음식 습관이 다르지?", "py": "Zhōngguó hé Měiguó de yǐnshí xíguàn hěn bù yīyàng ba?"}, {"zh": "是，很不一样。", "ko": "응, 아주 달라", "py": "Shì, hěn bù yīyàng. Wǒ xǐhuan chī zhōngcān, kěshì yǒu de shíhou hěn bù xíguàn."}, {"zh": "我喜欢吃中餐，可是有的时候很不习惯。", "ko": "나는 중국 음식을 좋아하지만 어떤 경우에는 정말 익숙하지 않아.", "py": "Shì, hěn bù yīyàng. Wǒ xǐhuan chī zhōngcān, kěshì yǒu de shíhou hěn bù xíguàn."}, {"zh": "比如说。。。", "ko": "예를 든다면…", "py": "Rúguǒ shuō..... (또는 Bǐrú shuō.....)"}, {"zh": "喝酒的时候，主人太热情，总是让我喝。", "ko": "술을 마실 때 주인이 너무 친절해서 나에게 늘 마시라고 해.", "py": "Hējiǔ de shíhou, zhǔrén tài rèqíng, zǒngshì ràng wǒ hē."}, {"zh": "我常常不好意思不喝，有时候就喝多了。", "ko": "종종 안 마시는 것이 미안해서 어떤 때는 너무 많이 마셔.", "py": "Hējiǔ de shíhou, zhǔrén tài rèqíng, zǒngshì ràng wǒ hē. Wǒ chángcháng bù hǎoyìsi bù hē, yǒu shíhou jiù hē duō le."}, {"zh": "只要你告诉他们你不能喝酒，他们不一定非让你喝不可。", "ko": "네가 술을 못 마신다고 말하면, 그들이 너에게 마시지 않으면 안 된다고 하지는 않을 거야.", "py": "Zhè shíhou, zhǐyào nǐ gàosu tāmen nǐ bù néng hējiǔ, tāmen bù yīdìng fēi ràng nǐ hē bùkě."}, {"zh": "如果我是你，我就说：“谢谢！我不会喝酒。”", "ko": "내가 만약 너라면 저는 “감사합니다!! 전 술을 잘 못합니다”"}, {"zh": "“我只能少来一点儿。”", "ko": "“저는 술을 조금밖에 마시지 못합니다”"}, {"zh": "我不习惯用刀叉。", "ko": "나는 나이프와 포크를 사용하는 게 익숙하지 않아.", "py": "Wǒ qù guò Měiguó. Wǒ bù xíguàn yòng dāo chā. Zuǒshǒu ná chā, yòushǒu ná dāo, qiē ròu qiē cài, shízài máfan. Chī jī, chī yú, chī miàntiáor, jiù gèng"}, {"zh": "左手拿叉，右手拿刀，切肉切菜, 实在麻烦。", "ko": "왼손으로 포크를 들고 오른손으로 나이프를 들고 고기와 채소를 자르려니 정말 불편했어.", "py": "Wǒ qù guò Měiguó. Wǒ bù xíguàn yòng dāo chā. Zuǒshǒu ná chā, yòushǒu ná dāo, qiē ròu qiē cài, shízài máfan. Chī jī, chī yú, chī miàntiáor, jiù gèng"}, {"zh": "吃鸡，吃鱼，吃面条儿，就更困难了。", "ko": "특히 닭, 생선, 국수를 먹는 것이 훨씬 어려웠어.", "py": "Wǒ qù guò Měiguó. Wǒ bù xíguàn yòng dāo chā. Zuǒshǒu ná chā, yòushǒu ná dāo, qiē ròu qiē cài, shízài máfan. Chī jī, chī yú, chī miàntiáor, jiù gèng"}, {"zh": "这就跟我们不习惯用筷子一样。不练不行。", "ko": "우리가 젓가락 사용하는 게 익숙하지 않은 것과 같네. 연습하지 않으면 안 돼.", "py": "Zhè jiù gēn wǒmen bù xíguàn yòng kuàizi yīyàng. Bú liàn bùxíng."}, {"zh": "你们吃早饭的习惯也和我们不太一样。", "ko": "너희의 아침 식사도 우리와 달라.", "py": "Nǐmen chī zǎofàn de xíguàn yě hé wǒmen bú tài yīyàng."}, {"zh": "你们喜欢吃面包，和从冰箱里刚拿出来的凉牛奶，同时，还要喝一些果汁。", "ko": "너희는 빵을 즐겨 먹고 냉장고에서 막 꺼낸 차가운 우유를 마시면서 과일 주스도 마시잖아.", "py": "Nǐmen xǐhuan chī miànbāo, hē cóng bīngxiāng lǐ gāng ná chūlái de liáng niúnǎi, tóngshí, hái yào hē yīxiē guǒzhī."}, {"zh": "我的肚子就受不了。", "ko": "내 뱃속은 견디지 못할 거야.", "py": "Wǒ de dùzi jiù shòu bù liǎo."}, {"zh": "我习惯喝热豆浆，吃油条，再来一个煮鸡蛋。", "ko": "우리는 따뜻한 더우장을 마시고 여우탸오를 먹고 또 삶은 달걀을 먹어.", "py": "Wǒ xíguàn hē rè dòujiāng, chī yóutiáo, zài lái yīgè zhǔ jīdàn."}, {"zh": "真心相爱比什么都幸福。", "ko": "서로 사랑하는 것이 무엇보다 행복하다.", "py": "Zhēnxīn xiāng ài bǐ shénme dōu xìngfú."}, {"zh": "上网聊天儿比什么都轻松。", "ko": "인터넷에서 채팅하는 것이 무엇보다 쉽다.", "py": "Shàngwǎng liáotiānr bǐ shénme dōu qīngsōng."}, {"zh": "不上课比什么都高兴。", "ko": "수업하지 않는 것이 무엇보다 즐겁다.", "py": "Bù shàngkè bǐ shénme dōu gāoxìng."}, {"zh": "要是学那个国家的语言，最好到那个国家去。", "ko": "만약 어떤 국가의 언어를 배우려면 그 국가에 가는 것이 제일 좋다.", "py": "Yàoshi xué nàgè guójiā de yǔyán, zuìhǎo dào nàgè guójiā qù."}, {"zh": "要是怕起晚了，最好请闹钟帮忙。", "ko": "만약 늦게 일어나는 것이 두렵다면 알람에게 도움을 요청하는 것이 제일 좋다.", "py": "Yàoshi pà qǐ wǎn le, zuìhǎo qǐng nàozhōng bāngmáng."}, {"zh": "要是去做客，最好带点小礼物。", "ko": "만약 손님이 된다면 작은 선물을 가져가는 것이 제일 좋다.", "py": "Yàoshi qù zuòkè, zuìhǎo dài diǎn xiǎo lǐwù."}, {"zh": "一不注意，感冒会更厉害。", "ko": "조심하지 않으만 하면 감기는 더 심해진다", "py": "Yī bù zhùyì, gǎnmào huì gèng lìhai."}, {"zh": "一有声音，我会更睡不着觉。소리가 나기만 하면 나는 더 잠들지 못해요.", "ko": "소리가 나기만 하면 나는 더 잠들지 못해요.", "py": "Yī yǒu shēngyīn, wǒ huì gèng shuì bù zháo jiào."}, {"zh": "一说错，心里会更紧张。말을 틀리기만 하면 마음이 더 긴장돼요.", "ko": "말을 틀리기만 하면 마음이 더 긴장돼요.", "py": "Yī shuō cuò, xīnlǐ huì gèng jǐnzhāng."}, {"zh": "写好汉子非坚持多写不可。한자를 잘 쓰려면 참고 많이 써보지 않으면 안 돼.", "ko": "한자를 잘 쓰려면 참고 많이 써보지 않으면 안 돼.", "py": "Xiě hǎo Hànzì fēi jiānchí duō xiě bùkě."}, {"zh": "老不吃早饭非影响健康不可。아침을 먹지 않으면 건강에 영향을 안 주지 않을 거야.", "ko": "아침을 먹지 않으면 건강에 영향을 안 주지 않을 거야.", "py": "Lǎo bù chī zǎofàn fēi yǐngxiǎng jiànkāng bùkě."}, {"zh": "要学好汉语非来中国不可。중국어를 잘 배우려면 중국에 오지 않으면 안 돼.", "ko": "중국어를 잘 배우려면 중국에 오지 않으면 안 돼.", "py": "Yào xuéhǎo Hànyǔ fēi lái Zhōngguó bùkě."}, {"zh": "建议", "ko": "제안하다", "py": "jiànyì"}, {"zh": "自助餐", "ko": "뷔페", "py": "zìzhùcān"}, {"zh": "葡萄酒", "ko": "와인", "py": "pútaojiǔ"}, {"zh": "白酒", "ko": "바이주", "py": "báijiǔ"}, {"zh": "减肥", "ko": "다이어트하다", "py": "jiǎnféi"}, {"zh": "笑话", "ko": "비웃다", "py": "Nǐ bié xiàhua wǒ, zhè jǐ gè yuè wǒ yòu zhǎng le hǎo jǐ jīn, yuè lái yuè pàng le."}, {"zh": "身材", "ko": "체격, 몸매", "py": "shēncái"}, {"zh": "口福", "ko": "먹을 복", "py": "kǒufú"}, {"zh": "饮食", "ko": "음식", "py": "yǐnshí"}, {"zh": "中餐", "ko": "중국 음식", "py": "Shì, hěn bù yīyàng. Wǒ xǐhuan chī zhōngcān, kěshì yǒu de shíhou hěn bù xíguàn."}, {"zh": "左手", "ko": "왼손", "py": "Wǒ qù guò Měiguó. Wǒ bù xíguàn yòng dāo chā. Zuǒshǒu ná chā, yòushǒu ná dāo, qiē ròu qiē cài, shízài máfan. Chī jī, chī yú, chī miàntiáor, jiù gèng"}, {"zh": "右手", "ko": "오른손", "py": "Wǒ qù guò Měiguó. Wǒ bù xíguàn yòng dāo chā. Zuǒshǒu ná chā, yòushǒu ná dāo, qiē ròu qiē cài, shízài máfan. Chī jī, chī yú, chī miàntiáor, jiù gèng"}, {"zh": "面条儿", "ko": "먄", "py": "Wǒ qù guò Měiguó. Wǒ bù xíguàn yòng dāo chā. Zuǒshǒu ná chā, yòushǒu ná dāo, qiē ròu qiē cài, shízài máfan. Chī jī, chī yú, chī miàntiáor, jiù gèng"}, {"zh": "筷子", "ko": "젓가락", "py": "kuàizi"}, {"zh": "冰箱", "ko": "냉장고", "py": "bīngxiāng"}, {"zh": "牛奶", "ko": "우유", "py": "niúnǎi"}, {"zh": "果汁", "ko": "과일 주스", "py": "guǒzhī"}, {"zh": "豆浆", "ko": "더우장", "py": "dòujiāng"}, {"zh": "油条", "ko": "여우탸오", "py": "yóutiáo"}], "vocab": []}, "13과": {"pairs": [{"zh": "你想买房子吗？", "ko": "집을 장만하실 생각이신가요?", "py": "Nín xiǎng mǎi fángzi ma?"}, {"zh": "想看看这里的新房子。", "ko": "이곳의 새집을 좀 구경하려고요.", "py": "Xiǎng kànkan zhèlǐ de xīn fángzi."}, {"zh": "您请这边看。", "ko": "여기를 좀 보시죠.", "py": "Nín qǐng zhèbiān kàn. Yǒu liǎng jiān yī tào de, yǒu sān jiān yī tào de."}, {"zh": "有两件一套的，有三件一套的。", "ko": "방 두 개짜리도 있고 방 세 개짜리도 있어요."}, {"zh": "三件一套的有几个卫生间？", "ko": "방 세 개짜리에는 화장실이 몇 개 있어요?", "py": "Sān jiān yī tào de yǒu jǐ gè wèishēngjiān?"}, {"zh": "有的一个，有的两个。", "ko": "하나 있는 것도 있고 두 개 있는 것도 있어요.", "py": "Yǒu de yīgè, yǒu de liǎng gè."}, {"zh": "客厅大不大?", "ko": "거실은 큰가요?", "py": "Kètīng dà bú dà?"}, {"zh": "这里在农村和城市之间，环境很好。", "ko": "이곳은 농촌과 도시의 중간지점이라 환경이 아주 좋군요.", "py": "Zhèlǐ zài nóngcūn hé chéngshì zhījiān, huánjìng hěn hǎo."}, {"zh": "有好几路公共汽车都到这里。", "ko": "여기까지 오는 버스 노선이 아주 많습니다.", "py": "Yǒu hǎojǐ lù gōnggòng qìchē dōu dào zhèlǐ."}, {"zh": "孩子上学方便吗？", "ko": "아이들이 학교 다니기는 편하가요?", "py": "Háizi shàngxué fāngbiàn ma?"}, {"zh": "您看，中学在那儿，小学在这儿，都很近。", "ko": "좀 보세요, 저기가 중고등학교이고 초등학교는 여기예요. 모두 가까워요.", "py": "Nín kàn, zhōngxué zài nàr, xiǎoxué zài zhèr, dōu hěn jìn."}, {"zh": "价钱怎么样？", "ko": "가격이 어떻게 되지요?", "py": "Jiàqian zěnmeyàng?"}, {"zh": "比市中心的房子便宜三分之一左右。买一套把？", "ko": "중심가에 있는 집보다 1/3정도 쌉니다. 한 채 사시겠어요?", "py": "Bǐ shìzhōngxīn de fángzi piányi sān fēn zhī yī zuǒyòu. Mǎi yī tào ba?"}, {"zh": "我先回家商量商量再做决定。", "ko": "먼저 집에 돌아가서 상의 좀 해보고 결정할게요.", "py": "Wǒ xiān huíjiā shāngliang shāngliang zài zuò juédìng."}, {"zh": "咱们养一只小动物吧。", "ko": "우리 집도 작은 동물 키워요.", "py": "Zánmen yǎng yī zhī xiǎo dòngwù ba."}, {"zh": "养只小狗好不好？", "ko": "강아지 키우는 거 어떠세요?", "py": "Zánmen jiā yě yǎng zhī xiǎo dòngwù ba. Yǎng zhī xiǎogǒu hǎobùhǎo?"}, {"zh": "小狗跑跑跳跳的样子太可爱了，我也想养。", "ko": "강아지가 이리저리 뛰어다니는 모습을 보면 정말 귀여울 거야. 저도 기르고 싶어요.", "py": "Xiǎogǒu pǎopǎotiàotiào de yàngzi tài kě'ài le, wǒ yě xiǎng yǎng."}, {"zh": "小狗是可爱，但是我反对你们养。", "ko": "강아지가 귀엽긴 하지. 그렇지만 나는 너희가 키우는 것은 반대야.", "py": "Xiǎogǒu shì kě'ài, dànshì wǒ fǎanduì nǐmen yǎng. Zài chéngshì lǐ yǎng gǒu, yǒu hěn duō máfan shì."}, {"zh": "在城市里养狗，有很多麻烦事。", "ko": "도시에서 개를 키우면 귀찮은 일이 많아.", "py": "Zài chéngshì lǐ yǎng gǒu, yǒu hěn duō máfan shì."}, {"zh": "不养狗，养只猫吧。", "ko": "개는 키우지 말고 고양이를 키우자.", "py": "Bù yǎng gǒu, yǎng zhī māo ba."}, {"zh": "我想养只白猫，有一对蓝眼睛的白猫。", "ko": "난 하얀 고양이를 키우고 싶어. 파란색 눈의 새하얀 고양이.", "py": "Wǒ xiǎng yǎng zhī bái māo, yǒu yī duì lán yǎnjing de bái māo. Wǒ tiāntiān gěi tā xǐzǎo."}, {"zh": "我天天给它洗澡。", "ko": "내가 매일매일 목욕시켜 줄게요.", "py": "Wǒ xiǎng yǎng zhī bái māo, yǒu yī duì lán yǎnjing de bái māo. Wǒ tiāntiān gěi tā xǐzǎo."}, {"zh": "我天天喂它饭。", "ko": "나는 매일매일 먹이를 줄게요.", "py": "Wǒ tiāntiān wèi tā fàn. Māma, nín bù fǎanduì le ba?"}, {"zh": "您不反对对了吧？", "ko": "반대 안하시죠?", "py": "Nín bù fǎnduì le ba?"}, {"zh": "我还得问问你们的爸爸是什么意见。", "ko": "난 너희 아빠는 의견이 어떤지 물어봐야겠다.", "py": "Wǒ hái děi wènwen nǐmen de bàba shì shénme yìjiàn."}, {"zh": "我真不明白，别人都想办法往城市里搬，你却非要回农村的老家去。", "ko": "난 정말 이해 못 하겠다. 다른 사람들은 도시로 이사 오려고 애쓰는데 넌 오히려 농촌에 있는 고향으로 가려고 하다니", "py": "Wǒ zhēn bù míngbai, biérén dōu xiǎng bànfǎ wǎng chéngshì lǐ bān, nǐ què fēi yào huí nóngcūn de lǎojiā qù."}, {"zh": "这到底是怎么回事？", "ko": "도대체 이게 어떻게 된 일이니?", "py": "Wǒ zhēn bù míngbai, biérén dōu xiǎng bànfǎ wǎng chéngshì lǐ bān, nǐ què fēi yào huí nóngcūn de lǎojiā qù. Zhè dàodǐ shì zěnme huí shì?"}, {"zh": "我喜欢农村生活，喜欢大自然和那里的农村。", "ko": "나는 농촌 생활이 좋고 대자연과 그곳의 농민들이 좋아.", "py": "Wǒ xǐhuan nóngcūn shēnghuó, xǐhuan dàzìrán hé nàlǐ de nóngmín."}, {"zh": "咱们的老家，环境优美，空气新鲜。", "ko": "내 고향은 환경이 아름답고 공기도 신선해.", "py": "Zánmen de lǎojiā, huánjìng yōuměi, kōngqì xīnxiān."}, {"zh": "天蓝蓝的，水绿绿的，马啊，牛啊，羊啊在草地上吃草", "ko": "하늘은 파랗고 물은 푸르며 말이며 소, 양들이 초원에서 풀을 뜯고 있지.", "py": "Tiān lánlán de, shuǐ lǜlǜ de, mǎ a, niú a, yáng a zài cǎodì shàng chī cǎo."}, {"zh": "像一幅画儿似的，要多美有多美。", "ko": "마치 그림 같아서 아름답기 짝이 없어.", "py": "Xiàng yī fú huàr shìde, yào duō měi yǒu duō měi."}, {"zh": "可是农村的生活条件哪比得上城市呢？", "ko": "그렇지만 농촌의 생활 조건을 어떻게 도시와 비교하겠어?", "py": "Kěshì nóngcūn de shēnghuó tiáojiàn nǎ bǐ de shàng chéngshì ne? Yǒu hǎoduō bù fāngbiàn de dìfang."}, {"zh": "有好多不方便的地方。", "ko": "불편한 점이 아주 많아.", "py": "Kěshì nóngcūn de shēnghuó tiáojiàn nǎ bǐ de shàng chéngshì ne? Yǒu hǎoduō bù fāngbiàn de dìfang."}, {"zh": "那是以前，在农村劳动和生活都很苦。", "ko": "예전에야 농촌에서 일하고 생활하는 게 매우 힘들었지.", "py": "Nà shì yǐqián, zài nóngcūn láodòng hé shēnghuó dōu hěn kǔ."}, {"zh": "现在变化可大了。", "ko": "지금은 아주 많이 변했어.", "py": "Xiànzài biànhuà kě dà le."}, {"zh": "不信，你去农村看看，", "ko": "못 믿겠으면 농촌에 가서 한번 봐봐.", "py": "Bú xìn, nǐ qù nóngcūn kànkan,"}, {"zh": "那里不一定比城市差。", "ko": "그곳이 반드시 도시보다 못한 것은 아니야.", "py": "Nàlǐ bù yīdìng bǐ chéngshì chà."}, {"zh": "而且，工业，交通等多城市的污染越来越严重了，对健康一点儿好处也没有。", "ko": "게다가 산업, 교통 등 도시의 오염은 갈수록 심각해지니 건강에 조금도 좋을 게 없어.", "py": "Érqiě, gōngyè, jiāotōng děng duì chéngshì de wūrǎn yuè lái yuè yánzhòng le, duì jiànkāng yīdiǎnr hǎochu yě méiyǒu."}, {"zh": "小猫，小狗可爱极了，爸爸，妈妈却反对我们养狗。", "ko": "고양이, 강아지는 아주 귀엽지만, 아빠, 엄마는 우리가 강아지 기르는 것을 반대한다.", "py": "Xiǎo māo, xiǎo gǒu kě'ài jí le, bàba, māma què fǎnduì wǒmen yǎng gǒu."}, {"zh": "城市的污染越来越严重，农村的风景却像画儿似的，要多美有多美的。", "ko": "도시의 오염은 점점 심해지는데, 농촌의 풍경은 오히려 그림처럼 아름답기 그지없다.", "py": "Chéngshì de wūrǎn yuè lái yuè yánzhòng, nóngcūn de fēngjǐng què xiàng huàr shìde, yào duō měi yǒu duō měi de."}, {"zh": "我也不清楚，到底是我说错了，还是他听错了？", "ko": "나도 잘 모르겠어, 도대체 내가 잘못 말한 거야, 아니면 그가 잘못 들은 거야?", "py": "Wǒ yě bù qīngchǔ, dàodǐ shì wǒ shuō cuò le, háishi tā tīng cuò le?"}, {"zh": "你想过没有？到底为什么会这样？", "ko": "넌 생각해 본 적이 있니? 도대체 왜 이렇게 된 거지?", "py": "Nǐ xiǎng guò méiyǒu? Dàodǐ wèishénme huì zhèyàng?"}, {"zh": "你到底来不来？", "ko": "너 도대체 오니 안 오니?", "py": "Nǐ dàodǐ lái bu lái?"}, {"zh": "这个孩子要多可爱有多可爱。", "ko": "이 아이는 정말 귀엽기 짝이 없다.", "py": "Zhège háizi yào duō kě'ài yǒu duō kě'ài."}, {"zh": "公共汽车上要多挤有多挤。", "ko": "버스 안이 복잡하기 그지없다.", "py": "Gōnggòng qìchē shàng yào duō jǐ yǒu duō jǐ."}, {"zh": "一点儿好处也没有。", "ko": "좋은 점이 조금도 없다.", "py": "Nà shì yǐqián, zài nóngcūn láodòng hé shēnghuó dōu hěn kǔ. Xiànzài biànhuà kě dà le. Bú xìn, nǐ qù nóngcūn kànkan, nàlǐ bù yīdìng bǐ chéngshì chà. Érqiě"}, {"zh": "对不起，今天我一点儿时间也没有。", "ko": "죄송합니다, 제가 오늘은 시간이 조금도 없어요.", "py": "Duìbuqǐ, jīntiān wǒ yīdiǎnr shíjiān yě méiyǒu."}, {"zh": "刚来中国的时候，我一点儿汉语也不会说。", "ko": "막 중국에 왔을 때, 나는 중국어를 조금도 하지 못했다.", "py": "Gāng lái Zhōngguó de shíhou, wǒ yīdiǎnr Hànyǔ yě bú huì shuō."}, {"zh": "昨天晚上出去玩儿了，一点儿觉都没睡。", "ko": "어제 밤에 나가서 노느라, 잠을 조금도 자지 못했다.", "py": "Zuótiān wǎnshang chūqù wánr le, yīdiǎnr jiào dōu méi shuì."}, {"zh": "她一点儿钱都不乱花。", "ko": "그녀는 조금의 돈도 함부로 쓰지 않는다.", "py": "Tā yīdiǎnr qián dōu bù luàn huā."}, {"zh": "认错", "ko": "잘못을 인정하다", "py": "rèncuò"}, {"zh": "精彩", "ko": "뛰어나다, 훌륭하다", "py": "Tài jīngcǎi le!"}, {"zh": "拿。。。来说", "ko": "~으로 말하자면, ~의 경우에는", "py": "ná...lái shuō"}, {"zh": "上传", "ko": "업로드하다", "py": "shàngchuán"}, {"zh": "防晒霜", "ko": "썬크림", "py": "fángshàishuāng"}, {"zh": "办公室", "ko": "사무실", "py": "bàngōngshì"}, {"zh": "薪水", "ko": "월급", "py": "xīnshuǐ"}, {"zh": "开会", "ko": "회의하다", "py": "kāihuì"}, {"zh": "名片", "ko": "명함", "py": "míngpiàn"}, {"zh": "传真", "ko": "팩스", "py": "chuánzhēn"}, {"zh": "打印机", "ko": "복사기", "py": "dǎyìnjī"}, {"zh": "笔试", "ko": "필기시험", "py": "bǐshì"}, {"zh": "出差", "ko": "출장", "py": "chūchāi"}, {"zh": "非。。。不可", "ko": "~하지 않으면 안 된다", "py": "fēi...bùkě"}, {"zh": "卫生间", "ko": "화장실", "py": "wèishēngjiān"}, {"zh": "农村", "ko": "농촌", "py": "nóngcūn"}, {"zh": "环境", "ko": "환경", "py": "huánjìng"}, {"zh": "小学", "ko": "초등학교", "py": "Nín kàn, zhōngxué zài nàr, xiǎoxué zài zhèr, dōu hěn jìn."}, {"zh": "动物", "ko": "동물", "py": "Zánmen jiā yě yǎng zhī xiǎo dòngwù ba. Yǎng zhī xiǎogǒu hǎobùhǎo?"}, {"zh": "意见", "ko": "의견", "py": "Wǒ hái děi wènwen nǐmen de bàba shì shénme yìjiàn."}, {"zh": "到底", "ko": "도대체", "py": "dàodǐ"}, {"zh": "大自然", "ko": "대자연", "py": "dàzìrán"}, {"zh": "农民", "ko": "농민", "py": "nóngmín"}, {"zh": "优美", "ko": "우아하고 아름답다", "py": "yōuměi"}, {"zh": "新鲜", "ko": "신선하다", "py": "xīnxiān"}, {"zh": "像~似的", "ko": "~와 같다", "py": "xiàng~shìde"}, {"zh": "劳动", "ko": "노동하다, 일하다", "py": "láodòng"}, {"zh": "工业", "ko": "공업", "py": "gōngyè"}, {"zh": "严重", "ko": "심각하다", "py": "yánzhòng"}], "vo  {"zh": "环境", "ko": "환경"}, {"zh": "路", "ko": "노선"}, {"zh": "小学", "ko": "초등학교"}, {"zh": "决定", "ko": "결정(하다)"}, {"zh": "养", "ko": "기르다"}, {"zh": "动物", "ko": "동물"}, {"zh": "狗", "ko": "개"}, {"zh": "猫", "ko": "고양이"}, {"zh": "喂", "ko": "먹이를 주다"}, {"zh": "意见", "ko": "의견"}, {"zh": "却", "ko": "오히려, 반대로"}, {"zh": "到底", "ko": "도대체"}, {"zh": "大自然", "ko": "대자연"}, {"zh": "农民", "ko": "농민"}, {"zh": "优美", "ko": "우아하고 아름답다"}, {"zh": "新鲜", "ko": "신선하다"}, {"zh": "马", "ko": "말"}, {"zh": "羊", "ko": "양"}, {"zh": "像~似的", "ko": "~와 같다"}, {"zh": "劳动", "ko": "노동하다, 일하다"}, {"zh": "苦", "ko": "고되다, 괴롭다"}, {"zh": "工业", "ko": "공업"}, {"zh": "严重", "ko": "심각하다"}]}, "8과": {"pairs": [{"zh": "我昨天睡了十个小时了。", "ko": "나는 어제 10시간을 잤다.", "py": "Wǒ zuótiān shuì le shí gè xiǎoshí le."}, {"zh": "下班后我洗了澡。", "ko": "퇴근하고 샤워를 했다.", "py": "Xiàbān hòu wǒ xǐ le zǎo."}, {"zh": "今天我请你客。", "ko": "오늘 내가 살게.", "py": "Jīntiān wǒ qǐng nǐ kè."}, {"zh": "你今天怎么也回来晚了？", "ko": "당신 오늘 왜 이렇게 늦은 거예요?", "py": "Nǐ jīntiān zěnme yě huílái wǎn le?"}, {"zh": "我来跟你一起做饭吧。", "ko": "내가 같이 식사 준비할게요.", "py": "Wǒ lái gēn nǐ yīqǐ zuòfàn ba."}, {"zh": "回来得并不晚，到楼上张师傅家坐了会儿。", "ko": "늦게 온 건 아닌데, 윗집 장 씨네 집에 좀 앉아 있다가 왔어요.", "py": "Huílái de bìng bù wǎn, dào lóushàng Zhāng shīfu jiā zuò le huìr."}, {"zh": "他们家又吵架了。", "ko": "그들 부부 또 싸웠지 뭐예요.", "py": "Tāmen jiā yòu chǎojià le."}, {"zh": "他们为什么又吵了？", "ko": "어째서 또 싸웠는데요?", "py": "Tāmen wèishénme yòu chǎo le?"}, {"zh": "张师傅一回家就躺在沙发上，边看电视边抽烟。", "ko": "장 씨는 집에 돌아오면 바로 소파에 누워서 TV를 보면서 담배를 피운대요.", "py": "Zhāng shīfu yī huí jiā jiù tǎng zài shāfā shàng, biān kàn diànshì biān chōuyān."}, {"zh": "他爱人下了班，又洗菜又做饭。", "ko": "아내가 퇴근해서 돌아와 채소도 씻고 식사도 준비하죠.", "py": "Tā àirén xià le bān, yòu xǐ cài yòu zuò fàn."}, {"zh": "张师傅一点儿忙也不帮。", "ko": "장 씨는 조금도 돕지 않아요.", "py": "Zhāng shīfu yīdiǎnr máng yě bù bāng."}, {"zh": "这就是张师傅不对了。", "ko": "이건 장 씨가 잘못했네요.", "py": "Zhè jiùshì Zhāng shīfu bù duì le."}, {"zh": "两个人都上了一天的班，都挺累的，回到家，怎么能光让一个人干活儿呢？", "ko": "두 사람 모두 종일 근무를 해서 피곤할 텐데, 집에 돌아와 어떻게 한 사람에게만 일하게 할 수 있지요?", "py": "Liǎng gè rén dōu shàng le yītiān de bān, dōu tǐng lèi de, huí dào jiā, zěnme néng guāng ràng yīgè rén gànhuór ne?"}, {"zh": "他爱人叫张师傅帮着一起做，张师傅不做，结果把他爱人气哭了。", "ko": "아내가 장 씨를 불러 함께 하자고 해도 장 씨는 하지 않아서 결국 아내가 화가 나 울어버렸어요.", "py": "Tā àirén jiào Zhāng shīfu bāng zhe yīqǐ zuò, Zhāng shīfu bù zuò, jiéguǒ bǎ tā àirén qì kū le."}, {"zh": "现在两个人怎么样了？", "ko": "지금 두 사람은 어때요?", "py": "Xiànzài liǎng gè rén zěnmeyàng le?"}, {"zh": "我批评了张师傅，给他讲了男女在社会上要平等，在家庭中也不平等。", "ko": "내가 장 씨에게 뭐라고 좀 했어요. 그에게 남녀는 사회에서 평등해야 하고, 가정에서도 평등해야 한다고 말해 줬어요.", "py": "Wǒ pīpíng le Zhāng shīfu, gěi tā jiǎng le nánnǚ zài shèhuì shàng yào píngděng."}, {"zh": "又把咱们俩的经验介绍了一下儿。", "ko": "그리고 우리 두 사람 경험도 소개해줬어요.", "py": "Wǒ pīpíng le Zhāng shīfu, gěi tā jiǎng le nánnǚ zài shèhuì shàng yào píngděng, zài jiātíng zhōng yě yào píngděng. Yòu bǎ zánmen liǎ de jīngyàn jièshào le"}, {"zh": "你没向他们夸夸我这个模范丈夫？", "ko": "당신 그들에게 모범 남편인 날 칭찬 안 했어요?", "py": "Nǐ méi xiàng tāmen kuākuā wǒ zhège mófàn zhàngfu?"}, {"zh": "正因为我夸了你，张师傅在改变了态度，向他爱人认了错，两个人一起高高兴兴地做了一顿饭。", "ko": "내가 당신을 칭찬했기 때문에 장 씨가 태도를 바꿔서 아내에게 자신의 잘못을 인정하고 두 사람이 같이 즐겁게 식사 한 끼를 차렸죠", "py": "Zhèng yīnwèi wǒ kuā le nǐ, Zhāng shīfu cái gǎibiàn le tàidù, xiàng tā àirén rèn le cuò."}, {"zh": "希望他们俩今后也不因为做家务的事吵架了。", "ko": "앞으로 그들이 이런 문제로 다시는 싸우지 않았으면 좋겠네요.", "py": "Xīwàng tāmen liǎ jīnhòu zài yě bù yīnwèi zuò jiāwù de shì chǎojià le."}, {"zh": "你劝家劝得不错嘛！", "ko": "아주 잘 중재했어요!", "py": "Nǐ quànjià quàn de búcuò ma!"}, {"zh": "你把咱们俩刚结婚时我的表现也告诉他们了？", "ko": "당신, 우리가 막 결혼할 당시 내가 어떻게 했는지도 그들에게 말해줬어요?", "py": "Xīwàng tāmen liǎ jīnhòu zài yě bù yīnwèi zuò jiāwù de shì chǎojià le. Nǐ quànjià quàn de bùcuò ma! Nǐ bǎ zánmen liǎ gāng jiéhūn shí wǒ de biǎoxiàn yě"}, {"zh": "不说那些，经验从哪儿说起呀?", "ko": "그것들을 이야기하지 않으면 경험을 어디부터 말하겠어요?", "py": "Bù shuō nàxiē, jīngyàn cóng nǎr shuō qǐ ya?"}, {"zh": "真不好意思，咱们俩的秘密全让人知道了。", "ko": "정말 부끄럽네요, 우리 두 사람만의 비밀이 그들에게 전부 알려졌네요.", "py": "Zhēn bù hǎoyìsi, zánmen liǎ de mìmì quán ràng rén zhīdào le."}, {"zh": "找来找去，也没找到。", "ko": "이리저리 찾아도, 찾지 못했다.", "py": "Zhǎo lái zhǎo qù, yě méi zhǎodào."}, {"zh": "商量来商量去，他也不同意。", "ko": "의논하고 또 해봐도, 그는 역시 동의하지 않았다.", "py": "Shāngliang lái shāngliang qù, tā yě bù tóngyì."}, {"zh": "想来想去，怎么也想不起她叫什么名字。", "ko": "생각하도 해봤지만, 어떻게 해도 그의 이름이 떠오르지 않았다.", "py": "Xiǎng lái xiǎng qù, zěnme yě xiǎng bù qǐ tā jiào shénme míngzi."}, {"zh": "他说来说去都是自己夸自己。", "ko": "그는 이 말 저 말을 하지만 모두 다 자기 자랑이다.", "py": "Tā shuō lái shuō qù dōu shì zìjǐ kuā zìjǐ."}, {"zh": "今天他没来，我以为是他病了，后来才知道他孩子病了。", "ko": "오늘 그가 오지 않아서 나는 그가 아픈 거라고 생각했는데 나중에 알고보니 그의 아이가 병이 났던 것이다.", "py": "Jīntiān tā méi lái, wǒ yǐwéi shì tā bìng le, hòulái cái zhīdào tā háizi bìng le."}, {"zh": "张师傅回到家一点活儿都不干，大家都认为这是不对的。", "ko": "장씨는 집에 돌아오면 일을 전혀 하지 않는데 사람들은 모두 이것이 잘못되었다고 생각한다.", "py": "Zhāng shīfu huí dào jiā yīdiǎnr huór dōu bù gàn, dàjiā dōu rènwéi zhè shì bù duì de."}, {"zh": "今天路上车很多，我以为他不会来。", "ko": "길에 차가 너무 많아서 나는 그가 안 올 것이라고 생각했다", "py": "Jīntiān lùshàng chē hěn duō, wǒ yǐwéi tā bú huì lái."}, {"zh": "今天路上车很多，我认为他不会来。", "ko": "길에 차가 너무 많아서 나는 그가 안 올 것이라고 생각한다.", "py": "Jīntiān lùshàng chē hěn duō, wǒ rènwéi tā bú huì lái."}, {"zh": "孩子改不了爱吃糖的习惯，结果牙都坏了。", "ko": "아이가 사탕을 먹는 습관을 고치지 못해서 결국 이가 다 상했다.", "py": "Háizi gǎi bù liǎo ài chī táng de xíguàn, jiéguǒ yá dōu huài le."}, {"zh": "他把约会的时间记错了，结果女朋友生气了。", "ko": "그는 데이트 시간을 잘못 기억해서 결국 여자친구가 화가 났다.", "py": "Tā bǎ yuēhuì de shíjiān jì cuò le, jiéguǒ nǚpéngyou shēngqì le."}, {"zh": "老板不满意他的工作，结果老板不用他了。", "ko": "사장이 그의 일에 만족하지 못해서 결국 사장은 그를 쓰지 않았다", "py": "Lǎobǎn bù mǎnyì tā de gōngzuò, jiéguǒ lǎobǎn bú yòng tā le."}, {"zh": "住的要好，吃的也要好。", "ko": "사는 것도 먹는 것도 좋아야 해.", "py": "Zhù de yào hǎo, chī de yě yào hǎo."}, {"zh": "上班的路上要注意安全，下班的路上也要注意安全。", "ko": "출근 길에는 안전을 조심해야 하고 퇴근 길에도 안전을 조심해야 해.", "py": "Shàngbān de lùshàng yào zhùyì ānquán, xiàbān de lùshàng yě yào zhùyì ānquán."}, {"zh": "教师里边要安静，教师外边也要安静。", "ko": "교실 안은 조용해야 하고 교실 밖에도 조용해야 해.", "py": "Jiàoshì lǐbiān yào ānjìng, jiàoshì wàibiān yě yào ānjìng."}, {"zh": "看来看去，一个都不喜欢。", "ko": "보고 또 봐도 마음에 드는 게 없어", "py": "Kàn lái kàn qù, yīgè dōu bù xǐhuan."}, {"zh": "走来走去，又走回来了。", "ko": "왔다갔다 하다가 다시 돌아왔어요", "py": "Zǒu lái zǒu qù, yòu zǒu huílái le."}, {"zh": "讨论来讨论去，也没有好主意。", "ko": "토론을 계속 해도 좋은 아이디어가 없다.", "py": "Tǎolùn lái tǎolùn qù, yě méiyǒu hǎo zhǔyi."}, {"zh": "连他的名字也没想起来。", "ko": "그의 이름조차 생각이 안 났다.", "py": "Lián tā de míngzi yě méi xiǎng qǐlái."}, {"zh": "连东南西北也不知道。", "ko": "동서남북조차 알지 못한다.", "py": "Lián dōngnánxīběi yě bù zhīdào."}, {"zh": "连图书馆也没去过。", "ko": "도서관조차 가보지 않았다.", "py": "Lián túshūguǎn yě méi qù guò."}, {"zh": "我们要举行演讲比赛，帮我想想怎么讲。", "ko": "우리 곧 웅변대회 있는데 내가 어떻게 말하면 좋을 지 생각 좀 해봐.", "py": "Wǒmen yào jǔxíng yǎnjiǎng bǐsài, bāng wǒ xiǎngxiang zěnme jiǎng."}, {"zh": "演讲的题目是什么？", "ko": "웅변 주제가 뭔데?", "py": "Yǎnjiǎng de tímù shì shénme?"}, {"zh": "这个问题很复杂，内容又太多，不好讲，你肯定有困难。", "ko": "이 문제는 매우 복잡하고 내용도 많아서 말하기 쉽지 않겠는 걸. 아마 힘들겠다", "py": "Zhège wèntí hěn fùzá, nèiróng yòu tài duō, bù hǎo jiǎng, nǐ kěndìng yǒu kùnnan."}, {"zh": "所以才请你帮我想想嘛。", "ko": "그러니까 너에게 좀 도와달라는 거지.", "py": "Suǒyǐ cái qǐng nǐ bāng wǒ xiǎngxiang ma."}, {"zh": "我不知道从哪儿讲起。", "ko": "난 어디서부터 이야기를 시작해야 할지 모르겠어.", "py": "Suǒyǐ cái qǐng nǐ bāng wǒ xiǎngxiang ma. Wǒ bù zhīdào cóng nǎr jiǎng qǐ."}, {"zh": "到处都有人谈男女平等，报上谈，电视里也谈。", "ko": "곳곳에서 남녀평등을 이야기하고 있어. 신문에서도 이야기하고 TV에서도 이야기하고 있어.", "py": "Dàochù dōu yǒu rén tán nánnǚ píngděng, bào shàng tán, diànshì lǐ yě tán."}, {"zh": "谈来谈去，连一个最简单的问题也没谈清楚。", "ko": "이야기를 하고 또 해봐도 가장 간단한 문제조차도 분명하게 말하지 못해.", "py": "Tán lái tán qù, lián yīgè zuì jiǎndān de wèntí yě méi tán qīngchu."}, {"zh": "一般人都以为男人能做的事女人也能做，好像就是实现了男女平等了。", "ko": "보통 사람들은 남자가 할 수 있는 일들을 여자도 할 수 있게 되면 남녀평등이 실현되었다고 생각해.", "py": "Yībān rén dōu yǐwéi nánrén néng zuò de shì nǚrén yě néng zuò."}, {"zh": "你怎么认为呢？", "ko": "당신은 어떻게 생각하세요?", "py": "Nǐ zěnme rènwéi ne?"}, {"zh": "男人有男人的特点，女人有女人的特点，只在一点上讨论，那就太简单了。", "ko": "남자는 남자만의 특징을 갖고 있고 여자는 여자만의 특징을 갖고 있는데 한 가지 점만 가지고 토론을 하는 건 지나치게 단순하게 보는 거야.", "py": "Nánrén yǒu nánrén de tèdiǎn, nǚrén yǒu nǚrén de tèdiǎn, zhǐ zài yīdiǎn shàng tǎolùn, nà jiù tài jiǎndān le."}, {"zh": "沙发", "ko": "소파", "py": "shāfā"}, {"zh": "活儿", "ko": "일", "py": "Zhè jiùshì Zhāng shīfu bù duì le. Liǎng gè rén dōu shàng le yītiān de bān, dōu tǐng lèi de, huí dào jiā, zěnme néng guāng ràng yīgè rén gànhuór ne?"}, {"zh": "批评", "ko": "비평하다, 꾸짖다", "py": "pīpíng"}, {"zh": "社会", "ko": "사회", "py": "shèhuì"}, {"zh": "平等", "ko": "평등하다", "py": "píngděng"}, {"zh": "模范", "ko": "모범적인", "py": "mófàn"}, {"zh": "改变", "ko": "변하다, 바꾸다", "py": "gǎibiàn"}, {"zh": "今后", "ko": "이제부터", "py": "jīnhòu"}, {"zh": "家务", "ko": "집안일, 가사", "py": "jiāwù"}, {"zh": "表现", "ko": "표현(하다)", "py": "biǎoxiàn"}, {"zh": "不好意思", "ko": "부끄럽다", "py": "Zhēn bù hǎoyìsi, zánmen liǎ de mìmì quán ràng rén zhīdào le."}, {"zh": "演讲", "ko": "강연", "py": "yǎnjiǎng"}, {"zh": "题目", "ko": "제목", "py": "Yǎnjiǎng de tímù shì shénme?"}, {"zh": "复杂", "ko": "복잡하다", "py": "fùzá"}, {"zh": "到处", "ko": "도처, 곳곳", "py": "dàochù"}, {"zh": "男人", "ko": "남자", "py": "Yībān rén dōu yǐwéi nánrén néng zuò de shì nǚrén yě néng zuò, hǎoxiàng jiùshì shíxiàn le nánnǚ píngděng le."}, {"zh": "认为", "ko": "여기다, 생각하다", "py": "Nǐ zěnme rènwéi ne?"}, {"zh": "特点", "ko": "특징", "py": "Nánrén yǒu nánrén de tèdiǎn, nǚrén yǒu nǚrén de tèdiǎn, zhǐ zài yīdiǎn shàng tǎolùn, nà jiù tài jiǎndān le."}, {"zh": "教师", "ko": "교사", "py": "Yǐjīng tuìxiū de, yǒu de dǎ pái, yǒu de dǎ májiàng. Méi tuìxiū de, ná wǒ jiějie lái shuō, tā shì jiàoshī, yībān shì bèi bèi kè, péi háizi wánr yīhuìr, zài zuò"}], "vocab": []}, "9과": {"pairs": [{"zh": "我把你的手机号记下来。", "ko": "내가 너의 휴대전화 번호를 적을게", "py": "Wǒ bǎ nǐ de shǒujīhào jì xiàlái."}, {"zh": "新书发下来了。", "ko": "새로운 책이 출간되었다.", "py": "Xīn shū fā xiàlái le."}, {"zh": "队员都坚持下来了。", "ko": "팀원들은 모두 끝까지 버텨왔다.", "py": "Duìyuán dōu jiānchí xiàlái le."}, {"zh": "我玩起来常常忘了时间。", "ko": "나는 놀다 보면 자주 시간을 잊는다.", "py": "Wǒ wán qǐlái chángcháng wàng le shíjiān."}, {"zh": "天气热起来了，夏天快到了。", "ko": "날씨가 더워졌고 여름이 곧 다가온다", "py": "Tiānqì rè qǐlái le, xiàtiān kuài dào le."}, {"zh": "我是昨天晚上刚到北京的。", "ko": "나는 어제 밤에 막 베이징에 도착했다", "py": "Wǒ shì zuótiān wǎnshang gāng dào Běijīng de."}, {"zh": "他们是从中国南方来的。", "ko": "그들은 중국의 남쪽에서 왔다.", "py": "Tāmen shì cóng Zhōngguó nánfāng lái de."}, {"zh": "你们究竟是来干什么的呢？", "ko": "너희들은 도대체 무엇 때문에 왔니?", "py": "Nǐmen jiūjìng shì lái gàn shénme de ne?"}, {"zh": "这包裹是老刘寄过来的。", "ko": "이 소포는 라오리우가 보내온 거야.", "py": "Zhè bāoguǒ shì lǎo Liú jì guòlái de."}, {"zh": "麻烦您帮我叫一下儿刘山。", "ko": "류산을 불러주시겠어요?", "py": "Máfan nín bāng wǒ jiào yīxiàr Liú Shān."}, {"zh": "他早就不在这儿干了。", "ko": "그는 진작부터 여기에서 일하지 않았어요", "py": "Tā zǎo jiù bù zài zhèr gàn le."}, {"zh": "他开了一家电脑公司，自己当老板了。", "ko": "그는 컴퓨터 회사를 차려서 사장이 되었어요", "py": "Tā kāi le yī jiā diànnǎo gōngsī, zìjǐ dāng lǎobǎn le."}, {"zh": "真没想到。", "ko": "뜻밖이군요.", "py": "Zhēn méi xiǎngdào."}, {"zh": "您知道怎么和他联系吗？", "ko": "그와 어떻게 연락하는지 아세요?", "py": "Nín zhīdào zěnme hé tā liánxì ma?"}, {"zh": "我给你他的手机号吧，他走以前留下的。", "ko": "그의 휴대전화 번호를 알려 드릴게요.", "py": "Wǒ gěi nǐ tā de shǒujīhào ba, tā zǒu yǐqián liúxià de."}, {"zh": "您等一会儿，我拿纸和笔。", "ko": "잠시만 기다려 주세요, 제가 종이와 펜을 가져올게요.", "py": "Nín děng yīhuìr, wǒ ná zhǐ hé bǐ."}, {"zh": "记下来了吗？", "ko": "받아적으셨나요?", "py": "Jì xiàlái le ma?"}, {"zh": "请问，王经理在吗？", "ko": "실례지만, 왕 매니저 계세요?", "py": "Qǐngwèn, Wáng jīnglǐ zài ma?"}, {"zh": "我是他的秘书。", "ko": "무슨 일이지요? 제가 그분의 비서입니다.", "py": "Yǒu shénme shì? Wǒ shì tā de mìshū."}, {"zh": "我是来找工作的。", "ko": "저는 일자리를 구하러 왔습니다.", "py": "Nín hǎo, wǒ shì lái zhǎo gōngzuò de. Wǒ kàndào bàozhǐ shàng yǒu guì gōngsī de guǎnggào, suǒyǐ jiù...."}, {"zh": "我看报纸上有贵公司的广告，所以就。。。", "ko": "신문에서 귀사의 공고를 봤습니다. 그래서….", "py": "Wǒ kàndào bàozhǐ shàng yǒu guì gōngsī de guǎnggào, suǒyǐ jiù..."}, {"zh": "王经理陪客人参观去了。", "ko": "왕회장님께서는 손님을 모시고 참관하러 가셨습니다.", "py": "Wáng jīnglǐ péi kèrén cānguān qù le. Qǐng xiān bǎ nín de jiǎnlì gěi wǒ yī fèn."}, {"zh": "请先把您的简历给我一份。", "ko": "우선 저에게 이력서를 한 부 주세요.", "py": "Wáng jīnglǐ péi kèrén cānguān qù le. Qǐng xiān bǎ nín de jiǎnlì gěi wǒ yī fèn."}, {"zh": "您看这些够吗？", "ko": "이 정도면 충분한지 좀 봐 주시겠어요?", "py": "Nín kàn zhèxiē gòu ma?"}, {"zh": "有学历证明吗？", "ko": "학력 증명서 있나요?", "py": "Yǒu xuélì zhèngmíng ma?"}, {"zh": "这是毕业证的复印件。", "ko": "이게 졸업 증명서 사본입니다.", "py": "Yǒu. Zhè shì bìyèzhèng de fùyìnjiàn."}, {"zh": "经理一回来，我就交给他。", "ko": "사장님께서 돌아오시면 바로 전해 드릴게요.", "py": "Jīnglǐ yī huílái, wǒ jiù jiāo gěi tā."}, {"zh": "什么时候面试请等我们的电话。", "ko": "언제 면접을 볼지는 저희 전화를 기다려 주세요.", "py": "Hǎo, jīnglǐ yī huílái, wǒ jiù jiāo gěi tā. Shénme shíhou miànshì qǐng děng wǒmen de diànhuà."}, {"zh": "不发达，我不回家。", "ko": "출세하지 않으면 집에 돌아가지 않겠다", "py": "Bù fādá, wǒ bù huíjiā."}, {"zh": "你今天不做作业不能出去玩儿。", "ko": "너는 오늘 숙제를 하지 않으면 나가 놀 수 없다", "py": "Nǐ jīntiān bù zuò zuòyè bù néng chūqù wánr."}, {"zh": "你为什么要做这份工作？", "ko": "당신은 왜 이 일을 하려고 하지요?", "py": "Nǐ wèishénme yào zuò zhè fèn gōngzuò?"}, {"zh": "我对这份工作感兴趣。", "ko": "저는 이 업무에 흥미가 있습니다.", "py": "Wǒ duì zhè fèn gōngzuò gǎn xìngqù."}, {"zh": "现在电脑公司很多，你为什么想来我们公司？", "ko": "지금 컴퓨터 회사가 아주 많은데 당신은 왜 우리 회사에 들어오려고 하지요?", "py": "Xiànzài diànnǎo gōngsī hěn duō, nǐ wèishénme xiǎng lái wǒmen gōngsī?"}, {"zh": "你们是一家新开的公司，发展很快。", "ko": "귀사는 새롭게 설립된 회사로 매우 빠르게 발전하고 있습니다.", "py": "Nǐmen shì yī jiā xīn kāi de gōngsī, fāzhǎn hěn kuài."}, {"zh": "我认为在这里工作有前途。", "ko": "저는 여기서 일하는 것이 전망이 있다고 생각합니다.", "py": "Wǒ rènwéi zài zhèlǐ gōngzuò yǒu qiántú."}, {"zh": "你说的“有前途”事什么意思？", "ko": "당신이 말한 ‘비전’이란 무슨 뜻인가요?"}, {"zh": "在工作中锻炼，提高工作能力和技术水平。", "ko": "일을 하면서 배우고 업무 능력과 기술 수준을 높일 수 있다는 뜻입니다.", "py": "Zài gōngzuò zhōng duànliàn, tígāo gōngzuò nénglì hé jìshù shuǐpíng."}, {"zh": "也希望快点儿增加收入。", "ko": "물론 수입도 빠르게 증가하기를 희망합니다.", "py": "Zài gōngzuò zhōng duànliàn, tígāo gōngzuò nénglì hé jìshù shuǐpíng, yě xīwàng kuài diǎnr zēngjiā shōurù."}, {"zh": "我们这儿的工作很忙，", "ko": "우리 회사는 매우 바쁩니다.", "py": "Wǒmen zhèr de gōngzuò hěn máng, yǒu shíhou zhōumò yě bù néng xiūxi."}, {"zh": "有时候周末也不能休息。", "ko": "어떤 경우에는 주말에도 쉬지 못합니다.", "py": "Wǒmen zhèr de gōngzuò hěn máng, yǒu shíhou zhōumò yě bù néng xiūxi."}, {"zh": "我很年轻，喜欢紧张的生活。", "ko": "저는 아직 젊고 바쁘게 생활하는 것을 좋아합니다.", "py": "Wǒ hěn niánqīng, xǐhuan jǐnzhāng de shēnghuó."}, {"zh": "我母亲常说：“不忙不幸福。“ 我觉得她说得有道理。", "ko": "제 어머님께서는 ‘바쁘지 않으면 행복하지 않다.’는 말씀을 자주 하시는데 어머니 말씀에 일리가 있다고 생각합니다."}, {"zh": "今天的面试就到这儿，结果怎么样请等我们的通知。", "ko": "오늘 면접을 여기까지입니다. 결과가 어떨지는 저희의 통보를 기다려주세요.", "py": "Jīntiān de miànshì jiù dào zhèr, jiéguǒ zěnmeyàng qǐng děng wǒmen de tōngzhī."}, {"zh": "我们公司每年都招一些新职员，其中有不少中年人给我留下了很好的印象。", "ko": "우리 회사는 해마다 직원을 새로 채용하는데, 그중 적지 않은 인상을 남겨 주었습니다.", "py": "Wǒmen gōngsī měinián dōu zhāo yīxiē xīn zhíyuán, qízhōng yǒu bùshǎo zhōngniánrén."}, {"zh": "因为他们年龄比较大，都工作过一段时间，所以他们懂技术，有经验，能够很快熟悉工作。", "ko": "그분들은 나이가 비교적 많고 모두 어느 정도 일을 해보신 분들이기 떄문에, 기술을 알고 경험이 있어서 업무에 빨리 적응합니다.", "py": "Yīnwèi tāmen niánlíng bǐjiào dà, dōu gōngzuò guò yīduàn shíjiān, suǒyǐ tāmen dǒng jìshù, yǒu jīngyàn, nénggòu hěn kuài shúxi gōngzuò."}, {"zh": "工作起来认真，负责，我对他们很满意。", "ko": "일하는데 있어 열심이고 책임감이 강해서 저는 그분들에게 아주 만족하고 있습니다.", "py": "Yīnwèi tāmen niánlíng bǐjiào dà, dōu gōngzuò guò yīduàn shíjiān, suǒyǐ tāmen dǒng jìshù, yǒu jīngyàn, nénggòu hěn kuài shúxi gōngzuò, gōngzuò qǐlái"}, {"zh": "当然，来面试的大学毕业生也不少，有一丝也成了我们的新职员。", "ko": "물론 면접을 보러 오는 대학 졸업생들도 적지 않고, 어떤 이들은 저희의 신입직원이 되기도 합니다.", "py": "Dāngrán, lái miànshì de dàxué bìyèshēng yě bùshǎo, yǒu yīxiē yě chéng le wǒmen de xīn zhíyuán."}, {"zh": "他们热情，爱学习，技术和能力都提高得很快。", "ko": "그들은 열정적이고 배우는 것을 좋아하며 기술과 능력이 아주 빠르게 향상합니다.", "py": "Tāmen rèqíng, ài xuéxí, jìshù hé nénglì dōu tígāo de hěn kuài."}, {"zh": "我对他们也很满意。", "ko": "저는 그들에 대해서도 아주 만족합니다.", "py": "Tāmen rèqíng, ài xuéxí, jìshù hé nénglì dōu tígāo de hěn kuài. Wǒ duì tāmen yě hěn mǎnyì."}, {"zh": "他们早就研究过这个问题。", "ko": "그들은 이미 이 문제를 연구했다.", "py": "Tāmen zǎo jiù yánjiū guò zhège wèntí."}, {"zh": "秘书早就把你的简历交给经历了。", "ko": "비서가 이미 당신의 이력서를 매니저에게 전달했다.", "py": "Mìshū zǎo jiù bǎ nǐ de jiǎnlì jiāo gěi jīnglǐ le."}, {"zh": "我早就熟悉这儿得饭馆儿了。", "ko": "나는 이미 이 근처 식당에 익숙하다.", "py": "Wǒ zǎo jiù shúxi zhèr de fànguǎnr le."}, {"zh": "价钱谈下来了吗？", "ko": "가격을 협상했나요?", "py": "Jiàqian tán xiàlái le ma?"}, {"zh": "HSK考试考下来了吗？", "ko": "HSK 시험을 합격했나요?", "py": "HSK kǎoshì kǎo xiàlái le ma?"}, {"zh": "课文背下来了吗？", "ko": "본문을 외웠나요?", "py": "Kèwén bèi xiàlái le ma?"}, {"zh": "她陪奶奶买东西去了。", "ko": "그녀는 할머니와 함께 물건을 사러 갔다.", "py": "Tā péi nǎinai mǎi dōngxi qù le."}, {"zh": "他陪老师看病去了。", "ko": "그는 선생님과 함께 병원에 갔다.", "py": "Tā péi lǎoshī kànbìng qù le."}, {"zh": "爸爸陪孩子换钱去了。", "ko": "아버지는 아이와 함께 돈을 바꾸러 갔다.", "py": "Bàba péi háizi huàn qián qù le."}, {"zh": "咖啡不苦不是好咖啡。", "ko": "커피가 쓰지 않으면 좋은 커피가 아니다.", "py": "Kāfēi bù kǔ búshì hǎo kāfēi."}, {"zh": "领导不负责不行。", "ko": "지도자가 책임지지 않으면 안 된다.", "py": "Lǐngdǎo bù fùzé bùxíng."}, {"zh": "成绩不及格不发毕业证。", "ko": "성적이 합격하지 않으면 졸업장을 주지 않는다.", "py": "Chéngjī bù jígé bù fā bìyèzhèng."}, {"zh": "经理", "ko": "회장, 사장, 매니저", "py": "jīnglǐ"}, {"zh": "秘书", "ko": "비서", "py": "mìshū"}, {"zh": "报纸", "ko": "신문", "py": "Nín hǎo, wǒ shì lái zhǎo gōngzuò de. Wǒ kàndào bàozhǐ shàng yǒu guì gōngsī de guǎnggào, suǒyǐ jiù...."}, {"zh": "客人", "ko": "소님", "py": "Wáng jīnglǐ péi kèrén cānguān qù le. Qǐng xiān bǎ nín de jiǎnlì gěi wǒ yī fèn."}, {"zh": "参观", "ko": "참관하다, 견학하다", "py": "cānguān"}, {"zh": "简历", "ko": "이력서", "py": "jiǎnlì"}, {"zh": "证明", "ko": "증명", "py": "Yǒu xuélì zhèngmíng ma?"}, {"zh": "毕业证", "ko": "졸업증서", "py": "Yǒu. Zhè shì bìyèzhèng de fùyìnjiàn."}, {"zh": "发展", "ko": "발전하다", "py": "fāzhǎn"}, {"zh": "前途", "ko": "전망", "py": "qiántú"}, {"zh": "能力", "ko": "능력", "py": "nénglì"}, {"zh": "技术", "ko": "기술", "py": "jìshù"}, {"zh": "增加", "ko": "증가하다", "py": "zēngjiā"}, {"zh": "收入", "ko": "수입", "py": "shōurù"}, {"zh": "面试", "ko": "면접시험(을 치르다)", "py": "miànshì"}, {"zh": "通知", "ko": "통지하다, 알리다", "py": "tōngzhī"}, {"zh": "其中", "ko": "그중", "py": "Wǒmen gōngsī měinián dōu zhāo yīxiē xīn zhíyuán, qízhōng yǒu bùshǎo zhōngniánrén gěi wǒ liúxià le hěn hǎo de yìnxìang."}, {"zh": "印象", "ko": "인상", "py": "yìnxiàng"}, {"zh": "年龄", "ko": "나이, 연령", "py": "Yīnwèi tāmen niánlíng bǐjiào dà, dōu gōngzuò guò yīduàn shíjiān, suǒyǐ tāmen dǒng jìshù, yǒu jīngyàn, nénggòu hěn kuài shúxi gōngzuò, gōngzuò qǐlái"}, {"zh": "比较", "ko": "비교적", "py": "Yīnwèi tāmen niánlíng bǐjiào dà, dōu gōngzuò guò yīduàn shíjiān, suǒyǐ tāmen dǒng jìshù, yǒu jīngyàn, nénggòu hěn kuài shúxi gōngzuò, gōngzuò qǐlái"}, {"zh": "熟悉", "ko": "잘 알다, 익숙하다", "py": "shúxi"}, {"zh": "负责", "ko": "책임감이 강하다, 책임지다", "py": "fùzé"}, {"zh": "提高", "ko": "향상시키다", "py": "tígāo"}, {"zh": "及格", "ko": "합격하다", "py": "jígé"}, {"zh": "坚持", "ko": "견지하다", "py": "Wǒ yě zhīdào, kěshì tiāntiān jiānchí bù róngyì. Yī tíng xiàlái, huì gèng pàng."}], "vocab": []}, "14과": {"pairs": [{"zh": "王丽，听说你要出国留学了。", "ko": "듣자 하니 네가 해외로 유학 간다단데.", "py": "Wáng Lì, tīngshuō nǐ yào chūguó liúxué le."}, {"zh": "我刚申请，八字还没一撇呢。", "ko": "이제 막 신청했어, 아직 멀었어.", "py": "Wǒ gāng shēnqǐng, bā zì hái méi yī piě ne."}, {"zh": "出国留学都要办什么手续？", "ko": "해외로 유학 가려면 어떤 절차를 밟아야 하니?", "py": "Chūguó liúxué dōu yào bàn shénme shǒuxù?"}, {"zh": "先考英语，比如托福，GRE，雅思什么的。成绩好才能申请到奖学金。", "ko": "일단 영어 시험을 봐야 해, 예를 들어 TOEFL, GRE, IELTS와 같은 것들 말이야. 성적이 좋아야지만 장학금을 신청할 수 있어.", "py": "Xiān kǎo Yīngyǔ, bǐrú Tuōfú, GRE, Yǎsī shénme de. Chéngjī hǎo cái néng shēnqǐng dào jiǎngxuéjīn."}, {"zh": "英语你准没问题。大家不是都叫你活词典吗？好像没有你不知道的词。", "ko": "영어는 너는 결코 문제없잖아. 다들 너를 살아 있는 사전이라고 부르지 않니? 아마 네가 모르는 단어는 없을 것 같아.", "py": "Yīngyǔ nǐ zhǔn méi wèntí. Dàjiā bú shì dōu jiào nǐ huó cídiǎn ma?"}, {"zh": "哪里，这次我没考雅思，只考了托福和GRE，成绩还没出来。我发了几封申请书，一封回复的邮件都没收到。", "ko": "무슨, 나는 이번에 IELTS 시험을 보지 않고, TOEFL과 GRE만 보았는데, 성적이 아직 안 나왔어. 나는 몇 통의 신청서를 보냈는데 아직 한 통의 답변도 받지 못했어.", "py": "Nǎlǐ, zhècì wǒ méi kǎo Yǎsī, zhǐ kǎo le Tuōfú hé GRE, chéngjī hái méi chūlái."}, {"zh": "如果有了录取通知书，手续就简单了吧？", "ko": "통지서만 있으면 다른 절차는 간단한 거지?", "py": "Rúguǒ yǒu le lùqǔ tōngzhīshū, shǒuxù jiù jiǎndān le ba?"}, {"zh": "不清楚。我只知道办护照要好几个工作日，办签证还要面谈什么的。", "ko": "확실하지 않아. 나는 단지 여권을 신청하는 데 얼마간의 근무일이 필요하고, 비자를 신청하려면 면접 같은 것을 봐야 한다는 것만 알아.", "py": "Bù qīngchu. Wǒ zhǐ zhīdào bàn hùzhào yào hǎojǐ gè gōngzuòrì."}, {"zh": "学校的录取通知书来了！", "ko": "학교 입학 통지서가 왔어!", "py": "Xuéxiào de lùqǔ tōngzhīshū lái le!"}, {"zh": "通知书怎么说？", "ko": "통지서에서 뭐래?", "py": "Tōngzhīshū zěnme shuō?"}, {"zh": "是全额奖学金！", "ko": "전액 장학금이래!", "py": "Shì quán'é jiǎngxuéjīn!"}, {"zh": "住的地方怎么安排？", "ko": "사는 곳은 어떻게 해?", "py": "Zhù de dìfang zěnme ānpái?"}, {"zh": "学校里有宿舍，也可以自己在校外租房子。为了更快地提高语言水平，学校要求外国学生第一年必须住在当地人家里。", "ko": "학교에 기숙사가 있고, 학교 밖에 직접 방을 구해서 살 수도 있어. 언어 수준을 더욱 빠르게 높이기 위해서, 학교는 외국 학생들이 첫 일 년은 반드시 현지인의 집에서 살도록 요구해.", "py": "Xuéxiào lǐ yǒu sùshè, yě kěyǐ zìjǐ zài xiàowài zū fángzi. Wèi le gèng kuài di tígāo yǔyán shuǐpíng, xuéxiào yāoqiú wàiguó xuéshēng dì-yī nián bìxū zhù zài dāngdì rén jiālǐ."}, {"zh": "有道理。", "ko": "맞는 말이다.", "py": "Wǒ hěn niánqīng, xǐhuan jǐnzhāng de shēnghuó. Wǒ mǔqīn cháng shuō: \"Bù máng bù xìngfú.\" Wǒ juéde tā shuō de yǒu dàolǐ."}, {"zh": "真为你高兴。", "ko": "정말 잘 됐다.", "py": "Yǒu dàolǐ. Wáng Lì, zhùhè nǐ! Zhēn wèi nǐ gāoxìng."}, {"zh": "是你给我带来了好消息，我得好好儿谢谢你。", "ko": "네가 가져다준 좋은 소식이니깐 내가 마땅히 너에게 고마워해야지.", "py": "Shì nǐ gěi wǒ dài lái le hǎo xiāoxi, wǒ děi hǎohāor xièxie nǐ."}, {"zh": "俗话说人各有志。王丽出国留学了，我真为她高兴。她是每年几十万出国学习的中国人中的一个。", "ko": "사람마다 각자의 뜻이 있다는 말이 있다. 왕리가 유학을 가게 되어 나는 정말 기쁘다. 그녀는 매년 해외로 유학 가는 몇 십만 중국인 중 한 명이 된 것이다.", "py": "Súhuà shuō: Rén gè yǒu zhì. Wáng Lì chūguó liúxué le, wǒ zhēn wèi tā gāoxìng. Tā shì měinián jǐshíwàn chūguó xuéxí de Zhōngguórén zhōng de yīgè."}, {"zh": "不过，我真的不想出国学习。原因很多，例如，我出国后，谁来照顾我母亲？还有我的专业更适合在国内学。", "ko": "하지만 나는 정말로 유학을 가고 싶지 않다. 이유는 아주 많다. 예를 들자면, 내가 유학을 가면 누가 어머니를 돌보겠는가? 그리고 나의 전공은 국내에서 배우는 것이 더 적합하다.", "py": "Bùguò, wǒ zhēnde bù xiǎng chūguó xuéxí. Yuányīn hěn duō, lìrú, wǒ chūguó hòu, shéi lái zhàogù wǒ mǔqīn? Hái yǒu wǒ de zhuānyè gèng shìhé zài guónèi xué."}, {"zh": "国内的条件越来越好，好的导师也越来越多，在国内学习同样能够成才。", "ko": "국내의 조건도 점점 좋아지고 있고, 좋은 지도 교수님들도 점점 많아지고 있어서 국내에서 공부해도 마찬가지로 인재가 되기에 충분하다.", "py": "Guónèi de tiáojiàn yuè lái yuè hǎo, hǎo de dǎoshī yě yuè lái yuè duō, zài guónèi xuéxí tóngyàng nénggòu chéngcái."}, {"zh": "出国", "ko": "출국하다", "py": "chūguó"}, {"zh": "申请", "ko": "신청하다", "py": "shēnqǐng"}, {"zh": "奖学金", "ko": "장학금", "py": "jiǎngxuéjīn"}, {"zh": "回复", "ko": "답장하다", "py": "huífù"}, {"zh": "邮件", "ko": "우편물", "py": "yóujiàn"}, {"zh": "录取", "ko": "채용하다, 고용하다", "py": "lùqǔ"}, {"zh": "通知书", "ko": "통지서", "py": "tōngzhīshū"}, {"zh": "护照", "ko": "여권", "py": "hùzhào"}, {"zh": "签证", "ko": "비자", "py": "qiānzhèng"}, {"zh": "面谈", "ko": "면접", "py": "miàntán"}, {"zh": "全额", "ko": "전액", "py": "quán'é"}, {"zh": "租", "ko": "세내다", "py": "zū"}, {"zh": "要求", "ko": "요구하다", "py": "yāoqiú"}, {"zh": "必须", "ko": "꼭, 반드시", "py": "bìxū"}, {"zh": "当地", "ko": "현지", "py": "dāngdì"}, {"zh": "人各有志", "ko": "개인마다 지향하는 것이 다르다", "py": "rén gè yǒu zhì"}, {"zh": "例如", "ko": "예를 들다", "py": "lìrú"}, {"zh": "专业", "ko": "전공", "py": "Bùguò, wǒ zhēnde bù xiǎng chūguó xuéxí. Yuányīn hěn duō, lìrú, wǒ chūguó hòu, shéi lái zhàogù wǒ mǔqīn? Hái yǒu wǒ de zhuānyè gèng shìhé zài guónèi"}, {"zh": "导师", "ko": "지도교수", "py": "Guónèi de tiáojiàn yuè lái yuè hǎo, hǎo de dǎoshī yě yuè lái yuè duō, zài guónèi xuéxí tóngyàng nénggòu chéngcái."}, {"zh": "成才", "ko": "인재가 되다", "py": "Guónèi de tiáojiàn yuè lái yuè hǎo, hǎo de dǎoshī yě yuè lái yuè duō, zài guónèi xuéxí tóngyàng nénggòu chéngcái."}, {"zh": "宿舍", "ko": "기숙사", "py": "sùshè"}], "vocab": []}, "필수": {"pairs": [{"zh": "我来跟你一起做饭吧。", "ko": "내가 같이 식사 준비할게요.", "py": "Wǒ lái gēn nǐ yīqǐ zuòfàn ba."}, {"zh": "结果把他爱人气哭了。", "ko": "결국 아내를 화나게 해서 울렸어요.", "py": "Jiéguǒ bǎ tā àirén qì kū le."}, {"zh": "不说那些，经验从哪儿说起呀？", "ko": "그런 말은 그만하고, 경험은 어디서부터 말하지?", "py": "Bù shuō nàxiē, jīngyàn cóng nǎr shuō qǐ ya?"}, {"zh": "你怎么认为呢？", "ko": "당신은 어떻게 생각하세요?", "py": "Nǐ zěnme rènwéi ne?"}, {"zh": "只在一点上讨论，那就太简单了。", "ko": "한 가지 점에 대해서만 토론하면 너무 단순해.", "py": "Zhǐ zài yīdiǎn shàng tǎolùn, nà jiù tài jiǎndān le."}, {"zh": "麻烦您帮我叫一下儿刘山。", "ko": "류산을 불러주시겠어요?", "py": "Máfan nín bāng wǒ jiào yīxiàr Liú Shān."}, {"zh": "您知道怎么和他联系吗？", "ko": "그와 어떻게 연락하는지 아세요?", "py": "Nín zhīdào zěnme hé tā liánxì ma?"}, {"zh": "请问，王经理在吗？", "ko": "실례지만, 왕 매니저 계세요?", "py": "Qǐngwèn, Wáng jīnglǐ zài ma?"}, {"zh": "我对这份工作感兴趣。", "ko": "저는 이 업무에 흥미가 있습니다.", "py": "Wǒ duì zhè fèn gōngzuò gǎn xìngqù."}, {"zh": "我认为在这里工作有前途。", "ko": "저는 여기서 일하는 것이 전망이 있다고 생각합니다.", "py": "Wǒ rènwéi zài zhèlǐ gōngzuò yǒu qiántú."}, {"zh": "什么时候办的喜事？", "ko": "결혼식은 언제 올린 거야?", "py": "Shénme shíhou bàn de xǐshì?"}, {"zh": "怪不得这几天他没来上班呢。", "ko": "어쩐지 요 며칠 그가 출근하지 않더라니.", "py": "Guàibude zhè jǐ tiān tā méi lái shàngbān ne."}, {"zh": "是你们哪，快请进！", "ko": "너희구나, 어서 들어와!", "py": "Shì nǐmen na, kuài qǐng jìn!"}, {"zh": "请你参加我们的婚礼。", "ko": "우리 결혼식에 참석해 주세요.", "py": "Qǐng nǐ cānjiā wǒmen de hūnlǐ."}, {"zh": "大家说，他们的故事怎么样？", "ko": "여러분, 그들의 이야기 어떤가요?", "py": "Dàjiā shuō, tāmen de gùshi zěnmeyàng?"}, {"zh": "人跟人不一样，拿我来说吧，主要是看电视。", "ko": "사람마다 달라요, 저로 말하자면 주로 TV를 봐요.", "py": "Rén gēn rén bù yīyàng. Ná wǒ lái shuō ba, zhǔyào shì kàn diànshì."}, {"zh": "难道你不喜欢流行歌曲吗？", "ko": "설마 너 유행가를 좋아하지 않는 거니?", "py": "Nándào nǐ bù xǐhuan liúxíng gēqǔ ma?"}, {"zh": "不太喜欢，主要是不常听。", "ko": "별로 좋아하지 않아요, 주로 자주 안 듣거든요.", "py": "Bù tài xǐhuan, zhǔyào shì bù cháng tīng."}, {"zh": "这没什么奇怪的，各人有各人的爱好嘛。", "ko": "이상할 것 없어요, 각자 각자의 취미가 있잖아요.", "py": "Zhè méi shénme qíguài de, gèrén yǒu gèrén de àihào ma."}, {"zh": "请朋友们来聚聚，吃顿饭吧？", "ko": "친구들을 불러 모여서 식사를 하는 게 어때요?", "py": "Qǐng péngyoumen lái jùjù, chī dùn fàn ba?"}, {"zh": "我建议来个自助餐。", "ko": "저는 뷔페로 하자고 제안해요.", "py": "Wǒ jiànyì lái gè zìzhùcān."}, {"zh": "我早上起得晚，还不太饿。", "ko": "저는 아침에 늦게 일어나서 아직 별로 배가 안 고파요.", "py": "Wǒ zǎoshang qǐ de wǎn, hái bú tài è."}, {"zh": "自己觉得舒服比什么都强。", "ko": "스스로 편하다고 느끼는 게 무엇보다 중요해.", "py": "Zìjǐ juéde shūfu bǐ shénme dōu qiáng."}, {"zh": "他们不一定非让你喝不可。", "ko": "그들이 반드시 너에게 마시라고 강요하지는 않을 거야.", "py": "Tāmen bù yīdìng fēi ràng nǐ hē bùkě."}, {"zh": "不养狗，养只猫吧。", "ko": "개는 키우지 말고 고양이를 키우자.", "py": "Bù yǎng gǒu, yǎng zhī māo ba."}, {"zh": "像一幅画儿似的，要多美有多美。", "ko": "마치 그림 같아서 아름답기 짝이 없어.", "py": "Xiàng yī fú huàr shìde, yào duō měi yǒu duō měi."}, {"zh": "在城市里养狗，有很多麻烦事。", "ko": "도시에서 개를 키우면 귀찮은 일이 많아.", "py": "Zài chéngshì lǐ yǎng gǒu, yǒu hěn duō máfan shì."}, {"zh": "农村的生活条件哪比得上城市呢？", "ko": "농촌의 생활 조건이 어떻게 도시와 비교가 되겠어?", "py": "Nóngcūn de shēnghuó tiáojiàn nǎ bǐ de shàng chéngshì ne?"}, {"zh": "那是以前，现在变化可大了。", "ko": "그건 예전 얘기고, 지금은 변화가 정말 커.", "py": "Nà shì yǐqián, xiànzài biànhuà kě dà le."}, {"zh": "听说你要出国留学了。", "ko": "듣자 하니 네가 해외로 유학 간다던데.", "py": "Tīngshuō nǐ y ", "ko": "우리 막 새집으로 이사했는데, 친구들을 모아서 식사 한 끼 할까요?"}, {"words": ["好啊", "我建议来", "个自助餐"], "a": "好啊，我建议来个自助餐。", "hint": "문장 어순 배열", "ko": "좋지요, 나는 뷔페 형식을 추천해요."}, {"words": ["谁爱吃", "什么", "就取", "什么"], "a": "谁爱吃什么就取什么。", "hint": "문장 어순 배열", "ko": "먹고싶으면 누구든 가져다 먹게요."}, {"words": ["除了", "啤酒", "再来点儿葡萄酒", "什么", "的"], "a": "除了啤酒，再来点儿葡萄酒什么的。", "hint": "문장 어순 배열", "ko": "맥주 외에 와인 같은 것들도 좀 두죠."}, {"words": ["你是", "不是", "在减肥"], "a": "你是不是在减肥？", "hint": "不是...就是", "ko": "다이어트 하는 거 아니니?"}, {"words": ["你别笑话我", "这几个月我", "有长了好几斤", "越来越", "胖了"], "a": "你别笑话我，这几个月我有长了好几斤，越来越胖了。", "hint": "越来越: 갈수록", "ko": "비웃지 마, 최근 몇 개월 몇 킬로가 더 늘었어, 갈수록 뚱뚱해지고 있단 말이야."}, {"words": ["我真羡慕你", "吃什么", "都不长胖"], "a": "我真羡慕你，吃什么都不长胖。", "hint": "문장 어순 배열", "ko": "난 네가 정말 부럽다. 뭘 먹어도 살이 안 찌잖니."}, {"words": ["要是真想瘦", "一点儿", "最好的办", "法是运动"], "a": "要是真想瘦一点儿，最好的办法是运动。", "hint": "一点儿...也没有: 조금도", "ko": "만약 정말 날씬해지고 싶다면, 가장 좋은 방법은 운동이야."}, {"words": ["我喜欢吃中餐", "可是有的时", "候很不习惯"], "a": "我喜欢吃中餐，可是有的时候很不习惯。", "hint": "문장 어순 배열", "ko": "나는 중국 음식을 좋아하지만 어떤 경우에는 정말 익숙하지 않아."}, {"words": ["喝酒的时候", "主人太热情", "总是让我喝"], "a": "喝酒的时候，主人太热情，总是让我喝。", "hint": "문장 어순 배열", "ko": "술을 마실 때 주인이 너무 친절해서 나에게 늘 마시라고 해."}, {"words": ["我常常不", "好意思不喝", "有时候就喝多了"], "a": "我常常不好意思不喝，有时候就喝多了。", "hint": "문장 어순 배열", "ko": "종종 안 마시는 것이 미안해서 어떤 때는 너무 많이 마셔."}, {"words": ["只要", "你告诉", "他们", "你不能", "喝酒", "他们", "不一定", "非让你喝不可"], "a": "只要你告诉他们你不能喝酒，他们不一定非让你喝不可。", "hint": "非...不可: 반드시", "ko": "네가 술을 못 마신다고 말하면, 그들이 너에게 마시지 않으면 안 된다고 하지는 않을 거야."}, {"words": ["如果", "我是你", "我就说：“谢谢", "！我不会喝酒。”"], "a": "如果我是你，我就说：“谢谢！我不会喝酒。”。", "hint": "如果...就: ~하면", "ko": "내가 만약 너라면 저는 “감사합니다!! 전 술을 잘 못합니다”"}, {"words": ["“我只能少来", "一点儿", "。”"], "a": "“我只能少来一点儿。”。", "hint": "一点儿...也没有: 조금도", "ko": "“저는 술을 조금밖에 마시지 못합니다”"}, {"words": ["左手拿叉", "右手拿刀", "切肉切菜", "实在麻烦"], "a": "左手拿叉，右手拿刀，切肉切菜, 实在麻烦。", "hint": "拿...来说: ~으로 말하자면", "ko": "왼손으로 포크를 들고 오른손으로 나이프를 들고 고기와 채소를 자르려니 정말 불편했어."}, {"words": ["吃鸡", "吃鱼", "吃面条儿", "就更困难了"], "a": "吃鸡，吃鱼，吃面条儿，就更困难了。", "hint": "문장 어순 배열", "ko": "특히 닭, 생선, 국수를 먹는 것이 훨씬 어려웠어."}, {"words": ["这就跟", "我们", "不习惯用筷子", "一样。不练不行"], "a": "这就跟我们不习惯用筷子一样。不练不行。", "hint": "문장 어순 배열", "ko": "우리가 젓가락 사용하는 게 익숙하지 않은 것과 같네. 연습하지 않으면 안 돼."}, {"words": ["你们吃早饭", "的习惯也和", "我们", "不太一样"], "a": "你们吃早饭的习惯也和我们不太一样。", "hint": "문장 어순 배열", "ko": "너희의 아침 식사도 우리와 달라."}, {"words": ["你们喜欢吃面包", "和从冰箱里刚", "拿出来的凉牛奶", "同时", "还要喝一些果汁"], "a": "你们喜欢吃面包，和从冰箱里刚拿出来的凉牛奶，同时，还要喝一些果汁。", "hint": "拿...来说: ~으로 말하자면", "ko": "너희는 빵을 즐겨 먹고 냉장고에서 막 꺼낸 차가운 우유를 마시면서 과일 주스도 마시잖아."}, {"words": ["我习惯喝热豆浆", "吃油条", "再来一个煮鸡蛋"], "a": "我习惯喝热豆浆，吃油条，再来一个煮鸡蛋。", "hint": "문장 어순 배열", "ko": "우리는 따뜻한 더우장을 마시고 여우탸오를 먹고 또 삶은 달걀을 먹어."}, {"words": ["上网聊天儿比", "什么", "都轻松"], "a": "上网聊天儿比什么都轻松。", "hint": "문장 어순 배열", "ko": "인터넷에서 채팅하는 것이 무엇보다 쉽다."}, {"words": ["不上课比", "什么", "都高兴"], "a": "不上课比什么都高兴。", "hint": "문장 어순 배열", "ko": "수업하지 않는 것이 무엇보다 즐겁다."}, {"words": ["要是学", "那个", "国家的语言", "最好到", "那个", "国家去"], "a": "要是学那个国家的语言，最好到那个国家去。", "hint": "문장 어순 배열", "ko": "만약 어떤 국가의 언어를 배우려면 그 국가에 가는 것이 제일 좋다."}, {"words": ["一有声音", "我会更睡不着觉。소리가 나기만 ", "하면 나는 더 잠들지 못해요."], "a": "一有声音，我会更睡不着觉。소리가 나기만 하면 나는 더 잠들지 못해요.。", "hint": "문장 어순 배열", "ko": "소리가 나기만 하면 나는 더 잠들지 못해요."}, {"words": ["一说错", "心里会更紧张。말을 틀리기만", " 하면 마음이 더 긴장돼요."], "a": "一说错，心里会更紧张。말을 틀리기만 하면 마음이 더 긴장돼요.。", "hint": "문장 어순 배열", "ko": "말을 틀리기만 하면 마음이 더 긴장돼요."}], "13과": [{"words": ["这个孩子", "要多", "可爱", "有多可爱"], "a": "这个孩子要多可爱有多可爱。", "hint": "要多...有多...", "ko": "이 아이는 정말 귀엽기 짝이 없다."}, {"words": ["一点儿", "好处", "也", "没有"], "a": "一点儿好处也没有。", "hint": "一点儿+명사+也没有", "ko": "좋은 점이 조금도 없다."}, {"words": ["而且", "城市的污染", "越来越", "严重", "对健康", "一点儿好处也没有"], "a": "而且，城市的污染越来越严重，对健康一点儿好处也没有。", "hint": "越来越+형용사", "ko": "좋은 점이 조금도 없다."}, {"words": ["农村的风景", "却", "像画儿似的", "要多美有多美"], "a": "农村的风景却像画儿似的，要多美有多美的。", "hint": "却 / 像~似的", "ko": "도시의 오염은 점점 심해지는데, 농촌의 풍경은 오히려 그림처럼 아름답기 그지없다."}, {"words": ["我", "先", "回家", "商量商量", "再", "做决定"], "a": "我先回家商量商量再做决定。", "hint": "先...再...", "ko": "먼저 집에 돌아가서 상의 좀 해보고 결정할게요."}, {"words": ["那里", "不一定", "比", "城市", "差"], "a": "那里不一定比城市差。", "hint": "不一定+比자문", "ko": "그곳이 반드시 도시보다 못한 것은 아니야."}, {"words": ["环境", "优美", "空气", "新鲜"], "a": "环境优美，空气新鲜。", "hint": "병렬 서술", "ko": "내 고향은 환경이 아름답고 공기도 신선해."}, {"words": ["这里在农村", "和城市之间", "环境很好"], "a": "这里在农村和城市之间，环境很好。", "hint": "문장 어순 배열", "ko": "이곳은 농촌과 도시의 중간지점이라 환경이 아주 좋군요."}, {"words": ["您看", "中学在那儿", "小学在这儿", "都很近"], "a": "您看，中学在那儿，小学在这儿，都很近。", "hint": "문장 어순 배열", "ko": "좀 보세요, 저기가 중고등학교이고 초등학교는 여기예요. 모두 가까워요."}, {"words": ["价钱", "怎么", "样"], "a": "价钱怎么样？", "hint": "문장 어순 배열", "ko": "가격이 어떻게 되지요?"}, {"words": ["小狗跑跑跳跳", "的样子太可爱了", "我也想养"], "a": "小狗跑跑跳跳的样子太可爱了，我也想养。", "hint": "문장 어순 배열", "ko": "강아지가 이리저리 뛰어다니는 모습을 보면 정말 귀여울 거야. 저도 기르고 싶어요."}, {"words": ["小狗是可爱", "但是", "我反对你们养"], "a": "小狗是可爱，但是我反对你们养。", "hint": "문장 어순 배열", "ko": "강아지가 귀엽긴 하지. 그렇지만 나는 너희가 키우는 것은 반대야."}, {"words": ["我想养只白猫", "有一对蓝", "眼睛的白猫"], "a": "我想养只白猫，有一对蓝眼睛的白猫。", "hint": "문장 어순 배열", "ko": "난 하얀 고양이를 키우고 싶어. 파란색 눈의 새하얀 고양이."}, {"words": ["我还得问问", "你们的爸爸是", "什么", "意见"], "a": "我还得问问你们的爸爸是什么意见。", "hint": "문장 어순 배열", "ko": "난 너희 아빠는 의견이 어떤지 물어봐야겠다."}, {"words": ["我真不明白", "别人都想办", "法往城市里搬", "你却非要回", "农村的老家去"], "a": "我真不明白，别人都想办法往城市里搬，你却非要回农村的老家去。", "hint": "非...不可: 반드시", "ko": "난 정말 이해 못 하겠다. 다른 사람들은 도시로 이사 오려고 애쓰는데 넌 오히려 농촌에 있는 고향으로 가려고 하다니"}, {"words": ["这到底是", "怎么", "回事"], "a": "这到底是怎么回事？", "hint": "문장 어순 배열", "ko": "도대체 이게 어떻게 된 일이니?"}, {"words": ["我喜欢农村生活", "喜欢大自然", "和那里的农村"], "a": "我喜欢农村生活，喜欢大自然和那里的农村。", "hint": "문장 어순 배열", "ko": "나는 농촌 생활이 좋고 대자연과 그곳의 농민들이 좋아."}, {"words": ["咱们的老家", "环境优美", "空气新鲜"], "a": "咱们的老家，环境优美，空气新鲜。", "hint": "문장 어순 배열", "ko": "내 고향은 환경이 아름답고 공기도 신선해."}, {"words": ["天蓝蓝的", "水绿绿的", "马啊", "牛啊", "羊啊在草", "地上吃草"], "a": "天蓝蓝的，水绿绿的，马啊，牛啊，羊啊在草地上吃草。", "hint": "문장 어순 배열", "ko": "하늘은 파랗고 물은 푸르며 말이며 소, 양들이 초원에서 풀을 뜯고 있지."}, {"words": ["那是以前", "在农村劳动", "和生活都很苦"], "a": "那是以前，在农村劳动和生活都很苦。", "hint": "문장 어순 배열", "ko": "예전에야 농촌에서 일하고 생활하는 게 매우 힘들었지."}, {"words": ["而且", "工业", "交通等多", "城市的污染", "越来越", "严重了", "对健康", "一点儿", "好处也没有"], "a": "而且，工业，交通等多城市的污染越来越严重了，对健康一点儿好处也没有。", "hint": "一点儿...也没有: 조금도", "ko": "게다가 산업, 교통 등 도시의 오염은 갈수록 심각해지니 건강에 조금도 좋을 게 없어."}, {"words": ["小猫", "小狗可爱极了", "爸爸", "妈妈却反对", "我们", "养狗"], "a": "小猫，小狗可爱极了，爸爸，妈妈却反对我们养狗。", "hint": "문장 어순 배열", "ko": "고양이, 강아지는 아주 귀엽지만, 아빠, 엄마는 우리가 강아지 기르는 것을 반대한다."}, {"words": ["城市的污染", "越来越", "严重", "农村的风景", "却像画儿似的", "要多美有多美的"], "a": "城市的污染越来越严重，农村的风景却像画儿似的，要多美有多美的。", "hint": "要多...有多: 매우 ~하다", "ko": "도시의 오염은 점점 심해지는데, 농촌의 풍경은 오히려 그림처럼 아름답기 그지없다."}, {"words": ["我也不清楚", "到底是我说错了", "还是", "他听错了"], "a": "我也不清楚，到底是我说错了，还是他听错了？", "hint": "문장 어순 배열", "ko": "나도 잘 모르겠어, 도대체 내가 잘못 말한 거야, 아니면 그가 잘못 들은 거야?"}, {"words": ["你想过没", "有？到底", "为什么", "会这样"], "a": "你想过没有？到底为什么会这样？", "hint": "문장 어순 배열", "ko": "넌 생각해 본 적이 있니? 도대체 왜 이렇게 된 거지?"}, {"words": ["对不起", "今天我", "一点儿", "时间也没有"], "a": "对不起，今天我一点儿时间也没有。", "hint": "一点儿...也没有: 조금도", "ko": "죄송합니다, 제가 오늘은 시간이 조금도 없어요."}, {"words": ["刚来中国的时候", "我一点儿", "汉语也不会说"], "a": "刚来中国的时候，我一点儿汉语也不会说。", "hint": "一点儿...也没有: 조금도", "ko": "막 중국에 왔을 때, 나는 중국어를 조금도 하지 못했다."}, {"words": ["昨天晚上", "出去玩儿了", "一点儿", "觉都没睡"], "a": "昨天晚上出去玩儿了，一点儿觉都没睡。", "hint": "一点儿...也没有: 조금도", "ko": "어제 밤에 나가서 노느라, 잠을 조금도 자지 못했다."}], "14과": [{"words": ["一封", "回复的邮件", "都", "没收到"], "a": "一封回复的邮件都没收到。", "hint": "一...都没: 하나도 ~없다", "ko": "무슨, 나는 이번에 IELTS 시험을 보지 않고, TOEFL과 GRE만 보았는데, 성적이 아직 안 나왔어. 나는 몇 통의 신청서를 보냈는데 아직 한 통의 답변도 받지 못했어."}, {"words": ["如果", "有了", "录取通知书", "手续", "就", "简单了", "吧"], "a": "如果有了录取通知书，手续就简单了吧？", "hint": "如果...就", "ko": "통지서만 있으면 다른 절차는 간단한 거지?"}, {"words": ["学校", "要求", "外国学生", "第一年", "必须", "住在", "当地人家里"], "a": "学校要求外国学生第一年必须住在当地人家里。", "hint": "要求...必须", "ko": "학교에 기숙사가 있고, 학교 밖에 직접 방을 구해서 살 수도 있어. 언어 수준을 더욱 빠르게 높이기 위해서, 학교는 외국 학생들이 첫 일 년은 반드시 현지인의 집에서 살도록 요구해."}, {"words": ["国内的条件", "越来越", "好", "好的导师", "也", "越来越", "多"], "a": "国内的条件越来越好，好的导师也越来越多。", "hint": "越来越+형용사", "ko": "국내의 조건도 점점 좋아지고 있고, 좋은 지도 교수님들도 점점 많아지고 있어서 국내에서 공부해도 마찬가지로 인재가 되기에 충분하다."}, {"words": ["我出国后", "谁来", "照顾", "我母亲"], "a": "我出国后，谁来照顾我母亲？", "hint": "출국 후 의문문", "ko": "하지만 나는 정말로 유학을 가고 싶지 않다. 이유는 아주 많다. 예를 들자면, 내가 유학을 가면 누가 어머니를 돌보겠는가? 그리고 나의 전공은 국내에서 배우는 것이 더 적합하다."}, {"words": ["我的专业", "更", "适合", "在国内", "学"], "a": "我的专业更适合在国内学。", "hint": "更+동사: 더욱 ~하다", "ko": "하지만 나는 정말로 유학을 가고 싶지 않다. 이유는 아주 많다. 예를 들자면, 내가 유학을 가면 누가 어머니를 돌보겠는가? 그리고 나의 전공은 국내에서 배우는 것이 더 적합하다."}, {"words": ["在国内", "学习", "同样", "能够", "成才"], "a": "在国内学习同样能够成才。", "hint": "同样: 마찬가지로", "ko": "국내의 조건도 점점 좋아지고 있고, 좋은 지도 교수님들도 점점 많아지고 있어서 국내에서 공부해도 마찬가지로 인재가 되기에 충분하다."}, {"words": ["为了", "更快地", "提高", "语言水平", "学校", "要求", "外国学生", "住在当地人家里"], "a": "为了更快地提高语言水平，学校要求外国学生住在当地人家里。", "hint": "为了...要求...", "ko": ""}, {"words": ["王丽", "听说你要", "出国留学了"], "a": "王丽，听说你要出国留学了。", "hint": "문장 어순 배열", "ko": "듣자 하니 네가 해외로 유학 간다단데."}, {"words": ["出国留学都要办", "什么", "手续"], "a": "出国留学都要办什么手续？", "hint": "문장 어순 배열", "ko": "해외로 유학 가려면 어떤 절차를 밟아야 하니?"}, {"words": ["先考英语", "比如托福", "GRE", "雅思", "什么", "的。成绩好", "才能", "申请到奖学金"], "a": "先考英语，比如托福，GRE，雅思什么的。成绩好才能申请到奖学金。", "hint": "문장 어순 배열", "ko": "일단 영어 시험을 봐야 해, 예를 들어 TOEFL, GRE, IELTS와 같은 것들 말이야. 성적이 좋아야지만 장학금을 신청할 수 있어."}, {"words": ["英语你准", "没问题。", "大家", "不是", "都叫你活", "词典吗？", "好像", "没有你不", "知道的词"], "a": "英语你准没问题。大家不是都叫你活词典吗？好像没有你不知道的词。", "hint": "不是...就是", "ko": "영어는 너는 결코 문제없잖아. 다들 너를 살아 있는 사전이라고 부르지 않니? 아마 네가 모르는 단어는 없을 것 같아."}, {"words": ["不清楚。我只知道办", "护照要好几个工作日", "办签证还要面谈", "什么", "的"], "a": "不清楚。我只知道办护照要好几个工作日，办签证还要面谈什么的。", "hint": "문장 어순 배열", "ko": "확실하지 않아. 나는 단지 여권을 신청하는 데 얼마간의 근무일이 필요하고, 비자를 신청하려면 면접 같은 것을 봐야 한다는 것만 알아."}, {"words": ["通知书", "怎么", "说"], "a": "通知书怎么说？", "hint": "문장 어순 배열", "ko": "통지서에서 뭐래?"}, {"words": ["住的地方", "怎么", "安排"], "a": "住的地方怎么安排？", "hint": "문장 어순 배열", "ko": "사는 곳은 어떻게 해?"}, {"words": ["是你给我带", "来了好消息", "我得好好", "儿谢谢你"], "a": "是你给我带来了好消息，我得好好儿谢谢你。", "hint": "문장 어순 배열", "ko": "네가 가져다준 좋은 소식이니깐 내가 마땅히 너에게 고마워해야지."}, {"words": ["俗话说人各有志", "。王丽出国留学了", "我真为她高兴。她是每年几十", "万出国学习的中国人中的一个"], "a": "俗话说人各有志。王丽出国留学了，我真为她高兴。她是每年几十万出国学习的中国人中的一个。", "hint": "문장 어순 배열", "ko": "사람마다 각자의 뜻이 있다는 말이 있다. 왕리가 유학을 가게 되어 나는 정말 기쁘다. 그녀는 매년 해외로 유학 가는 몇 십만 중국인 중 한 명이 된 것이다."}, {"words": ["国内的条件", "越来越", "好好的导师也", "越来越", "多在国内学习同样", "能够", "成才"], "a": "国内的条件越来越好，好的导师也越来越多，在国内学习同样能够成才。", "hint": "越来越: 갈수록", "ko": "국내의 조건도 점점 좋아지고 있고, 좋은 지도 교수님들도 점점 많아지고 있어서 국내에서 공부해도 마찬가지로 인재가 되기에 충분하다."}], "필수": [{"words": ["我来", "跟你", "一起", "做饭吧"], "a": "我来跟你一起做饭吧。", "hint": "来+跟...一起", "ko": "내가 같이 식사 준비할게요."}, {"words": ["结果", "把他爱人", "气哭了"], "a": "结果把他爱人气哭了。", "hint": "把자문+결과보어", "ko": "결국 아내를 화나게 해서 울렸어요."}, {"words": ["你", "怎么", "认为呢"], "a": "你怎么认为呢？", "hint": "怎么+동사", "ko": "당신은 어떻게 생각하세요?"}, {"words": ["只在", "一点上", "讨论", "那就", "太简单了"], "a": "只在一点上讨论，那就太简单了。", "hint": "只...那就...", "ko": "한 가지 점에 대해서만 토론하면 너무 단순해."}, {"words": ["麻烦您", "帮我", "叫一下儿", "刘山"], "a": "麻烦您帮我叫一下儿刘山。", "hint": "麻烦+帮我", "ko": "류산을 불러주시겠어요?"}, {"words": ["您知道", "怎么", "和他", "联系吗"], "a": "您知道怎么和他联系吗？", "hint": "知道怎么...", "ko": "그와 어떻게 연락하는지 아세요?"}, {"words": ["我", "对", "这份工作", "感兴趣"], "a": "我对这份工作感兴趣。", "hint": "对...感兴趣", "ko": "저는 이 업무에 흥미가 있습니다."}, {"words": ["我认为", "在这里", "工作", "有前途"], "a": "我认为在这里工作有前途。", "hint": "认为+판단문", "ko": "저는 여기서 일하는 것이 전망이 있다고 생각합니다."}, {"words": ["怪不得", "这几天", "他", "没来上班呢"], "a": "怪不得这几天他没来上班呢。", "hint": "怪不得", "ko": "어쩐지 요 며칠 그가 출근하지 않더라니."}, {"words": ["人跟人", "不一样", "拿我", "来说吧", "主要是", "看电视"], "a": "人跟人不一样，拿我来说吧，主要是看电视。", "hint": "拿...来说", "ko": "사람마다 달라요, 저로 말하자면 주로 TV를 봐요."}, {"words": ["难道", "你", "不喜欢", "流行歌曲吗"], "a": "难道你不喜欢流行歌曲吗？", "hint": "难道...吗", "ko": "설마 너 유행가를 좋아하지 않는 거니?"}, {"words": ["这", "没什么奇怪的", "各人", "有各人的", "爱好嘛"], "a": "这没什么奇怪的，各人有各人的爱好嘛。", "hint": "各人有各人的", "ko": "이상할 것 없어요, 각자 각자의 취미가 있잖아요."}, {"words": ["自己", "觉得舒服", "比什么", "都强"], "a": "自己觉得舒服比什么都强。", "hint": "比什么都强", "ko": "스스로 편하다고 느끼는 게 무엇보다 중요해."}, {"words": ["他们", "不一定", "非让你", "喝不可"], "a": "他们不一定非让你喝不可。", "hint": "不一定+非...不可", "ko": "그들이 반드시 너에게 마시라고 강요하지는 않을 거야."}, {"words": ["像", "一幅画儿", "似的", "要多美", "有多美"], "a": "像一幅画儿似的，要多美有多美。", "hint": "像~似的+要多...有多", "ko": "마치 그림 같아서 아름답기 짝이 없어."}, {"words": ["农村的", "生活条件", "哪比得上", "城市呢"], "a": "农村的生活条件哪比得上城市呢？", "hint": "哪比得上: 어떻게 ~에 비하겠는가", "ko": "농촌의 생활 조건이 어떻게 도시와 비교 <style>
:root{
  --bg:#f6f4f0;--surface:#fff;--surface2:#f0ede6;

  --red:#c0392b;--red-l:#fdecea;
  --green:#2e7d52;--green-l:#e6f4ec;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,0.06);}
.hdr-logo{display:flex;align-items:center;gap:9px;}
.hdr-icon{width:30px;height:30px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.hdr-title{font-size:15px;font-weight:700;}
.hdr-score{font-size:13px;color:var(--text2);}
.hdr-score strong{color:var(--text);font-size:15px;font-weight:700;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 54px);}

/* SIDEBAR */
.sb{background:var(--surface);border-right:1px solid var(--border);padding:16px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:0 16px 7px;}
.sb-btn{display:block;width:100%;padding:8px 16px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-left:3px solid transparent;text-align:left;cursor:pointer;transition:all .15s;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.sb-btn:hover{background:var(--bg);color:var(--text);}
.sb-btn.on{background:var(--purple-l);color:var(--purple);border-left-color:var(--purple);font-weight:700;}
.sb-btn .cnt{float:right;font-size:11px;font-weight:400;color:var(--text3);background:var(--surface2);padding:1px 6px;border-radius:10px;}
.sb-btn.on .cnt{background:var(--purple-m);color:#fff;}
.sb-div{height:1px;background:var(--border);margin:8px 16px;}
.sb-sub{font-size:11px;color:var(--text3);font-weight:400;}

/* MAIN */
.main{padding:20px;max-width:700px;}

/* TYPE TABS */
.ttabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px;}
.ttab{padding:4px 12px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.ttab:hover{border-color:var(--purple-m);color:var(--purple);}
.ttab.on{background:var(--purple);border-color:var(--purple);color:#fff;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;text-align:center;}
.sl{font-size:11px;color:var(--text3);margin-bottom:3px;}
.sv{font-size:20px;font-weight:700;}
.sv.ok{color:var(--green);} .sv.ng{color:var(--red);}

/* PROGRESS */
.pw{margin-bottom:18px;}
.pi{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:5px;}
.pt{height:4px;background:var(--surface2);border-radius:2px;}
.pf{height:100%;background:var(--purple);border-radius:2px;transition:width .4s ease;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:14px;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.bdg{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.b{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
.b-t{background:var(--purple-l);color:var(--purple);}
.b-l{background:var(--teal-l);color:var(--teal);}
.qn{font-size:12px;color:var(--text3);margin-bottom:6px;}
.qt{font-size:19px;font-weight:500;color:var(--text);line-height:1.7;margin-bottom:6px;font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.qk{font-size:13px;color:var(--text2);margin-bottom:12px;}
.qh{font-size:12px;color:var(--text3);margin-bottom:10px;font-style:italic;}
.pnote{font-size:11px;color:var(--text3);background:var(--surface2);border-radius:var(--rs);padding:5px 9px;margin-bottom:10px;}
.uline{text-decoration:underline;text-decoration-color:var(--purple);text-underline-offset:3px;font-weight:700;color:var(--purple);}

/* INPUT */
.ai{width:100%;padding:9px 13px;font-size:15px;border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s;}
.ai:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(108,95,188,.1);background:#fff;}
.ai:disabled{opacity:.6;cursor:default;}

/* BUTTONS */
.brow{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;align-items:center;}
.btn{padding:7px 16px;font-size:13px;font-weight:500;border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;background:var(--surface);color:var(--text);transition:all .15s;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.btn:hover{background:var(--surface2);}
.btn.pr{background:var(--purple);border-color:var(--purple);color:#fff;}
.btn.pr:hover{background:#5749a8;}
.btn.ht{font-size:12px;color:var(--purple);border-color:var(--purple-m);}
.btn.ht:hover{background:var(--purple-l);}

/* HINT BOX */
.hbox{margin-top:9px;padding:8px 12px;background:var(--purple-l);border-radius:var(--rs);font-size:13px;color:var(--purple);border-left:3px solid var(--purple);display:none;}
.hbox.on{display:block;}

/* RESULT */
.res{margin-top:10px;padding:10px 14px;border-radius:var(--rs);font-size:14px;line-height:1.6;display:none;}
.res.on{display:block;}
.res.ok{background:var(--green-l);border:1px solid #9fd4b5;color:var(--green);}
.res.ng{background:var(--red-l);border:1px solid #f5b7b1;color:var(--red);}
.ans{font-weight:700;}

/* WORD ORDER */
.al{font-size:12px;color:var(--text3);margin-bottom:5px;}
.pool{display:flex;flex-wrap:wrap;gap:7px;min-height:42px;padding:9px;border:1.5px dashed var(--border2);border-radius:var(--rs);margin-bottom:10px;background:var(--bg);}
.aarea{display:flex;flex-wrap:wrap;gap:7px;min-height:42px;padding:8px 11px;border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--surface2);margin-bottom:8px;align-items:center;}
.wc{padding:5px 14px;font-size:14px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.wc:hover{background:var(--purple-l);border-color:var(--purple-m);color:var(--purple);}
.wc.used{opacity:.25;pointer-events:none;}
.pc{padding:5px 14px;font-size:14px;border:1px solid var(--purple-m);border-radius:var(--rs);background:var(--purple-l);color:var(--purple);cursor:pointer;font-weight:500;transition:all .15s;font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.pc:hover{background:#d8d2f7;}
.ae{font-size:13px;color:var(--text3);}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.npos{font-size:13px;color:var(--text3);}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:15px;}

/* WRONG LOG PANEL */
.wlog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;}
.wlog-overlay.on{display:flex;}
.wlog-panel{background:var(--surface);border-radius:var(--r);width:min(680px,95vw);max-height:85vh;display:flex;flex-direction:column;box-shadow:0 12px 48px rgba(0,0,0,.18);overflow:hidden;}
.wlog-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}

.wlog-close:hover{background:var(--surface2);}
.wlog-toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.wlog-filter{padding:4px 11px;font-size:12px;border:1px solid var(--border2);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.wlog-filter.on{background:var(--red);border-color:var(--red);color:#fff;}
.wlog-body{overflow-y:auto;flex:1;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.wlog-empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px;}
.wi{border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;background:var(--surface);}
.wi-top{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
.wi-zh{font-size:15px;font-weight:500;font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;color:var(--text);line-height:1.6;}
.wi-ko{font-size:13px;color:var(--text2);margin-top:4px;}

.wi-ans strong{color:var(--green);}
.wi-retry{margin-top:8px;display:flex;gap:6px;}
.btn-sm{padding:4px 11px;font-size:12px;border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;background:var(--surface);color:var(--text2);font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;transition:all .15s;}
.btn-sm:hover{background:var(--surface2);}

/* HEADER LOG BTN */
.hdr-btns{display:flex;align-items:center;gap:10px;}
.log-btn{padding:5px 12px;font-size:12px;font-weight:600;border:1px solid #f5b7b1;border-radius:20px;background:var(--red-l);color:var(--red);cursor:pointer;display:flex;align-items:center;gap:5px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;transition:all .15s;}
.log-btn:hover{background:#fbd5d5;}
.log-btn .lbcnt{background:var(--red);color:#fff;border-radius:10px;padding:0 6px;font-size:11px;min-width:18px;text-align:center;}

/* MOBILE */
@media(max-width:650px){
  .layout{grid-template-columns:1fr;}
  .sb{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:10px 0;overflow-x:auto;display:flex;flex-wrap:nowrap;gap:0;}
  .sb-btn{white-space:nowrap;padding:6px 12px;font-size:12px;}
  .sb-label,.sb-div{display:none;}
  .main{padding:14px;max-width:100%;}
  .qt{font-size:16px;}
}

/* 빈칸 보기 버튼 */
.choices-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.choice-btn{padding:8px 20px;font-size:15px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.choice-btn:hover:not(:disabled){background:var(--purple-l);border-color:var(--purple-m);color:var(--purple);}
.choice-btn:disabled{cursor:default;}
.choice-btn.choice-correct{background:#EAF3DE;border-color:#97C459;color:#27500A;font-weight:700;}
.choice-btn.choice-wrong{background:var(--red-l);border-color:#f5b7b1;color:var(--red);}
.choice-py{font-size:11px;color:var(--text3);font-weight:400;}
.choice-btn.choice-correct .choice-py{color:#3B6D11;}
.choice-btn.choice-wrong .choice-py{color:var(--red);}

.choice-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.choice-btn{padding:8px 16px;font-size:14px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--surface);
  color:var(--text);cursor:pointer;transition:all .15s;font-weight:500;min-width:60px;text-align:center;
  flex:1 1 calc(50% - 8px);max-width:calc(50% - 4px);}
.choice-btn:hover:not(:disabled){background:var(--purple-l);border-color:var(--purple-m);color:var(--purple);}
.choice-btn:disabled{cursor:default;}
.choice-btn.choice-correct{background:var(--green-l);border-color:#9fd4b5;color:var(--green);font-weight:700;}
.choice-btn.choice-wrong{background:var(--red-l);border-color:#f5b7b1;color:var(--red);}
</style>
