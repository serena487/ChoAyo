好还是学历史好。", "ko": "나는 문학을 배우는 것이 좋을지 아니면 역사를 배우는 것이 좋을지 모르겠다."}, {"zh": "她是努力了，还是没努力，考试以后就清楚了。", "ko": "그가 열심히 노력했는지 노력하지 않았는지는 시험을 보고 나면 알 수 있다."}, {"zh": "你今天来或者明天来都行。", "ko": "네가 오늘 오든 내일 오든 다 괜찮다."}, {"zh": "快来听，我下载的这首歌太好听了。", "ko": "어서 와서 들어봐, 내가 다운로드 받은 이 노래가 아주 듣기 좋아"}, {"zh": "我听听，我怎么不觉得好听？老了。", "ko": "어디 좀 들어보자. 나는 왜 좋다고 생각되지 않지? 늙었나 봐"}, {"zh": "你别这么说，你才比我大两岁。", "ko": "그렇게 말하지 마. 너는 나보다 겨우 두 살밖에 많지 않은 걸"}, {"zh": "难道你不喜欢流行歌曲吗？", "ko": "설마 너 유행가를 좋아하지 않는 거니?"}, {"zh": "不太喜欢，主要是不常听。", "ko": "그다지 좋아하지도 않고 중요한 건 자주 안듣는다는 거지."}, {"zh": "我还是喜欢老歌。以前的老歌，可好听了。", "ko": "난 역시 오래된 노래가 좋더라. 옛날 노래는 정말 듣기 좋아"}, {"zh": "我发现咱们俩虽然都是歌迷，可是迷的对象大不一样。", "ko": "우리는 비록 모두 노래 애호가지만 좋아하는 노래가 서로 다른 것 같아."}, {"zh": "电影你爱看老的，歌曲也爱听老的。", "ko": "너는 영화도 옛날 영화를 즐겨보고 노래도 옛날 노래를 즐겨 듣는구나."}, {"zh": "我怎么对老歌就没兴趣呢？", "ko": "나는 어째서 옛 노래에는 관심이 없을까?"}, {"zh": "这没什么奇怪的，各人有各人的爱好嘛。", "ko": "그건 뭐 별로 이상할 것도 없지, 모든 사람은 각자의 취미가 있잖아."}, {"zh": "不过，咱们有一点是相同的：", "ko": "그렇지만 우린 한 가지는 같아."}, {"zh": "咱们都爱好音乐，对吧？", "ko": "우리는 모두 음악을 좋아한다는 거지, 그렇지?"}, {"zh": "我们每天不是上课就是考试，忙得很。", "ko": "우리는 매일 수업이 아니면 시험을 봐서 아주 바쁘다."}, {"zh": "食堂的饭不是馒头就是米饭，我想吃点儿别的。", "ko": "식당의 밥은 만두가 아니면 밥이라서 나는 다른 것을 좀 먹고 싶어."}, {"zh": "除了当过律师，还当过导游。", "ko": "변호사를 했을 뿐만 아니라, 관광 안내원도 했다."}, {"zh": "除了上网，还喜欢什么？", "ko": "인터넷을 하는 것 말고, 또 무엇을 좋아하나요?"}, {"zh": "除了夸你帅，还夸你唱歌好听。", "ko": "잘생겼다고 칭찬할 뿐만 아니라, 노래도 잘한다고 칭찬했다."}, {"zh": "留学生，有的住校内，有的住校外。", "ko": "유학생들은 어떤 사람은 교내에 살고, 어떤 사람은 교외에 산다."}, {"zh": "服务员，有的服务热情，有的服务热情。", "ko": "종업원은 어떤 사람은 서비스가 친절하고, 어떤 사람은 서비스가 냉담하다."}, {"zh": "旅行的人，有的爱坐飞机，有的爱坐火车。", "ko": "여행하는 사람은 어떤 사람은 비행기를 좋아하고, 어떤 사람은 기차를 좋아한다."}, {"zh": "我怎么对甜的就吃不够呢？", "ko": "나는 왜 단 것을 아무리 먹어도 부족할까?"}, {"zh": "老师怎么对学生就这么严呢？", "ko": "선생님은 왜 학생들에게 이렇게 엄격할까?"}, {"zh": "他们怎么对足球就那么迷呢？", "ko": "그들은 왜 축구에 그렇게 빠져 있을까?"}, {"zh": "各国有各国的法律嘛。", "ko": "각 나라에는 각 나라의 법이 있다."}, {"zh": "各民族有各民族的传统嘛。", "ko": "각 민족에는 각 민족의 전통이 있다."}, {"zh": "各城市有各城市的特点嘛。", "ko": "각 도시는 각 도시의 특징이 있다."}, {"zh": "下班回家，我不是在厨房，就是在书房。", "ko": "퇴근하고 집에 돌아오면 저는 주방에 있거나 서재에 있습니다."}, {"zh": "我有两大爱好，一动一静，一个是做饭，一个是看书。", "ko": "저에게는 두 가지 취미가 있는데 하나는 동적이고 하나는 정적인 것으로 요리와 독서입니다."}, {"zh": "做饭可以活动身体，看书可以丰富知识。", "ko": "요리는 몸을 움직일 수 있고 독서는 지식을 풍부하게 됩니다."}, {"zh": "挺科学吧？", "ko": "매우 과학적이지 않나요?"}, {"zh": "你说我应该出去晒晒太阳？", "ko": "제가 밖으로 나가서 햇빛을 좀 받아야 한다고요?"}, {"zh": "坐在我家的阳台上，一边晒太阳，一边看书，那才舒服呢！", "ko": "우리 집 베란다에 앉아서 일광욕하며 책을 보면 아주 편안합니다!"}, {"zh": "主要", "ko": "주로, 주요하다"}, {"zh": "电视剧", "ko": "드라마"}, {"zh": "退休", "ko": "은퇴하다"}, {"zh": "麻将", "ko": "마작"}, {"zh": "备课", "ko": "수업을 준비하다"}, {"zh": "其他", "ko": "기타"}, {"zh": "下载", "ko": "다운로드하다"}, {"zh": "难道", "ko": "설마 ~하겠는가?"}, {"zh": "歌曲", "ko": "노래"}, {"zh": "奇怪", "ko": "이상하다, 의아하다"}, {"zh": "相同", "ko": "똑같다"}, {"zh": "厨房", "ko": "주방"}, {"zh": "书房", "ko": "서재"}, {"zh": "科学", "ko": "과학적이다, 과학"}, {"zh": "阳台", "ko": "베란다"}, {"zh": "决定", "ko": "결정(하다)"}], "vocab": []}, "12과": {"pairs": [{"zh": "你别笑话我，我的声调不太准。", "ko": "내 성조가 부정확하다고 비웃지 마라."}, {"zh": "你别笑话我， 我第一次吃中餐，还不会用刀叉。", "ko": "비웃지 마, 나는 양식을 처음 먹는 거라서 나이프와 포크를 어떻게 쓰는지 잘 몰라"}, {"zh": "你这个人真是口福不浅。", "ko": "너란 사람은 정말 먹을 복이 있구나."}, {"zh": "今天只有眼福没有口服。", "ko": "오늘 눈요기만 했지 먹을 복은 없었다."}, {"zh": "咱们刚搬了新房子，请朋友们来聚聚，吃顿饭吧？", "ko": "우리 막 새집으로 이사했는데, 친구들을 모아서 식사 한 끼 할까요?"}, {"zh": "好啊，我建议来个自助餐。", "ko": "좋지요, 나는 뷔페 형식을 추천해요."}, {"zh": "准备一些凉菜，再做几个热菜，", "ko": "냉채 몇 가지를 준비하고 요리도 몇 가지를 할게요."}, {"zh": "谁爱吃什么就取什么。", "ko": "먹고싶으면 누구든 가져다 먹게요."}, {"zh": "要准备酒吗？", "ko": "술을 준비해야 할까요?"}, {"zh": "当然得准备了。", "ko": "당연히 준비해야죠."}, {"zh": "除了啤酒，再来点儿葡萄酒什么的。", "ko": "맥주 외에 와인 같은 것들도 좀 두죠."}, {"zh": "要不要白酒？", "ko": "바이주는 필요할까요?"}, {"zh": "不要了吧？", "ko": "필요없겠죠?"}, {"zh": "白酒太厉害，喝了容易醉。", "ko": "바이주는 너무 세서 쉽게 취해요."}, {"zh": "你怎么不吃啊？", "ko": "너는 어째서 안 먹니?"}, {"zh": "我早上起得晚，还不太饿。", "ko": "난 아침에 늦게 일어나서 아직 별로 배가 고프지 않아."}, {"zh": "你是不是在减肥？", "ko": "다이어트 하는 거 아니니?"}, {"zh": "你别笑话我，这几个月我有长了好几斤，越来越胖了。", "ko": "비웃지 마, 최근 몇 개월 몇 킬로가 더 늘었어, 갈수록 뚱뚱해지고 있단 말이야."}, {"zh": "你哪儿胖啊？身材多好啊!", "ko": "네가 어디가 뚱뚱한데? 몸매 참 좋은데 뭘!"}, {"zh": "我真羡慕你，吃什么都不长胖。", "ko": "난 네가 정말 부럽다. 뭘 먹어도 살이 안 찌잖니."}, {"zh": "有口福啊！", "ko": "정말 먹을 복이 있어!"}, {"zh": "我觉得健康是最重要的。", "ko": "난 건강이 가장 중요하다고 생각해."}, {"zh": "胖瘦都是给别人看的，", "ko": "뚱뚱하고 마르고는 모두 남에게 보여 주기 위한 거잖아."}, {"zh": "身体好，自己觉得舒服比什么都强。", "ko": "몸이 건강하고 스스로 편하게 느끼는 것이 무엇보다 중요해."}, {"zh": "放心地吃吧，", "ko": "맘 놓고 먹어."}, {"zh": "饿瘦了，脸色也不好了。", "ko": "배고파서 홀쭉해지면 안색도 안 좋아져."}, {"zh": "要是真想瘦一点儿，最好的办法是运动。", "ko": "만약 정말 날씬해지고 싶다면, 가장 좋은 방법은 운동이야."}, {"zh": "可是天天坚持不容易。", "ko": "하지만 매일 한다는 게 쉽지 않아."}, {"zh": "一停下来，会更胖。", "ko": "그만두면 바로 체중이 더 늘어나."}, {"zh": "我非学好汉语不可。", "ko": "나는 중국어를 배우지 않으면 안 된다."}, {"zh": "你非去不可吗？", "ko": "너 가지 않으면 안 되니?"}, {"zh": "学生不上课不行。", "ko": "학생은 수업을 듣지 않으면 안 된다."}, {"zh": "“你的病不做手术不行。”", "ko": "”당신의 병은 수술하지 않으면 안 됩니다.”"}, {"zh": "中国和美国的饮食习惯很不一样吧？", "ko": "중국과 미국은 음식 습관이 다르지?"}, {"zh": "是，很不一样。", "ko": "응, 아주 달라"}, {"zh": "我喜欢吃中餐，可是有的时候很不习惯。", "ko": "나는 중국 음식을 좋아하지만 어떤 경우에는 정말 익숙하지 않아."}, {"zh": "比如说。。。", "ko": "예를 든다면…"}, {"zh": "喝酒的时候，主人太热情，总是让我喝。", "ko": "술을 마실 때 주인이 너무 친절해서 나에게 늘 마시라고 해."}, {"zh": "我常常不好意思不喝，有时候就喝多了。", "ko": "종종 안 마시는 것이 미안해서 어떤 때는 너무 많이 마셔."}, {"zh": "只要你告诉他们你不能喝酒，他们不一定非让你喝不可。", "ko": "네가 술을 못 마신다고 말하면, 그들이 너에게 마시지 않으면 안 된다고 하지는 않을 거야."}, {"zh": "如果我是你，我就说：“谢谢！我不会喝酒。”", "ko": "내가 만약 너라면 저는 “감사합니다!! 전 술을 잘 못합니다”"}, {"zh": "“我只能少来一点儿。”", "ko": "“저는 술을 조금밖에 마시지 못합니다”"}, {"zh": "我不习惯用刀叉。", "ko": "나는 나이프와 포크를 사용하는 게 익숙하지 않아."}, {"zh": "左手拿叉，右手拿刀，切肉切菜, 实在麻烦。", "ko": "왼손으로 포크를 들고 오른손으로 나이프를 들고 고기와 채소를 자르려니 정말 불편했어."}, {"zh": "吃鸡，吃鱼，吃面条儿，就更困难了。", "ko": "특히 닭, 생선, 국수를 먹는 것이 훨씬 어려웠어."}, {"zh": "这就跟我们不习惯用筷子一样。不练不行。", "ko": "우리가 젓가락 사용하는 게 익숙하지 않은 것과 같네. 연습하지 않으면 안 돼."}, {"zh": "你们吃早饭的习惯也和我们不太一样。", "ko": "너희의 아침 식사도 우리와 달라."}, {"zh": "你们喜欢吃面包，和从冰箱里刚拿出来的凉牛奶，同时，还要喝一些果汁。", "ko": "너희는 빵을 즐겨 먹고 냉장고에서 막 꺼낸 차가운 우유를 마시면서 과일 주스도 마시잖아."}, {"zh": "我的肚子就受不了。", "ko": "내 뱃속은 견디지 못할 거야."}, {"zh": "我习惯喝热豆浆，吃油条，再来一个煮鸡蛋。", "ko": "우리는 따뜻한 더우장을 마시고 여우탸오를 먹고 또 삶은 달걀을 먹어."}, {"zh": "真心相爱比什么都幸福。", "ko": "서로 사랑하는 것이 무엇보다 행복하다."}, {"zh": "上网聊天儿比什么都轻松。", "ko": "인터넷에서 채팅하는 것이 무엇보다 쉽다."}, {"zh": "不上课比什么都高兴。", "ko": "수업하지 않는 것이 무엇보다 즐겁다."}, {"zh": "要是学那个国家的语言，最好到那个国家去。", "ko": "만약 어떤 국가의 언어를 배우려면 그 국가에 가는 것이 제일 좋다."}, {"zh": "要是怕起晚了，最好请闹钟帮忙。", "ko": "만약 늦게 일어나는 것이 두렵다면 알람에게 도움을 요청하는 것이 제일 좋다."}, {"zh": "要是去做客，最好带点小礼物。", "ko": "만약 손님이 된다면 작은 선물을 가져가는 것이 제일 좋다."}, {"zh": "一不注意，感冒会更厉害。", "ko": "조심하지 않으만 하면 감기는 더 심해진다"}, {"zh": "一有声音，我会更睡不着觉。소리가 나기만 하면 나는 더 잠들지 못해요.", "ko": "소리가 나기만 하면 나는 더 잠들지 못해요."}, {"zh": "一说错，心里会更紧张。말을 틀리기만 하면 마음이 더 긴장돼요.", "ko": "말을 틀리기만 하면 마음이 더 긴장돼요."}, {"zh": "写好汉子非坚持多写不可。한자를 잘 쓰려면 참고 많이 써보지 않으면 안 돼.", "ko": "한자를 잘 쓰려면 참고 많이 써보지 않으면 안 돼."}, {"zh": "老不吃早饭非影响健康不可。아침을 먹지 않으면 건강에 영향을 안 주지 않을 거야.", "ko": "아침을 먹지 않으면 건강에 영향을 안 주지 않을 거야."}, {"zh": "要学好汉语非来中国不可。중국어를 잘 배우려면 중국에 오지 않으면 안 돼.", "ko": "중국어를 잘 배우려면 중국에 오지 않으면 안 돼."}, {"zh": "建议", "ko": "제안하다"}, {"zh": "自助餐", "ko": "뷔페"}, {"zh": "葡萄酒", "ko": "와인"}, {"zh": "白酒", "ko": "바이주"}, {"zh": "减肥", "ko": "다이어트하다"}, {"zh": "笑话", "ko": "비웃다"}, {"zh": "身材", "ko": "체격, 몸매"}, {"zh": "口福", "ko": "먹을 복"}, {"zh": "饮食", "ko": "음식"}, {"zh": "中餐", "ko": "중국 음식"}, {"zh": "左手", "ko": "왼손"}, {"zh": "右手", "ko": "오른손"}, {"zh": "面条儿", "ko": "먄"}, {"zh": "筷子", "ko": "젓가락"}, {"zh": "冰箱", "ko": "냉장고"}, {"zh": "牛奶", "ko": "우유"}, {"zh": "果汁", "ko": "과일 주스"}, {"zh": "豆浆", "ko": "더우장"}, {"zh": "油条", "ko": "여우탸오"}], "vocab": []}, "13과": {"pairs": [{"zh": "你想买房子吗？", "ko": "집을 장만하실 생각이신가요?"}, {"zh": "想看看这里的新房子。", "ko": "이곳의 새집을 좀 구경하려고요."}, {"zh": "您请这边看。", "ko": "여기를 좀 보시죠."}, {"zh": "有两件一套的，有三件一套的。", "ko": "방 두 개짜리도 있고 방 세 개짜리도 있어요."}, {"zh": "三件一套的有几个卫生间？", "ko": "방 세 개짜리에는 화장실이 몇 개 있어요?"}, {"zh": "有的一个，有的两个。", "ko": "하나 있는 것도 있고 두 개 있는 것도 있어요."}, {"zh": "客厅大不大?", "ko": "거실은 큰가요?"}, {"zh": "这里在农村和城市之间，环境很好。", "ko": "이곳은 농촌과 도시의 중간지점이라 환경이 아주 좋군요."}, {"zh": "有好几路公共汽车都到这里。", "ko": "여기까지 오는 버스 노선이 아주 많습니다."}, {"zh": "孩子上学方便吗？", "ko": "아이들이 학교 다니기는 편하가요?"}, {"zh": "您看，中学在那儿，小学在这儿，都很近。", "ko": "좀 보세요, 저기가 중고등학교이고 초등학교는 여기예요. 모두 가까워요."}, {"zh": "价钱怎么样？", "ko": "가격이 어떻게 되지요?"}, {"zh": "比市中心的房子便宜三分之一左右。买一套把？", "ko": "중심가에 있는 집보다 1/3정도 쌉니다. 한 채 사시겠어요?"}, {"zh": "我先回家商量商量再做决定。", "ko": "먼저 집에 돌아가서 상의 좀 해보고 결정할게요."}, {"zh": "咱们养一只小动物吧。", "ko": "우리 집도 작은 동물 키워요."}, {"zh": "养只小狗好不好？", "ko": "강아지 키우는 거 어떠세요?"}, {"zh": "小狗跑跑跳跳的样子太可爱了，我也想养。", "ko": "강아지가 이리저리 뛰어다니는 모습을 보면 정말 귀여울 거야. 저도 기르고 싶어요."}, {"zh": "小狗是可爱，但是我反对你们养。", "ko": "강아지가 귀엽긴 하지. 그렇지만 나는 너희가 키우는 것은 반대야."}, {"zh": "在城市里养狗，有很多麻烦事。", "ko": "도시에서 강아지를 키우는 것은 번거로운 일이 많아."}, {"zh": "不养狗，养只猫吧。", "ko": "강아지를 안 키우려면 고양이를 키워요."}, {"zh": "我想养只白猫，有一对蓝眼睛的白猫。", "ko": "난 하얀 고양이를 키우고 싶어. 파란색 눈의 새하얀 고양이."}, {"zh": "我天天给它洗澡。", "ko": "내가 매일매일 목욕시켜 줄게요."}, {"zh": "我天天喂它饭。", "ko": "나는 매일매일 먹이를 줄게요."}, {"zh": "您不反对对了吧？", "ko": "반대 안하시죠?"}, {"zh": "我还得问问你们的爸爸是什么意见。", "ko": "난 너희 아빠는 의견이 어떤지 물어봐야겠다."}, {"zh": "我真不明白，别人都想办法往城市里搬，你却非要回农村的老家去。", "ko": "난 정말 이해 못 하겠다. 다른 사람들은 도시로 이사 오려고 애쓰는데 넌 오히려 농촌에 있는 고향으로 가려고 하다니"}, {"zh": "这到底是怎么回事？", "ko": "도대체 이게 어떻게 된 일이니?"}, {"zh": "我喜欢农村生活，喜欢大自然和那里的农村。", "ko": "나는 농촌 생활이 좋고 대자연과 그곳의 농민들이 좋아."}, {"zh": "咱们的老家，环境优美，空气新鲜。", "ko": "내 고향은 환경이 아름답고 공기도 신선해."}, {"zh": "天蓝蓝的，水绿绿的，马啊，牛啊，羊啊在草地上吃草", "ko": "하늘은 파랗고 물은 푸르며 말이며 소, 양들이 초원에서 풀을 뜯고 있지."}, {"zh": "像一幅画儿似的，要多美有多美。", "ko": "마치 한 폭의 그림처럼 아름답기 그지없어."}, {"zh": "可是农村的生活条件哪比得上城市呢？", "ko": "그렇지만 농촌의 생활 조건을 어떻게 도시와 비교하겠어?"}, {"zh": "有好多不方便的地方。", "ko": "불편한 점이 아주 많아."}, {"zh": "那是以前，在农村劳动和生活都很苦。", "ko": "예전에야 농촌에서 일하고 생활하는 게 매우 힘들었지."}, {"zh": "现在变化可大了。", "ko": "지금은 아주 많이 변했어."}, {"zh": "不信，你去农村看看，", "ko": "못 믿겠으면 농촌에 가서 한번 봐봐."}, {"zh": "那里不一定比城市差。", "ko": "그곳이 반드시 도시보다 못한 것은 아니야."}, {"zh": "而且，工业，交通等多城市的污染越来越严重了，对健康一点儿好处也没有。", "ko": "게다가 산업, 교통 등 도시의 오염은 갈수록 심각해지니 건강에 조금도 좋을 게 없어."}, {"zh": "小猫，小狗可爱极了，爸爸，妈妈却反对我们养狗。", "ko": "고양이, 강아지는 아주 귀엽지만, 아빠, 엄마는 우리가 강아지 기르는 것을 반대한다."}, {"zh": "城市的污染越来越严重，农村的风景却像画儿似的，要多美有多美的。", "ko": "도시의 오염은 점점 심해지는데, 농촌의 풍경은 오히려 그림처럼 아름답기 그지없다."}, {"zh": "我也不清楚，到底是我说错了，还是他听错了？", "ko": "나도 잘 모르겠어, 도대체 내가 잘못 말한 거야, 아니면 그가 잘못 들은 거야?"}, {"zh": "你想过没有？到底为什么会这样？", "ko": "넌 생각해 본 적이 있니? 도대체 왜 이렇게 된 거지?"}, {"zh": "你到底来不来？", "ko": "너 도대체 오니 안 오니?"}, {"zh": "这个孩子要多可爱有多可爱。", "ko": "이 아이는 정말 귀엽기 짝이 없다."}, {"zh": "公共汽车上要多挤有多挤。", "ko": "버스 안이 복잡하기 그지없다."}, {"zh": "一点儿好处也没有。", "ko": "좋은 점이 조금도 없다."}, {"zh": "对不起，今天我一点儿时间也没有。", "ko": "죄송합니다, 제가 오늘은 시간이 조금도 없어요."}, {"zh": "刚来中国的时候，我一点儿汉语也不会说。", "ko": "막 중국에 왔을 때, 나는 중국어를 조금도 하지 못했다."}, {"zh": "昨天晚上出去玩儿了，一点儿觉都没睡。", "ko": "어제 밤에 나가서 노느라, 잠을 조금도 자지 못했다."}, {"zh": "她一点儿钱都不乱花。", "ko": "그녀는 조금의 돈도 함부로 쓰지 않는다."}, {"zh": "认错", "ko": "잘못을 인정하다"}, {"zh": "精彩", "ko": "뛰어나다, 훌륭하다"}, {"zh": "拿。。。来说", "ko": "~으로 말하자면, ~의 경우에는"}, {"zh": "上传", "ko": "업로드하다"}, {"zh": "防晒霜", "ko": "썬크림"}, {"zh": "办公室", "ko": "사무실"}, {"zh": "薪水", "ko": "월급"}, {"zh": "开会", "ko": "회의하다"}, {"zh": "名片", "ko": "명함"}, {"zh": "传真", "ko": "팩스"}, {"zh": "打印机", "ko": "복사기"}, {"zh": "笔试", "ko": "필기시험"}, {"zh": "出差", "ko": "출장"}, {"zh": "非。。。不可", "ko": "~하지 않으면 안 된다"}, {"zh": "卫生间", "ko": "화장실"}, {"zh": "农村", "ko": "농촌"}, {"zh": "环境", "ko": "환경"}, {"zh": "小学", "ko": "초등학교"}, {"zh": "动物", "ko": "동물"}, {"zh": "意见", "ko": "의견"}, {"zh": "到底", "ko": "도대체"}, {"zh": "大自然", "ko": "대자연"}, {"zh": "农民", "ko": "농민"}, {"zh": "优美", "ko": "우아하고 아름답다"}, {"zh": "新鲜", "ko": "신선하다"}, {"zh": "像~似的", "ko": "~와 같다"}, {"zh": "劳动", "ko": "노동하다, 일하다"}, {"zh": "工业", "ko": "공업"}, {"zh": "严重", "ko": "심각하다"}], "vocab": [{"zh": "沙发", "ko": "소파"}, {"zh": "抽", "ko": "(담배를)피우다"}, {"zh": "活儿", "ko": "일"}, {"zh": "气", "ko": "성내다, 화내다"}, {"zh": "批评", "ko": "비평하다, 꾸짖다"}, {"zh": "社会", "ko": "사회"}, {"zh": "平等", "ko": "평등하다"}, {"zh": "模范", "ko": "모범적인"}, {"zh": "改变", "ko": "변하다, 바꾸다"}, {"zh": "认错", "ko": "잘못을 인정하다"}, {"zh": "今后", "ko": "이제부터"}, {"zh": "家务", "ko": "집안일, 가사"}, {"zh": "劝", "ko": "중재하다"}, {"zh": "表现", "ko": "표현(하다)"}, {"zh": "不好意思", "ko": "부끄럽다"}, {"zh": "演讲", "ko": "강연"}, {"zh": "题目", "ko": "제목"}, {"zh": "复杂", "ko": "복잡하다"}, {"zh": "到处", "ko": "도처, 곳곳"}, {"zh": "连", "ko": "~조차도"}, {"zh": "男人", "ko": "남자"}, {"zh": "认为", "ko": "여기다, 생각하다"}, {"zh": "特点", "ko": "특징"}, {"zh": "纸", "ko": "종이"}, {"zh": "笔", "ko": "필기구"}, {"zh": "经理", "ko": "회장, 사장, 매니저"}, {"zh": "秘书", "ko": "비서"}, {"zh": "报纸", "ko": "신문"}, {"zh": "贵", "ko": "  늦은 거예요?"}, {"zh": "我来跟你一起做饭吧。", "ko": "내가 같이 식사 준비할게요"}, {"zh": "回来得并不晚，到楼上张师傅家坐了会儿。", "ko": "늦게 온 건 아닌데, 윗집 장 씨네 집에 좀 앉아 있다가 왔어요."}, {"zh": "他们家又吵架了。", "ko": "그들 부부 또 싸웠지 뭐예요."}, {"zh": "他们为什么又吵了？", "ko": "어째서 또 싸웠는데요?"}, {"zh": "张师傅一回家就躺在沙发上，边看电视边抽烟。", "ko": "장 씨는 집에 돌아오면 바로 소파에 누워서 TV를 보면서 담배를 피운대요."}, {"zh": "他爱人下了班，又洗菜又做饭。", "ko": "아내가 퇴근해서 돌아와 채소도 씻고 식사도 준비하죠."}, {"zh": "张师傅一点儿忙也不帮。", "ko": "장 씨는 조금도 돕지 않아요."}, {"zh": "这就是张师傅不对了。", "ko": "이건 장 씨가 잘못했네요."}, {"zh": "两个人都上了一天的班，都挺累的，回到家，怎么能光让一个人干活儿呢？", "ko": "두 사람 모두 종일 근무를 해서 피곤할 텐데, 집에 돌아와 어떻게 한 사람에게만 일하게 할 수 있지요?"}, {"zh": "他爱人叫张师傅帮着一起做，张师傅不做，结果把他爱人气哭了。", "ko": "아내가 장 씨를 불러 함께 하자고 해도 장 씨는 하지 않아서 결국 아내가 화가 나 울어버렸어요."}, {"zh": "现在两个人怎么样了？", "ko": "지금 두 사람은 어때요?"}, {"zh": "我批评了张师傅，给他讲了男女在社会上要平等，在家庭中也不平等。", "ko": "내가 장 씨에게 뭐라고 좀 했어요. 그에게 남녀는 사회에서 평등해야 하고, 가정에서도 평등해야 한다고 말해 줬어요."}, {"zh": "又把咱们俩的经验介绍了一下儿。", "ko": "그리고 우리 두 사람 경험도 소개해줬어요."}, {"zh": "你没向他们夸夸我这个模范丈夫？", "ko": "당신 그들에게 모범 남편인 날 칭찬 안 했어요?"}, {"zh": "正因为我夸了你，张师傅在改变了态度，向他爱人认了错，两个人一起高高兴兴地做了一顿饭。", "ko": "내가 당신을 칭찬했기 때문에 장 씨가 태도를 바꿔서 아내에게 자신의 잘못을 인정하고 두 사람이 같이 즐겁게 식사 한 끼를 차렸죠"}, {"zh": "希望他们俩今后也不因为做家务的事吵架了。", "ko": "앞으로 그들이 이런 문제로 다시는 싸우지 않았으면 좋겠네요."}, {"zh": "你劝家劝得不错嘛！", "ko": "아주 잘 중재했어요!"}, {"zh": "你把咱们俩刚结婚时我的表现也告诉他们了？", "ko": "당신, 우리가 막 결혼할 당시 내가 어떻게 했는지도 그들에게 말해줬어요?"}, {"zh": "不说那些，经验从哪儿说起呀?", "ko": "그것들을 이야기하지 않으면 경험을 어디부터 말하겠어요?"}, {"zh": "真不好意思，咱们俩的秘密全让人知道了。", "ko": "정말 부끄럽네요, 우리 두 사람만의 비밀이 그들에게 전부 알려졌네요."}, {"zh": "找来找去，也没找到。", "ko": "이리저리 찾아도, 찾지 못했다."}, {"zh": "商量来商量去，他也不同意。", "ko": "의논하고 또 해봐도, 그는 역시 동의하지 않았다."}, {"zh": "想来想去，怎么也想不起她叫什么名字。", "ko": "생각하도 해봤지만, 어떻게 해도 그의 이름이 떠오르지 않았다."}, {"zh": "他说来说去都是自己夸自己。", "ko": "그는 이 말 저 말을 하지만 모두 다 자기 자랑이다."}, {"zh": "今天他没来，我以为是他病了，后来才知道他孩子病了。", "ko": "오늘 그가 오지 않아서 나는 그가 아픈 거라고 생각했는데 나중에 알고보니 그의 아이가 병이 났던 것이다."}, {"zh": "张师傅回到家一点活儿都不干，大家都认为这是不对的。", "ko": "장씨는 집에 돌아오면 일을 전혀 하지 않는데 사람들은 모두 이것이 잘못되었다고 생각한다."}, {"zh": "今天路上车很多，我以为他不会来。", "ko": "길에 차가 너무 많아서 나는 그가 안 올 것이라고 생각했다"}, {"zh": "今天路上车很多，我认为他不会来。", "ko": "길에 차가 너무 많아서 나는 그가 안 올 것이라고 생각한다."}, {"zh": "孩子改不了爱吃糖的习惯，结果牙都坏了。", "ko": "아이가 사탕을 먹는 습관을 고치지 못해서 결국 이가 다 상했다."}, {"zh": "他把约会的时间记错了，结果女朋友生气了。", "ko": "그는 데이트 시간을 잘못 기억해서 결국 여자친구가 화가 났다."}, {"zh": "老板不满意他的工作，结果老板不用他了。", "ko": "사장이 그의 일에 만족하지 못해서 결국 사장은 그를 쓰지 않았다"}, {"zh": "住的要好，吃的也要好。", "ko": "사는 것도 먹는 것도 좋아야 해."}, {"zh": "上班的路上要注意安全，下班的路上也要注意安全。", "ko": "출근 길에는 안전을 조심해야 하고 퇴근 길에도 안전을 조심해야 해."}, {"zh": "教师里边要安静，教师外边也要安静。", "ko": "교실 안은 조용해야 하고 교시 밖에도 조용해야 해."}, {"zh": "看来看去，一个都不喜欢。", "ko": "보고 또 봐도 마음에 드는 게 없어"}, {"zh": "走来走去，又走回来了。", "ko": "왔다갔다 하다가 다시 돌아왔어요"}, {"zh": "讨论来讨论去，也没有好主意。", "ko": "토론을 계속 해도 좋은 아이디어가 없다."}, {"zh": "连他的名字也没想起来。", "ko": "그의 이름조차 생각이 안 났다."}, {"zh": "连东南西北也不知道。", "ko": "동서남북조차 알지 못한다."}, {"zh": "连图书馆也没去过。", "ko": "도서관조차 가보지 않았다."}, {"zh": "我们要举行演讲比赛，帮我想想怎么讲。", "ko": "우리 곧 웅변대회 있는데 내가 어떻게 말하면 좋을 지 생각 좀 해봐."}, {"zh": "演讲的题目是什么？", "ko": "웅변 주제가 뭔데?"}, {"zh": "这个问题很复杂，内容又太多，不好讲，你肯定有困难。", "ko": "이 문제는 매우 복잡하고 내용도 많아서 말하기 쉽지 않겠는 걸. 아마 힘들겠다"}, {"zh": "所以才请你帮我想想嘛。", "ko": "그러니까 너에게 좀 도와달라는 거지."}, {"zh": "我不知道从哪儿讲起。", "ko": "난 어디서부터 이야기를 시작해야 할지 모르겠어."}, {"zh": "到处都有人谈男女平等，报上谈，电视里也谈。", "ko": "곳곳에서 남녀평등을 이야기하고 있어. 신문에서도 이야기하고 TV에서도 이야기하고 있어."}, {"zh": "谈来谈去，连一个最简单的问题也没谈清楚。", "ko": "이야기를 하고 또 해봐도 가장 간단한 문제조차도 분명하게 말하지 못해."}, {"zh": "一般人都以为男人能做的事女人也能做，好像就是实现了男女平等了。", "ko": "보통 사람들은 남자가 할 수 있는 일들을 여자도 할 수 있게 되면 남녀평등이 실현되었다고 생각해."}, {"zh": "你怎么认为呢？", "ko": "너는 어떻게 생각하니?"}, {"zh": "男人有男人的特点，女人有女人的特点，只在一点上讨论，那就太简单了。", "ko": "남자는 남자만의 특징을 갖고 있고 여자는 여자만의 특징을 갖고 있는데 한 가지 점만 가지고 토론을 하는 건 지나치게 단순하게 보는 거야."}, {"zh": "沙发", "ko": "소파"}, {"zh": "活儿", "ko": "일"}, {"zh": "批评", "ko": "비평하다, 꾸짖다"}, {"zh": "社会", "ko": "사회"}, {"zh": "平等", "ko": "평등하다"}, {"zh": "模范", "ko": "모범적인"}, {"zh": "改变", "ko": "변하다, 바꾸다"}, {"zh": "今后", "ko": "이제부터"}, {"zh": "家务", "ko": "집안일, 가사"}, {"zh": "表现", "ko": "표현(하다)"}, {"zh": "不好意思", "ko": "부끄럽다"}, {"zh": "演讲", "ko": "강연"}, {"zh": "题目", "ko": "제목"}, {"zh": "复杂", "ko": "복잡하다"}, {"zh": "到处", "ko": "도처, 곳곳"}, {"zh": "男人", "ko": "남자"}, {"zh": "认为", "ko": "여기다, 생각하다"}, {"zh": "特点", "ko": "특징"}, {"zh": "教师", "ko": "교사"}], "vocab": []}, "9과": {"pairs": [{"zh": "我把你的手机号记下来。", "ko": "내가 너의 휴대전화 번호를 적을게"}, {"zh": "新书发下来了。", "ko": "새로운 책이 출간되었다."}, {"zh": "队员都坚持下来了。", "ko": "팀원들은 모두 끝까지 버텨왔다."}, {"zh": "我玩起来常常忘了时间。", "ko": "나는 놀다 보면 자주 시간을 잊는다."}, {"zh": "天气热起来了，夏天快到了。", "ko": "날씨가 더워졌고 여름이 곧 다가온다"}, {"zh": "我是昨天晚上刚到北京的。", "ko": "나는 어제 밤에 막 베이징에 도착했다"}, {"zh": "他们是从中国南方来的。", "ko": "그들은 중국의 남쪽에서 왔다."}, {"zh": "你们究竟是来干什么的呢？", "ko": "너희들은 도대체 무엇 때문에 왔니?"}, {"zh": "这包裹是老刘寄过来的。", "ko": "이 소포는 라오리우가 보내온 거야."}, {"zh": "麻烦您帮我叫一下儿刘山。", "ko": "실례지만 리우샨씨를 좀 바꿔 주세요."}, {"zh": "他早就不在这儿干了。", "ko": "그는 진작부터 여기에서 일하지 않았어요"}, {"zh": "他开了一家电脑公司，自己当老板了。", "ko": "그는 컴퓨터 회사를 차려서 사장이 되었어요"}, {"zh": "真没想到。", "ko": "뜻밖이군요."}, {"zh": "您知道怎么和他联系吗？", "ko": "그와 연락할 방법을 아시나요?"}, {"zh": "我给你他的手机号吧，他走以前留下的。", "ko": "그의 휴대전화 번호를 알려 드릴게요."}, {"zh": "您等一会儿，我拿纸和笔。", "ko": "잠시만 기다려 주세요, 제가 종이와 펜을 가져올게요."}, {"zh": "记下来了吗？", "ko": "받아적으셨나요?"}, {"zh": "请问，王经理在吗？", "ko": "말씀 좀 여쭙겠습니다. 왕 회장님이 계신가요?"}, {"zh": "我是他的秘书。", "ko": "무슨 일이지요? 제가 그분의 비서입니다."}, {"zh": "我是来找工作的。", "ko": "저는 일자리를 구하러 왔습니다."}, {"zh": "我看报纸上有贵公司的广告，所以就。。。", "ko": "신문에서 귀사의 공고를 봤습니다. 그래서…."}, {"zh": "王经理陪客人参观去了。", "ko": "왕회장님께서는 손님을 모시고 참관하러 가셨습니다."}, {"zh": "请先把您的简历给我一份。", "ko": "우선 저에게 이력서를 한 부 주세요."}, {"zh": "您看这些够吗？", "ko": "이 정도면 충분한지 좀 봐 주시겠어요?"}, {"zh": "有学历证明吗？", "ko": "학력 증명서 있나요?"}, {"zh": "这是毕业证的复印件。", "ko": "이게 졸업 증명서 사본입니다."}, {"zh": "经理一回来，我就交给他。", "ko": "사장님께서 돌아오시면 바로 전해 드릴게요."}, {"zh": "什么时候面试请等我们的电话。", "ko": "언제 면접을 볼지는 저희 전화를 기다려 주세요."}, {"zh": "不发达，我不回家。", "ko": "출세하지 않으면 집에 돌아가지 않겠다"}, {"zh": "你今天不做作业不能出去玩儿。", "ko": "너는 오늘 숙제를 하지 않으면 나가 놀 수 없다"}, {"zh": "你为什么要做这份工作？", "ko": "당신은 왜 이 일을 하려고 하지요?"}, {"zh": "我对这份工作感兴趣。", "ko": "저는 이 업무에 흥미가 있습니다."}, {"zh": "现在电脑公司很多，你为什么想来我们公司？", "ko": "지금 컴퓨터 회사가 아주 많은데 당신은 왜 우리 회사에 들어오려고 하지요?"}, {"zh": "你们事一家新开的公司，发展很快。", "ko": "귀사는 새롭게 설립된 회사로 매우 빠르게 발전하고 있습니다."}, {"zh": "我认为在这里工作有前途。", "ko": "이곳에서 일하는 것은 비전이 있다고 생각합니다."}, {"zh": "你说的“有前途”事什么意思？", "ko": "당신이 말한 ‘비전’이란 무슨 뜻인가요?"}, {"zh": "在工作重锻炼，提高工作能力和技术水平，", "ko": "일을 하면서 배우고 업무 능력과 기술 수준을 높일 수 있다는 뜻입니다."}, {"zh": "也希望快点儿增加收入。", "ko": "물론 수입도 빠르게 증가하기를 희망합니다."}, {"zh": "我们这儿的工作很忙，", "ko": "우리 회사는 매우 바쁩니다."}, {"zh": "有时候周末也不能休息。", "ko": "어떤 경우에는 주말에도 쉬지 못합니다."}, {"zh": "我很年轻，喜欢紧张的生活。", "ko": "저는 아직 젊고 바쁘게 생활하는 것을 좋아합니다."}, {"zh": "我母亲常说：“不忙不幸福。“ 我觉得她说得有道理。", "ko": "제 어머님께서는 ‘바쁘지 않으면 행복하지 않다.’는 말씀을 자주 하시는데 어머니 말씀에 일리가 있다고 생각합니다."}, {"zh": "今天的面试就到这儿，结果怎么样请等我们的通知。", "ko": "오늘 면접을 여기까지입니다. 결과가 어떨지는 저희의 통보를 기다려주세요."}, {"zh": "我们公司每年都招一些新职员，其中有不少中年人给我留下了很好的印象。", "ko": "우리 회사는 해마다 직원을 새로 채용하는데, 그중 적지 않은 인상을 남겨 주었습니다."}, {"zh": "因为她们年龄比较大，都工作过一段时间，所以他们懂技术，有经验，能够很快熟悉工作，", "ko": "그분들은 나이가 비교적 많고 모두 어느 정도 일을 해보신 분들이기 떄문에, 기술을 알고 경험이 있어서 업무에 빨리 적응합니다."}, {"zh": "工作起来认真，负责，我对他们很满意。", "ko": "일하는데 있어 열심이고 책임감이 강해서 저는 그분들에게 아주 만족하고 있습니다."}, {"zh": "当然，来面试的大学毕业生也不少，有一丝也成了我们的新职员。", "ko": "물론 면접을 보러 오는 대학 졸업생들도 적지 않고, 어떤 이들은 저희의 신입직원이 되기도 합니다."}, {"zh": "他们热情，爱学习，技术和能力都提高得很快。", "ko": "그들은 열정적이고 배우는 것을 좋아하며 기술과 능력이 아주 빠르게 향상합니다."}, {"zh": "我对他们也很满意。", "ko": "저는 그들에 대해서도 아주 만족합니다."}, {"zh": "他们早就研究过这个问题。", "ko": "그들은 이미 이 문제를 연구했다."}, {"zh": "秘书早就把你的简历交给经历了。", "ko": "비서가 이미 당신의 이력서를 매니저에게 전달했다."}, {"zh": "我早就熟悉这儿得饭馆儿了。", "ko": "나는 이미 이 근처 식당에 익숙하다."}, {"zh": "价钱谈下来了吗？", "ko": "가격을 협상했나요?"}, {"zh": "HSK考试考下来了吗？", "ko": "HSK 시험을 합격했나요?"}, {"zh": "课文背下来了吗？", "ko": "본문을 외웠나요?"}, {"zh": "她陪奶奶买东西去了。", "ko": "그녀는 할머니와 함께 물건을 사러 갔다."}, {"zh": "他陪老师看病去了。", "ko": "그는 선생님과 함께 병원에 갔다."}, {"zh": "爸爸陪孩子换钱去了。", "ko": "아버지는 아이와 함께 돈을 바꾸러 갔다."}, {"zh": "咖啡不苦不是好咖啡。", "ko": "커피가 쓰지 않으면 좋은 커피가 아니다."}, {"zh": "领导不负责不行。", "ko": "지도자가 책임지지 않으면 안 된다."}, {"zh": "成绩不及格不发毕业证。", "ko": "성적이 합격하지 않으면 졸업장을 주지 않는다."}, {"zh": "经理", "ko": "회장, 사장, 매니저"}, {"zh": "秘书", "ko": "비서"}, {"zh": "报纸", "ko": "신문"}, {"zh": "客人", "ko": "소님"}, {"zh": "参观", "ko": "참관하다, 견학하다"}, {"zh": "简历", "ko": "이력서"}, {"zh": "证明", "ko": "증명"}, {"zh": "毕业证", "ko": "졸업증서"}, {"zh": "发展", "ko": "발전하다"}, {"zh": "前途", "ko": "전망"}, {"zh": "能力", "ko": "능력"}, {"zh": "技术", "ko": "기술"}, {"zh": "增加", "ko": "증가하다"}, {"zh": "收入", "ko": "수입"}, {"zh": "面试", "ko": "면접시험(을 치르다)"}, {"zh": "通知", "ko": "통지하다, 알리다"}, {"zh": "其中", "ko": "그중"}, {"zh": "印象", "ko": "인상"}, {"zh": "年龄", "ko": "나이, 연령"}, {"zh": "比较", "ko": "비교적"}, {"zh": "熟悉", "ko": "잘 알다, 익숙하다"}, {"zh": "负责", "ko": "책임감이 강하다, 책임지다"}, {"zh": "提高", "ko": "향상시키다"}, {"zh": "及格", "ko": "합격하다"}, {"zh": "坚持", "ko": "견지하다"}], "vocab": []}, "14과": {"pairs": [{"zh": "王丽，听说你要出国留学了。", "ko": "듣자 하니 네가 해외로 유학 간다단데."}, {"zh": "我刚申请，八字还没一撇呢。", "ko": "이제 막 신청했어, 아직 멀었어."}, {"zh": "出国留学都要办什么手续？", "ko": "해외로 유학 가려면 어떤 절차를 밟아야 하니?"}, {"zh": "先考英语，比如托福，GRE，雅思什么的。成绩好才能申请到奖学金。", "ko": "일단 영어 시험을 봐야 해, 예를 들어 TOEFL, GRE, IELTS와 같은 것들 말이야. 성적이 좋아야지만 장학금을 신청할 수 있어."}, {"zh": "英语你准没问题。大家不是都叫你活词典吗？好像没有你不知道的词。", "ko": "영어는 너는 결코 문제없잖아. 다들 너를 살아 있는 사전이라고 부르지 않니? 아마 네가 모르는 단어는 없을 것 같아."}, {"zh": "哪里，这次我没考雅思，只考了托福和GRE，成绩还没出来。我发了几封申请书，一封回复的邮件都没收到。", "ko": "무슨, 나는 이번에 IELTS 시험을 보지 않고, TOEFL과 GRE만 보았는데, 성적이 아직 안 나왔어. 나는 몇 통의 신청서를 보냈는데 아직 한 통의 답변도 받지 못했어."}, {"zh": "如果有了录取通知书，手续就简单了吧？", "ko": "통지서만 있으면 다른 절차는 간단한 거지?"}, {"zh": "不清楚。我只知道办护照要好几个工作日，办签证还要面谈什么的。", "ko": "확실하지 않아. 나는 단지 여권을 신청하는 데 얼마간의 근무일이 필요하고, 비자를 신청하려면 면접 같은 것을 봐야 한다는 것만 알아."}, {"zh": "学校的录取通知书来了！", "ko": "학교 입학 통지서가 왔어!"}, {"zh": "通知书怎么说？", "ko": "통지서에서 뭐래?"}, {"zh": "是全额奖学金！", "ko": "전액 장학금이래!"}, {"zh": "住的地方怎么安排？", "ko": "사는 곳은 어떻게 해?"}, {"zh": "学校里有宿舍，也可以自己在校外租房子。为了更快地提高语言水平，学校要求外国学生第一年必须住在当地人家里。", "ko": "학교에 기숙사가 있고, 학교 밖에 직접 방을 구해서 살 수도 있어. 언어 수준을 더욱 빠르게 높이기 위해서, 학교는 외국 학생들이 첫 일 년은 반드시 현지인의 집에서 살도록 요구해."}, {"zh": "有道理。", "ko": "맞는 말이다."}, {"zh": "真为你高兴。", "ko": "정말 잘 됐다."}, {"zh": "是你给我带来了好消息，我得好好儿谢谢你。", "ko": "네가 가져다준 좋은 소식이니깐 내가 마땅히 너에게 고마워해야지."}, {"zh": "俗话说人各有志。王丽出国留学了，我真为她高兴。她是每年几十万出国学习的中国人中的一个。", "ko": "사람마다 각자의 뜻이 있다는 말이 있다. 왕리가 유학을 가게 되어 나는 정말 기쁘다. 그녀는 매년 해외로 유학 가는 몇 십만 중국인 중 한 명이 된 것이다."}, {"zh": "不过，我真的不想出国学习。原因很多，例如，我出国后，谁来照顾我母亲？还有我的专业更适合在国内学。", "ko": "하지만 나는 정말로 유학을 가고 싶지 않다. 이유는 아주 많다. 예를 들자면, 내가 유학을 가면 누가 어머니를 돌보겠는가? 그리고 나의 전공은 국내에서 배우는 것이 더 적합하다."}, {"zh": "国内的条件越来越好，好的导师也越来越多，在国内学习同样能够成才。", "ko": "국내의 조건도 점점 좋아지고 있고, 좋은 지도 교수님들도 점점 많아지고 있어서 국내에서 공부해도 마찬가지로 인재가 되기에 충분하다."}, {"zh": "出国", "ko": "출국하다"}, {"zh": "申请", "ko": "신청하다"}, {"zh": "奖学金", "ko": "장학금"}, {"zh": "回复", "ko": "답장하다"}, {"zh": "邮件", "ko": "우편물"}, {"zh": "录取", "ko": "채용하다, 고용하다"}, {"zh": "通知书", "ko": "통지서"}, {"zh": "护照", "ko": "여권"}, {"zh": "签证", "ko": "비자"}, {"zh": "面谈", "ko": "면접"}, {"zh": "全额", "ko": "전액"}, {"zh": "租", "ko": "세내다"}, {"zh": "要求", "ko": "요구하다"}, {"zh": "必须", "ko": "꼭, 반드시"}, {"zh": "当地", "ko": "현지"}, {"zh": "人各有志", "ko": "개인마다 지향하는 것이 다르다"}, {"zh": "例如", "ko": "예를 들다"}, {"zh": "专业", "ko": "전공"}, {"zh": "导师", "ko": "지도교수"}, {"zh": "成才", "ko": "인재가 되다"}, {"zh": "宿舍", "ko": "기숙사"}], "vocab": []}, "필수": {"pairs": [{"zh": "我来跟你一起做饭吧。", "ko": "내가 같이 식사 준비할게요."}, {"zh": "结果把他爱人气哭了。", "ko": "결국 아내를 화나게 해서 울렸어요."}, {"zh": "不说那些，经验从哪儿说起呀？", "ko": "그런 말은 그만하고, 경험은 어디서부터 말하지?"}, {"zh": "你怎么认为呢？", "ko": "당신은 어떻게 생각하세요?"}, {"zh": "只在一点上讨论，那就太简单了。", "ko": "한 가지 점에 대해서만 토론하면 너무 단순해."}, {"zh": "麻烦您帮我叫一下儿刘山。", "ko": "류산을 불러주시겠어요?"}, {"zh": "您知道怎么和他联系吗？", "ko": "그와 어떻게 연락하는지 아세요?"}, {"zh": "请问，王经理在吗？", "ko": "실례지만, 왕 매니저 계세요?"}, {"zh": "我对这份工作感兴趣。", "ko": "저는 이 업무에 흥미가 있습니다."}, {"zh": "我认为在这里工作有前途。", "ko": "저는 여기서 일하는 것이 전망이 있다고 생각합니다."}, {"zh": "什么时候办的喜事？", "ko": "결혼식은 언제 올린 거야?"}, {"zh": "怪不得这几天他没来上班呢。", "ko": "어쩐지 요 며칠 그가 출근하지 않더라니."}, {"zh": "是你们哪，快请进！", "ko": "너희구나, 어서 들어와!"}, {"zh": "请你参加我们的婚礼。", "ko": "우리 결혼식에 참석해 주세요."}, {"zh": "大家说，他们的故事怎么样？", "ko": "여러분, 그들의 이야기 어떤가요?"}, {"zh": "人跟人不一样，拿我来说吧，主要是看电视。", "ko": "사람마다 달라요, 저로 말하자면 주로 TV를 봐요."}, {"zh": "难道你不喜欢流行歌曲吗？", "ko": "설마 너 유행가를 좋아하지 않는 거니?"}, {"zh": "不太喜欢，主要是不常听。", "ko": "별로 좋아하지 않아요, 주로 자주 안 듣거든요."}, {"zh": "这没什么奇怪的，各人有各人的爱好嘛。", "ko": "이상할 것 없어요, 각자 각자의 취미가 있잖아요."}, {"zh": "请朋友们来聚聚，吃顿饭吧？", "ko": "친구들을 불러 모여서 식사를 하는 게 어때요?"}, {"zh": "我建议来个自助餐。", "ko": "저는 뷔페로 하자고 제안해요."}, {"zh": "我早上起得晚，还不太饿。", "ko": "저는 아침에 늦게 일어나서 아직 별로 배가 안 고파 <style>
:root{

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,0.06);}

.hdr-icon{width:30px;height:30px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.hdr-title{font-size:15px;font-weight:700;}
.hdr-score{font-size:13px;color:var(--text2);}
.hdr-score strong{color:var(--text);font-size:15px;font-weight:700;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 54px);}

/* SIDEBAR */
.sb{background:var(--surface);border-right:1px solid var(--border);padding:16px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:0 16px 7px;}
.sb-btn{display:block;width:100%;padding:8px 16px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-left:3px solid transparent;text-align:left;cursor:pointer;transition:all .15s;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.sb-btn:hover{background:var(--bg);color:var(--text);}
.sb-btn.on{background:var(--purple-l);color:var(--purple);border-left-color:var(--purple);font-weight:700;}
.sb-btn .cnt{float:right;font-size:11px;font-weight:400;color:var(--text3);background:var(--surface2);padding:1px 6px;border-radius:10px;}
.sb-btn.on .cnt{background:var(--purple-m);color:#fff;}
.sb-div{height:1px;background:var(--border);margin:8px 16px;}
.sb-sub{font-size:11px;color:var(--text3);font-weight:400;}

/* MAIN */
.main{padding:20px;max-width:700px;}

/* TYPE TABS */
.ttabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px;}
.ttab{padding:4px 12px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.ttab:hover{border-color:var(--purple-m);color:var(--purple);}
.ttab.on{background:var(--purple);border-color:var(--purple);color:#fff;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;text-align:center;}
.sl{font-size:11px;color:var(--text3);margin-bottom:3px;}
.sv{font-size:20px;font-weight:700;}
.sv.ok{color:var(--green);} .sv.ng{color:var(--red);}

.pt{height:4px;background:var(--surface2);border-radius:2px;}
.pf{height:100%;background:var(--purple);border-radius:2px;transition:width .4s ease;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:14px;animation:fi .2s ease;}

.uline{text-decoration:underline;text-decoration-color:var(--purple);text-underline-offset:3px;font-weight:700;color:var(--purple);}

.ai:disabled{opacity:.6;cursor:default;}

.btn{padding:7px 16px;font-size:13px;font-weight:500;border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;background:var(--surface);color:var(--text);transition:all .15s;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.btn:hover{background:var(--surface2);}
.btn.pr{background:var(--purple);border-color:var(--purple);color:#fff;}
.btn.pr:hover{background:#5749a8;}

/* HINT BOX */
.hbox{margin-top:9px;padding:8px 12px;background:var(--purple-l);border-radius:var(--rs);font-size:13px;color:var(--purple);border-left:3px solid var(--purple);display:none;}
.hbox.on{display:block;}

/* RESULT */
.res{margin-top:10px;padding:10px 14px;border-radius:var(--rs);font-size:14px;line-height:1.6;display:none;}
.res.on{display:block;}
.res.ok{background:var(--green-l);border:1px solid #9fd4b5;color:var(--green);}
.res.ng{background:var(--red-l);border:1px solid #f5b7b1;color:var(--red);}
.ans{font-weight:700;}

/* WORD ORDER */
.al{font-size:12px;color:var(--text3);margin-bottom:5px;}
.pool{display:flex;flex-wrap:wrap;gap:7px;min-height:42px;padding:9px;border:1.5px dashed var(--border2);border-radius:var(--rs);margin-bottom:10px;background:var(--bg);}
.aarea{display:flex;flex-wrap:wrap;gap:7px;min-height:42px;padding:8px 11px;border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--surface2);margin-bottom:8px;align-items:center;}
.wc{padding:5px 14px;font-size:14px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.wc:hover{background:var(--purple-l);border-color:var(--purple-m);color:var(--purple);}
.wc.used{opacity:.25;pointer-events:none;}
.pc{padding:5px 14px;font-size:14px;border:1px solid var(--purple-m);border-radius:var(--rs);background:var(--purple-l);color:var(--purple);cursor:pointer;font-weight:500;transition:all .15s;font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}
.pc:hover{background:#d8d2f7;}
.ae{font-size:13px;color:var(--text3);}

.wlog-overlay.on{display:flex;}
.wlog-panel{background:var(--surface);border-radius:var(--r);width:min(680px,95vw);max-height:85vh;display:flex;flex-direction:column;box-shadow:0 12px 48px rgba(0,0,0,.18);overflow:hidden;}
.wlog-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}

.wlog-close:hover{background:var(--surface2);}
.wlog-toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.wlog-filter{padding:4px 11px;font-size:12px;border:1px solid var(--border2);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;}

.wlog-body{overflow-y:auto;flex:1;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}

.wi{border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;background:var(--surface);}
.wi-top{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
.wi-zh{font-size:15px;font-weight:500;font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;color:var(--text);line-height:1.6;}
.wi-ko{font-size:13px;color:var(--text2);margin-top:4px;}
.wi-ans{font-size:13px;color:var(--red);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);}
.wi-ans strong{color:var(--green);}
.wi-retry{margin-top:8px;display:flex;gap:6px;}
.btn-sm{padding:4px 11px;font-size:12px;border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;background:var(--surface);color:var(--text2);font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;transition:all .15s;}
.btn-sm:hover{background:var(--surface2);}
.btn-sm.del{color:var(--red);border-color:#f5b7b1;}
.btn-sm.del:hover{background:var(--red-l);}
/* HEADER LOG BTN */
.hdr-btns{display:flex;align-items:center;gap:10px;}
.log-btn{padding:5px 12px;font-size:12px;font-weight:600;border:1px solid #f5b7b1;border-radius:20px;background:var(--red-l);color:var(--red);cursor:pointer;display:flex;align-items:center;gap:5px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;transition:all .15s;}
.log-btn:hover{background:#fbd5d5;}
.log-btn .lbcnt{background:var(--red);color:#fff;border-radius:10px;padding:0 6px;font-size:11px;min-width:18px;text-align:center;}

/* MOBILE */
@media(max-width:650px){
  .layout{grid-template-columns:1fr;}
  .sb{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:10px 0;overflow-x:auto;display:flex;flex-wrap:nowrap;gap:0;}
  .sb-btn{white-space:nowrap;padding:6px 12px;font-size:12px;}
  .sb-label,.sb-div{display:none;}
  .main{padding:14px;max-width:100%;}
  .qt{font-size:16px;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">
    <div class="hdr-icon">中</div>
    <div class="hdr-title">중회화 기말 연습</div>
  </div>
  <div class="hdr-btns">
    <button class="log-btn" id="logBtn" onclick="openLog()">❌ 오답 노트 <span class="lbcnt" id="logCnt">0</span></button>
    <div class="hdr-score">점수&nbsp;<strong id="hS">0</strong>&nbsp;/ <span id="hD">0</span></div>
  </div>
</header>

<!-- 오답 노트 패널 -->
<div class="wlog-overlay" id="wlogOverlay">
  <div class="wlog-panel">
    <div class="wlog-head">
      <h2>❌ 오답 노트 <span class="wbadge" id="wlogCntHead">0개</span></h2>
      <button class="wlog-close" onclick="closeLog()">✕</button>
    </div>
    <div class="wlog-toolbar">
      <span style="font-size:12px;color:var(--text3);margin-right:4px;">유형:</span>
      <button class="wlog-filter on" data-ft="all" onclick="filterLog('all',this)">전체</button>
      <button class="wlog-filter" data-ft="1" onclick="filterLog('1',this)">병음</button>
      <button class="wlog-filter" data-ft="2" onclick="filterLog('2',this)">중→한</button>
      <button class="wlog-filter" data-ft="3" onclick="filterLog('3',this)">한→중</button>
      <button class="wlog-filter" data-ft="4" onclick="filterLog('4',this)">어순</button>
      <button class="wlog-filter" data-ft="5" onclick="filterLog('5',this)">숙어</button>
      <button class="wlog-filter" data-ft="6" onclick="filterLog('6',this)">중작</button>
      <button class="wlog-filter" data-ft="7" onclick="filterLog('7',this)">빈칸</button>
      <button class="btn-sm del" style="margin-left:auto" onclick="clearLog()">전체 삭제</button>
      <button class="btn-sm" onclick="exportLog()">📋 복사</button>
    </div>
    <div class="wlog-body" id="wlogBody"></div>
  </div>
</div>
<div class="layout">
  <aside class="sb" id="sidebar"></aside>
  <main class="main">
    <div class="ttabs" id="ttabs"></div>
    <div class="stats">
      <div class="sc"><div class="sl">풀었어요</div><div class="sv" id="sDone">0</div></div>
      <div class="sc"><div class="sl">맞았어요</div><div class="sv ok" id="sRight">0</div></div>
      <div class="sc"><div class="sl">틀렸어요</div><div class="sv ng" id="sWrong">0</div></div>
    </div>
    <div class="pw">
      <div class="pi"><span id="pLbl">진행률</span><span id="pPct">0%</span></div>
      <div class="pt"><div class="pf" id="pFill" style="width:0%"></div></div>
    </div>
    <div id="qw"></div>
    <div class="nav">
      <button class="btn" id="bPrev">← 이전</button>
      <span class="npos" id="qcnt"></span>
      <button class="btn pr" id="bNext">다음 →</button>
    </div>
  </main>
</div>


<script>
const RAW = JSON.parse(document.getElementById('quiz-data').textContent);

const LESSON_META = {
  "8과":  {label:"8과",  sub:"남녀평등·가사"},
  "9과":  {label:"9과",  sub:"전화·구직"},
  "10과": {label:"10과", sub:"결혼·경사"},
  "11과": {label:"11과", sub:"일상·취미"},
  "12과": {label:"12과", sub:"음식·식습관"},
  "13과": {label:"13과", sub:"집·자연"},
  "14과": {label:"14과", sub:"유학·해외"},
  "필수": {label:"⭐ 필수", sub:"시험 필출 문장"},
};
const LESSON_ORDER = ["8과","9과","10과","11과","12과","13과","14과","필수"];
const TYPE_NAME = {
  1:"유형1 — 병음 쓰기",
  2:"유형2 — 중→한 해석",
  3:"유형3 — 한→중 쓰기",
  4:"유형4 — 어순 배열",
  5:"유형5 — 숙어 해석",
  7:"유형7 — 빈칸 채우기",
};

function buildQs(lesson) {
  const qs = [];
  const pairs = RAW.sentences[lesson]?.pairs || [];
  const pinyinArr = RAW.pinyin[lesson] || [];
  const orderArr = RAW.ordering[lesson] || [];
  const idiomArr = RAW.idioms[lesson] || [];
  const blankArr = RAW.blanks[lesson] || [];
  pinyinArr.forEach(([zh, py, ko]) => qs.push({t:1, q:zh, kor:ko, a:py}));
  pairs.forEach(({zh, ko}) => { if (zh && ko) qs.push({t:2, q:zh, a:ko, hint:'본문 문장'}); });
  pairs.forEach(({zh, ko}) => { if (zh && ko) qs.push({t:3, q:ko, a:zh, hint:'본문 문장'}); });
  orderArr.forEach(o => qs.push({t:4, words:o.words, a:o.a, hint:o.hint}));
  idiomArr.forEach(o => qs.push({t:5, sentence:o.sentence, key:o.key, a:o.a}));
  blankArr.forEach(o => qs.push({t:7, q:o.q, a:o.a, hint:o.hint}));
  return qs;
}
function buildAllQs() {
  return LESSON_ORDER.flatMap(l => buildQs(l).map(q => ({...q, _l:l})));
}

let curLesson="8과", curType="all", filtered=[], curIdx=0;
let answered={}, correct=0, wrong=0, poolState={};
let wrongLog=[], logFilter='all';

function init() {
  buildSidebar(); buildTypeTabs(); applyFilter();
  document.getElementById('bPrev').onclick = () => { if(curIdx>0){curIdx--;renderQ();} };
  document.getElementById('bNext').onclick = () => { if(curIdx<filtered.length-1){curIdx++;renderQ();} };
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="sb-label">과 선택</div>';
  LESSON_ORDER.forEach(l => {
    const cnt = buildQs(l).length;
    const m = LESSON_META[l];
    html += `<button class="sb-btn${l===curLesson?' on':''}" data-l="${l}">
      ${m.label} <span class="sb-sub">${m.sub}</span>
      <span class="cnt">${cnt}</span>
    </button>`;
  });
  html += '<div class="sb-div"></div><div class="sb-label">전체</div>';
  html += `<button class="sb-btn${curLesson==='전체'?' on':''}" data-l="전체">전체 문제 보기 <span class="cnt">${buildAllQs().length}</span></button>`;
  sb.innerHTML = html;
  sb.querySelectorAll('.sb-btn').forEach(b => b.addEventListener('click', () => setLesson(b.dataset.l)));
}

function buildTypeTabs() {
  const all = getAll();
  const types = [...new Set(all.map(q => q.t))].sort();
  const bar = document.getElementById('ttabs');
  bar.innerHTML = `<button class="ttab${curType==='all'?' on':''}" data-t="all">전체 유형</button>`
    + types.map(t => `<button class="ttab${curType==t?' on':''}" data-t="${t}">${TYPE_NAME[t]}</button>`).join('');
  bar.querySelectorAll('.ttab').forEach(b => b.addEventListener('click', () => setType(b.dataset.t)));
}

function getAll() {
  if (curLesson==='전체') return buildAllQs();
  return buildQs(curLesson);
}
function setLesson(l) {
  curLesson=l; curType='all'; curIdx=0;
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.toggle('on', b.dataset.l===l));
  buildTypeTabs(); applyFilter();
}
function setType(t) { curType=t; curIdx=0; buildTypeTabs(); applyFilter(); }

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function applyFilter() {
  const all = getAll();
  const base = curType==='all' ? [...all] : all.filter(q => q.t==curType);
  filtered = shuffle(base); curIdx=0; renderQ();
}

function getKey(q) {
  return `${q._l||curLesson}|${q.t}|${JSON.stringify(q.q||q.words||q.sentence)}`;
}

function renderQ() {
  const wrap = document.getElementById('qw');
  if (!filtered.length) {
    wrap.innerHTML='<div class="empty">이 조합의 문제가 없습니다.</div>';
    document.getElementById('qcnt').textContent='';
    document.getElementById('pFill').style.width='0%';
    document.getElementById('pPct').textContent='0%';
    buildTypeTabs(); return;
  }
  buildTypeTabs();
  const q=filtered[curIdx], key=getKey(q);
  const isDone=answered[key]!==undefined, wasOk=answered[key];
  const lBadge=(curLesson==='전체'&&q._l)?`<span class="b b-l">${q._l}</span>`:'';

  let body='';
  if (q.t===1) {
    body=`<div class="qt">${q.q}</div><div class="qk">${q.kor}</div>
    <div class="pnote">성조 부호 없이 일반 알파벳으로 입력해도 됩니다.</div>
    <input class="ai" id="ai" type="text" placeholder="병음을 입력하세요..." ${isDone?'disabled':''}>`;
  } else if (q.t===2) {
    body=`<div class="qt">${escHtml(q.q)}</div>
    <input class="ai" id="ai" type="text" placeholder="한국어 뜻을 쓰세요..." ${isDone?'disabled':''}>`;
  } else if (q.t===3) {
    body=`<div class="qt" style="font-size:17px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif">${escHtml(q.q)}</div>
    <input class="ai" id="ai" type="text" placeholder="중국어(한자 또는 병음)로 쓰세요..." ${isDone?'disabled':''}>`;
  } else if (q.t===4) {
    if (!poolState[key]) {
      const pool=q.words.map((w,i)=>({w,i,used:false}));
      for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
      poolState[key]={pool,ans:[]};
    }
    const st=poolState[key];
    const poolHtml=st.pool.map(item=>`<div class="wc${item.used?' used':''}" data-wi="${item.i}">${item.w}</div>`).join('');
    const ansHtml=st.ans.map((item,pos)=>`<div class="pc" data-pos="${pos}">${item.w}</div>`).join('');
    body=`<div class="al">단어를 클릭해서 문장을 만드세요</div>
    <div class="pool" id="pool">${poolHtml}</div>
    <div class="al">내 답안 <span style="font-size:11px;color:var(--text3)">(클릭하면 제거)</span></div>
    <div class="aarea" id="aarea">${ansHtml||'<span class="ae">여기에 단어가 쌓입니다</span>'}</div>`;
  } else if (q.t===5) {
    const hl=escHtml(q.sentence).replace(escHtml(q.key),`<span class="uline">${escHtml(q.key)}</span>`);
    body=`<div class="qt">${hl}</div>
    <div class="qh">밑줄 친 <strong style="color:var(--purple)">${escHtml(q.key)}</strong>의 뜻을 쓰세요.</div>
    <input class="ai" id="ai" type="text" placeholder="밑줄 친 표현의 한국어 뜻을 쓰세요..." ${isDone?'disabled':''}>`;
  } else if (q.t===7) {
    body=`<div class="qt">${escHtml(q.q)}</div>
    <input class="ai" id="ai" type="text" placeholder="빈칸에 들어갈 말을 쓰세요..." ${isDone?'disabled':''}>
    <div class="hbox" id="hbox">💡 ${escHtml(q.hint)}</div>`;
  }

  let btns='';
  if (q.t===4) {
    if(!isDone) btns+=`<button class="btn pr" id="chk">채점하기</button>`;
    btns+=`<button class="btn" id="rst">초기화</button>`;
    btns+=`<button class="btn" id="shw">정답 보기</button>`;
  } else if (q.t===7) {
    if(!isDone) btns+=`<button class="btn pr" id="chk">채점하기</button>`;
    btns+=`<button class="btn ht" id="hto">힌트 보기/숨기기</button>`;
    btns+=`<button class="btn" id="shw">정답 보기</button>`;
  } else {
    if(!isDone) btns+=`<button class="btn pr" id="chk">채점하기</button>`;
    btns+=`<button class="btn" id="shw">정답 보기</button>`;
  }

  const resHtml=isDone?`<div class="res ${wasOk?'ok':'ng'} on">${wasOk?'✓ 정답!':'✗ 오답'} <span class="ans">정답: ${escHtml(q.a)}</span></div>`:'';

  wrap.innerHTML=`<div class="card">
    <div class="bdg"><span class="b b-t">${TYPE_NAME[q.t]}</span>${lBadge}</div>
    <div class="qn">문제 ${curIdx+1} / ${filtered.length}</div>
    ${body}
    <div class="brow">${btns}</div>
    <div id="rb">${resHtml}</div>
  </div>`;

  const ai=document.getElementById('ai');
  if(ai&&!isDone) ai.addEventListener('keydown',e=>{if(e.key==='Enter')doCheck(key,q);});
  document.getElementById('chk')?.addEventListener('click',()=>doCheck(key,q));
  document.getElementById('shw')?.addEventListener('click',()=>doShow(key,q));
  document.getElementById('rst')?.addEventListener('click',()=>doReset(key,q));
  document.getElementById('hto')?.addEventListener('click',()=>document.getElementById('hbox')?.classList.toggle('on'));
  if(q.t===4&&!isDone){
    document.querySelectorAll('.wc').forEach(el=>el.addEventListener('click',()=>doPlace(key,q,+el.dataset.wi)));
    document.querySelectorAll('.pc').forEach(el=>el.addEventListener('click',()=>doRemove(key,q,+el.dataset.pos)));
  }
  updateUI();
}

function normP(s) {
  return s.toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i')
    .replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u')
    .replace(/\s+/g,' ').trim();
}
function doPlace(key,q,wi){const st=poolState[key];if(!st)return;const item=st.pool.find(p=>p.i===wi);if(!item||item.used)return;item.used=true;st.ans.push(item);renderQ();}
function doRemove(key,q,pos){const st=poolState[key];if(!st||answered[key]!==undefined)return;st.pool.find(p=>p.i===st.ans[pos].i).used=false;st.ans.splice(pos,1);renderQ();}
function doReset(key,q){if(answered[key]!==undefined)return;poolState[key]={pool:q.words.map((w,i)=>({w,i,used:false})),ans:[]};renderQ();}

function doCheck(key,q) {
  if(answered[key]!==undefined) return;
  let isOk=false;
  if(q.t===4){
    const st=poolState[key];if(!st||!st.ans.length)return;
    const user=st.ans.map(i=>i.w).join('').replace(/[，。！？\s]/g,'');
    isOk=user===q.a.replace(/[，。！？\s]/g,'');
  } else {
    const ai=document.getElementById('ai');if(!ai||!ai.value.trim())return;
    const user=ai.value.trim(), uN=normP(user);
    const alts=q.a.split('/').map(s=>s.trim());
    isOk=alts.some(alt=>{
      const cn=alt.replace(/[^\u4e00-\u9fff]/g,''), un=user.replace(/[^\u4e00-\u9fff]/g,'');
      if(cn&&un) return cn===un;
      const aN=normP(alt);
      return uN===aN||uN.replace(/\s/g,'')===aN.replace(/\s/g,'');
    });
    if(q.t===5){
      const aFlat=normP(q.a.split('(')[0].split('（')[0]);
      isOk=isOk||normP(user).split(' ').some(w=>w.length>1&&aFlat.includes(w));
    }
    if(q.t===2){
      const aWords=q.a.split(/[,，\s]+/).filter(w=>w.length>1);
      const uWords=user.split(/[,，\s]+/);
      if(!isOk&&aWords.length>0){
        const matched=aWords.filter(aw=>uWords.some(uw=>uw.includes(aw)||aw.includes(uw)));
        isOk=matched.length>=Math.ceil(aWords.length*0.6);
      }
    }
    if(q.t===3&&!isOk){
      const pinyinList=RAW.pinyin[q._l||curLesson]||[];
      const matchPin=pinyinList.find(p=>p[0]===q.a);
      if(matchPin) isOk=normP(user)===normP(matchPin[1])||normP(user).replace(/\s/g,'')===normP(matchPin[1]).replace(/\s/g,'');
      if(!isOk&&q.a.includes('/')){
        const parts=q.a.split('/').map(s=>s.trim());
        isOk=parts.some(p=>normP(user)===normP(p)||normP(user).replace(/\s/g,'')===normP(p).replace(/\s/g,''));
      }
    }
    ai.disabled=true;
  }
  answered[key]=isOk;
  if(isOk) correct++;
  else { wrong++; addToLog(key,q,(q.t===4)?'(어순배열)':(document.getElementById('ai')?.value||'')); }
  updateUI();
  document.getElementById('rb').innerHTML=`<div class="res ${isOk?'ok':'ng'} on">${isOk?'✓ 정답!':'✗ 오답'} <span class="ans">정답: ${escHtml(q.a)}</span></div>`;
  document.getElementById('chk')?.remove();
}
function doShow(key,q){
  if(answered[key]===undefined){answered[key]=false;wrong++;addToLog(key,q,'(정답 보기)');updateUI();}
  const ai=document.getElementById('ai');if(ai)ai.disabled=true;
  document.getElementById('rb').innerHTML=`<div class="res ng on">정답: <span class="ans">${escHtml(q.a)}</span></div>`;
  document.getElementById('chk')?.remove();
}
function updateUI(){
  const done=Object.keys(answered).length;
  document.getElementById('sDone').textContent=done;
  document.getElementById('sRight').textContent=correct;
  document.getElementById('sWrong').textContent=wrong;
  document.getElementById('hS').textContent=correct;
  document.getElementById('hD').textContent=done;
  const n=filtered.length,i=curIdx+1;
  document.getElementById('qcnt').textContent=n?`${i} / ${n}`:'';
  const pct=n?Math.round(i/n*100):0;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pPct').textContent=pct+'%';
  document.getElementById('pLbl').textContent=n?`${i}번 문제`:'진행률';
}

function addToLog(key,q,userAns){if(wrongLog.find(w=>w.key===key))return;wrongLog.push({key,q,lesson:q._l||curLesson,userAns,ts:Date.now()});updateLogBadge();}
function removeFromLog(key){wrongLog=wrongLog.filter(w=>w.key!==key);updateLogBadge();renderLog();}
function clearLog(){if(!wrongLog.length)return;if(!confirm(`오답 노트 ${wrongLog.length}개를 모두 삭제할까요?`))return;wrongLog=[];updateLogBadge();renderLog();}
function updateLogBadge(){const n=wrongLog.length;document.getElementById('logCnt').textContent=n;document.getElementById('wlogCntHead').textContent=n+'개';}
function openLog(){logFilter='all';document.querySelectorAll('.wlog-filter').forEach(b=>b.classList.toggle('on',b.dataset.ft==='all'));renderLog();document.getElementById('wlogOverlay').classList.add('on');}
function closeLog(){document.getElementById('wlogOverlay').classList.remove('on');}
function filterLog(ft,btn){logFilter=ft;document.querySelectorAll('.wlog-filter').forEach(b=>b.classList.toggle('on',b===btn));renderLog();}
function renderLog(){
  const body=document.getElementById('wlogBody');
  const list=logFilter==='all'?wrongLog:wrongLog.filter(w=>String(w.q.t)===logFilter);
  if(!list.length){body.innerHTML=`<div class="wlog-empty">${wrongLog.length?'이 유형의 오답이 없어요 🎉':'아직 오답이 없어요 🎉<br><span style="font-size:13px">틀린 문제가 여기에 쌓여요.</span>'}</div>`;return;}
  body.innerHTML=list.slice().reverse().map(w=>{
    const q=w.q,lbl=TYPE_NAME[q.t]||'',lesson=w.lesson||'';
    let qHtml='';
    if(q.t===1) qHtml=`<div class="wi-zh">${escHtml(q.q)}</div><div class="wi-ko">${escHtml(q.kor)}</div>`;
    else if(q.t===2) qHtml=`<div class="wi-zh">${escHtml(q.q)}</div>`;
    else if(q.t===3) qHtml=`<div class="wi-zh" style="font-family:-apple-system,sans-serif;font-size:15px">${escHtml(q.q)}</div>`;
    else if(q.t===4) qHtml=`<div class="wi-zh">${q.words.map(w=>escHtml(w)).join(' / ')}</div>`;
    else if(q.t===5){const hl=escHtml(q.sentence).replace(escHtml(q.key),`<span class="uline">${escHtml(q.key)}</span>`);qHtml=`<div class="wi-zh">${hl}</div>`;}
    else if(q.t===7) qHtml=`<div class="wi-zh">${escHtml(q.q)}</div>`;
    const userTxt=w.userAns&&w.userAns!=='(어순배열)'&&w.userAns!=='(정답 보기)'?`내 답: <span style="text-decoration:line-through;color:var(--text3)">${escHtml(w.userAns)}</span> &nbsp;→&nbsp; `:'';
    return `<div class="wi"><div class="wi-top"><span class="b b-t" style="font-size:10px">${lbl}</span>${lesson?`<span class="b b-l" style="font-size:10px">${lesson}</span>`:''}</div>${qHtml}<div class="wi-ans">${userTxt}<strong>정답: ${escHtml(q.a)}</strong></div><div class="wi-retry"><button class="btn-sm" onclick="goToQ('${escHtml(w.key)}')">문제로 이동</button><button class="btn-sm del" onclick="removeFromLog('${escHtml(w.key)}')">삭제</button></div></div>`;
  }).join('');
}
function exportLog(){
  if(!wrongLog.length){alert('오답이 없어요!');return;}
  const list=logFilter==='all'?wrongLog:wrongLog.filter(w=>String(w.q.t)===logFilter);
  const lines=list.slice().reverse().map(w=>{const q=w.q,lbl=TYPE_NAME[q.t]||'';let qStr=q.q||(q.words?q.words.join(' / '):q.sentence)||'';return `[${w.lesson||''}] ${lbl}\n문제: ${qStr}\n정답: ${q.a}${w.userAns&&w.userAns!=='(어순배열)'&&w.userAns!=='(정답 보기)'?'\n내 답: '+w.userAns:''}\n`;}).join('\n');
  const txt=`중회화 오답 노트 (${list.length}개)\n${'='.repeat(40)}\n\n${lines}`;
  navigator.clipboard.writeText(txt).then(()=>alert('클립보드에 복사됐어요!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('클립보드에 복사됐어요!');});
}
function goToQ(key){
  const entry=wrongLog.find(w=>w.key===key);if(!entry)return;
  closeLog();setLesson(entry.lesson);setType(entry.q.t);
  const idx=filtered.findIndex(q=>getKey(q)===key);
  if(idx>=0){curIdx=idx;renderQ();}
}
function escHtml(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function loadLog(){updateLogBadge();}
init();
loadLog();
document.getElementById('wlogOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('wlogOverlay'))closeLog();});

</script>
