<body>

<header class="hdr">
  <div class="hdr-logo">
    <div class="hdr-icon">中</div>
    <div class="hdr-title">중회화 기말 연습</div>
  </div>
  <div class="hdr-btns">
    <button class="log-btn" id="logBtn" onclick="openLog()">❌ 오답 노트 <span class="lbcnt" id="logCnt">0</span></button>
    <div class="hdr-score">점수&nbsp;<strong id="hS">0</strong>&nbsp;/ <span id="hD">0</span></div>
  </div>
</header>

<!-- 오답 노트 패널 -->
<div class="wlog-overlay" id="wlogOverlay">
  <div class="wlog-panel">
    <div class="wlog-head">
      <h2>❌ 오답 노트 <span class="wbadge" id="wlogCntHead">0개</span></h2>
      <button class="wlog-close" onclick="closeLog()">✕</button>
    </div>
    <div class="wlog-toolbar">
      <span style="font-size:12px;color:var(--text3);margin-right:4px;">유형:</span>
      <button class="wlog-filter on" data-ft="all" onclick="filterLog('all',this)">전체</button>
      <button class="wlog-filter" data-ft="1" onclick="filterLog('1',this)">병음</button>
      <button class="wlog-filter" data-ft="2" onclick="filterLog('2',this)">중→한</button>
      <button class="wlog-filter" data-ft="3" onclick="filterLog('3',this)">한→중</button>
      <button class="wlog-filter" data-ft="4" onclick="filterLog('4',this)">어순</button>
      <button class="wlog-filter" data-ft="5" onclick="filterLog('5',this)">숙어</button>
      <button class="wlog-filter" data-ft="6" onclick="filterLog('6',this)">중작</button>
      <button class="wlog-filter" data-ft="7" onclick="filterLog('7',this)">빈칸</button>
      <button class="btn-sm del" style="margin-left:auto" onclick="clearLog()">전체 삭제</button>
      <button class="btn-sm" onclick="exportLog()">📋 복사</button>
    </div>
    <div class="wlog-body" id="wlogBody"></div>
  </div>
</div>
<div class="layout">
  <aside class="sb" id="sidebar"></aside>
  <main class="main">
    <div class="ttabs" id="ttabs"></div>
    <div class="stats">
      <div class="sc"><div class="sl">풀었어요</div><div class="sv" id="sDone">0</div></div>
      <div class="sc"><div class="sl">맞았어요</div><div class="sv ok" id="sRight">0</div></div>
      <div class="sc"><div class="sl">틀렸어요</div><div class="sv ng" id="sWrong">0</div></div>
    </div>
    <div class="pw">
      <div class="pi"><span id="pLbl">진행률</span><span id="pPct">0%</span></div>
      <div class="pt"><div class="pf" id="pFill" style="width:0%"></div></div>
    </div>
    <div id="qw"></div>
    <div class="nav">
      <button class="btn" id="bPrev">← 이전</button>
      <span class="npos" id="qcnt"></span>
      <button class="btn pr" id="bNext">다음 →</button>
    </div>
  </main>
</div>


<script>
const RAW = JSON.parse(document.getElementById('quiz-data').textContent);

const LESSON_META = {
  "8과":  {label:"8과",  sub:"남녀평등·가사"},
  "9과":  {label:"9과",  sub:"전화·구직"},
  "10과": {label:"10과", sub:"결혼·경사"},
  "11과": {label:"11과", sub:"일상·취미"},
  "12과": {label:"12과", sub:"음식·식습관"},
  "13과": {label:"13과", sub:"집·자연"},
  "14과": {label:"14과", sub:"유학·해외"},
  "필수": {label:"⭐ 필수", sub:"시험 필출 문장"},
};
const LESSON_ORDER = ["8과","9과","10과","11과","12과","13과","14과","필수"];
const TYPE_NAME = {
  1:"유형1 — 병음 쓰기",
  2:"유형2 — 중→한 해석",
  3:"유형3 — 한→중 쓰기",
  4:"유형4 — 어순 배열",
  5:"유형5 — 숙어 해석",
  7:"유형7 — 빈칸 채우기",
};

function buildQs(lesson) {
  const qs = [];
  const pairs = RAW.sentences[lesson]?.pairs || [];
  const pinyinArr = RAW.pinyin[lesson] || [];
  const orderArr = RAW.ordering[lesson] || [];
  const idiomArr = RAW.idioms[lesson] || [];
  const blankArr = RAW.blanks[lesson] || [];
  pinyinArr.forEach(([zh, py, ko]) => qs.push({t:1, q:zh, kor:ko, a:py}));
  pairs.forEach(({zh, ko}) => { if (zh && ko) qs.push({t:2, q:zh, a:ko, hint:'본문 문장'}); });
  pairs.forEach(({zh, ko, py}) => { if (zh && ko) qs.push({t:3, q:ko, a:zh, hint:'본문 문장', py:py||''}); });
  orderArr.forEach(o => qs.push({t:4, words:o.words, a:o.a, hint:o.hint, ko:o.ko||''}));
  idiomArr.forEach(o => qs.push({t:5, sentence:o.sentence, key:o.key, a:o.a}));
  blankArr.forEach(o => qs.push({t:7, q:o.q, a:o.a, hint:o.hint, choices:o.choices||[]}));
  return qs;
}
function buildAllQs() {
  return LESSON_ORDER.flatMap(l => buildQs(l).map(q => ({...q, _l:l})));
}

let curLesson="8과", curType="all", filtered=[], curIdx=0;
let answered={}, correct=0, wrong=0, poolState={};
let wrongLog=[], logFilter='all';

function init() {
  buildSidebar(); buildTypeTabs(); applyFilter();
  document.getElementById('bPrev').onclick = () => { if(curIdx>0){curIdx--;renderQ();} };
  document.getElementById('bNext').onclick = () => { if(curIdx<filtered.length-1){curIdx++;renderQ();} };
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="sb-label">과 선택</div>';
  LESSON_ORDER.forEach(l => {
    const cnt = buildQs(l).length;
    const m = LESSON_META[l];
    html += `<button class="sb-btn${l===curLesson?' on':''}" data-l="${l}">
      ${m.label} <span class="sb-sub">${m.sub}</span>
      <span class="cnt">${cnt}</span>
    </button>`;
  });
  html += '<div class="sb-div"></div><div class="sb-label">전체</div>';
  html += `<button class="sb-btn${curLesson==='전체'?' on':''}" data-l="전체">전체 문제 보기 <span class="cnt">${buildAllQs().length}</span></button>`;
  sb.innerHTML = html;
  sb.querySelectorAll('.sb-btn').forEach(b => b.addEventListener('click', () => setLesson(b.dataset.l)));
}

function buildTypeTabs() {
  const all = getAll();
  const types = [...new Set(all.map(q => q.t))].sort();
  const bar = document.getElementById('ttabs');
  bar.innerHTML = `<button class="ttab${curType==='all'?' on':''}" data-t="all">전체 유형</button>`
    + types.map(t => `<button class="ttab${curType==t?' on':''}" data-t="${t}">${TYPE_NAME[t]}</button>`).join('');
  bar.querySelectorAll('.ttab').forEach(b => b.addEventListener('click', () => setType(b.dataset.t)));
}

function getAll() {
  if (curLesson==='전체') return buildAllQs();
  return buildQs(curLesson);
}
function setLesson(l) {
  curLesson=l; curType='all'; curIdx=0;
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.toggle('on', b.dataset.l===l));
  buildTypeTabs(); applyFilter();
}
function setType(t) { curType=t; curIdx=0; buildTypeTabs(); applyFilter(); }

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function applyFilter() {
  const all = getAll();
  const base = curType==='all' ? [...all] : all.filter(q => q.t==curType);
  filtered = shuffle(base); curIdx=0; renderQ();
}

function getKey(q) {
  return `${q._l||curLesson}|${q.t}|${JSON.stringify(q.q||q.words||q.sentence)}`;
}

function renderQ() {
  const wrap = document.getElementById('qw');
  if (!filtered.length) {
    wrap.innerHTML='<div class="empty">이 조합의 문제가 없습니다.</div>';
    document.getElementById('qcnt').textContent='';
    document.getElementById('pFill').style.width='0%';
    document.getElementById('pPct').textContent='0%';
    buildTypeTabs(); return;
  }
  buildTypeTabs();
  const q=filtered[curIdx], key=getKey(q);
  const isDone=answered[key]!==undefined, wasOk=answered[key];
  const lBadge=(curLesson==='전체'&&q._l)?`<span class="b b-l">${q._l}</span>`:'';

  let body='';
  if (q.t===1) {
    body=`<div class="qt">${q.q}</div><div class="qk">${q.kor}</div>
    <div class="pnote">성조 부호 없이 일반 알파벳으로 입력해도 됩니다.</div>
    <input class="ai" id="ai" type="text" placeholder="병음을 입력하세요..." ${isDone?'disabled':''}>`;
  } else if (q.t===2) {
    body=`<div class="qt">${escHtml(q.q)}</div>
    <input class="ai" id="ai" type="text" placeholder="한국어 뜻을 쓰세요..." ${isDone?'disabled':''}>`;
  } else if (q.t===3) {
    body=`<div class="qt" style="font-size:17px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif">${escHtml(q.q)}</div>
    <input class="ai" id="ai" type="text" placeholder="중국어(한자 또는 병음)로 쓰세요..." ${isDone?'disabled':''}>`;
  } else if (q.t===4) {
    if (!poolState[key]) {
      const pool=q.words.map((w,i)=>({w,i,used:false}));
      for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
      poolState[key]={pool,ans:[]};
    }
    const st=poolState[key];
    const poolHtml=st.pool.map(item=>`<div class="wc${item.used?' used':''}" data-wi="${item.i}">${item.w}</div>`).join('');
    const ansHtml=st.ans.map((item,pos)=>`<div class="pc" data-pos="${pos}">${item.w}</div>`).join('');
    body=`<div class="al">단어를 클릭해서 문장을 만드세요</div>
    <div class="pool" id="pool">${poolHtml}</div>
    <div class="al">내 답안 <span style="font-size:11px;color:var(--text3)">(클릭하면 제거)</span></div>
    <div class="aarea" id="aarea">${ansHtml||'<span class="ae">여기에 단어가 쌓입니다</span>'}</div>`;
  } else if (q.t===5) {
    const hl=escHtml(q.sentence).replace(escHtml(q.key),`<span class="uline">${escHtml(q.key)}</span>`);
    body=`<div class="qt">${hl}</div>
    <div class="qh">밑줄 친 <strong style="color:var(--purple)">${escHtml(q.key)}</strong>의 뜻을 쓰세요.</div>
    <input class="ai" id="ai" type="text" placeholder="밑줄 친 표현의 한국어 뜻을 쓰세요..." ${isDone?'disabled':''}>`;
  } else if (q.t===7) {
    const choices = q.choices || [];
    const correctAnsDisplay = q.a.split('/')[0].trim();
    const choiceHtml = choices.map(c =>
      `<button class="choice-btn${isDone?(c===correctAnsDisplay?' choice-correct':q._userAns===c?' choice-wrong':''):''}" data-c="${escHtml(c)}" ${isDone?'disabled':''}>${c}</button>`
    ).join('');
    body=`<div class="qt">${escHtml(q.q)}</div>
    <div class="choice-grid" id="choiceGrid">${choiceHtml}</div>`;
  }

  let btns='';
  if (q.t===4) {
    if(!isDone) btns+=`<button class="btn pr" id="chk">채점하기</button>`;
    btns+=`<button class="btn" id="rst">초기화</button>`;
    btns+=`<button class="btn" id="shw">정답 보기</button>`;
  } else if (q.t===7) {
    btns+=`<button class="btn" id="shw">정답 보기</button>`;
  } else {
    if(!isDone) btns+=`<button class="btn pr" id="chk">채점하기</button>`;
    btns+=`<button class="btn" id="shw">정답 보기</button>`;
  }

  const resHtml=isDone?`<div class="res ${wasOk?'ok':'ng'} on">${wasOk?'✓ 정답!':'✗ 오답'} <span class="ans">정답: ${escHtml(q.a)}</span></div>`:'';

  wrap.innerHTML=`<div class="card">
    <div class="bdg"><span class="b b-t">${TYPE_NAME[q.t]}</span>${lBadge}</div>
    <div class="qn">문제 ${curIdx+1} / ${filtered.length}</div>
    ${body}
    <div class="brow">${btns}</div>
    <div id="rb">${resHtml}</div>
  </div>`;

  const ai=document.getElementById('ai');
  if(ai&&!isDone) ai.addEventListener('keydown',e=>{if(e.key==='Enter')doCheck(key,q);});
  document.getElementById('chk')?.addEventListener('click',()=>doCheck(key,q));
  document.getElementById('shw')?.addEventListener('click',()=>doShow(key,q));
  document.getElementById('rst')?.addEventListener('click',()=>doReset(key,q));
  document.getElementById('hto')?.addEventListener('click',()=>document.getElementById('hbox')?.classList.toggle('on'));
  if(q.t===7&&!isDone){
    document.querySelectorAll('.choice-btn').forEach(el=>el.addEventListener('click',()=>doCheckChoice(key,q,el.dataset.c)));
  }
  if(q.t===4&&!isDone){
    document.querySelectorAll('.wc').forEach(el=>el.addEventListener('click',()=>doPlace(key,q,+el.dataset.wi)));
    document.querySelectorAll('.pc').forEach(el=>el.addEventListener('click',()=>doRemove(key,q,+el.dataset.pos)));
  }
  updateUI();
}

function normP(s) {
  return s.toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i')
    .replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u')
    .replace(/\s+/g,' ').trim();
}
function doPlace(key,q,wi){const st=poolState[key];if(!st)return;const item=st.pool.find(p=>p.i===wi);if(!item||item.used)return;item.used=true;st.ans.push(item);renderQ();}
function doRemove(key,q,pos){const st=poolState[key];if(!st||answered[key]!==undefined)return;st.pool.find(p=>p.i===st.ans[pos].i).used=false;st.ans.splice(pos,1);renderQ();}
function doReset(key,q){if(answered[key]!==undefined)return;poolState[key]={pool:q.words.map((w,i)=>({w,i,used:false})),ans:[]};renderQ();}

function doCheckChoice(key,q,chosen) {
  if(answered[key]!==undefined) return;
  const correctAns = q.a.split('/')[0].trim();
  const isOk = chosen === correctAns;
  q._userAns = chosen;
  answered[key]=isOk;
  if(isOk) correct++;
  else { wrong++; addToLog(key,q,chosen); }
  // 버튼 색 업데이트
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    const c = btn.dataset.c;
    btn.disabled=true;
    if(c===correctAns) btn.classList.add('choice-correct');
    else if(c===chosen&&!isOk) btn.classList.add('choice-wrong');
  });
  updateUI();
  let extraInfo='';
  if(q.t===4&&q.ko) extraInfo=`<div style="font-size:13px;color:var(--text2);margin-top:4px">뜻: ${escHtml(q.ko)}</div>`;
  if(q.t===3&&q.py)extraInfo=`<div style="font-size:13px;color:var(--text2);margin-top:4px">📢 ${escHtml(q.py)}</div>`;
  document.getElementById('rb').innerHTML=`<div class="res ${isOk?'ok':'ng'} on">${isOk?'✓ 정답!':'✗ 오답'} <span class="ans">정답: ${escHtml(q.a)}</span>${extraInfo}</div>`;
  document.getElementById('chk')?.remove();
}

function doCheck(key,q) {
  if(answered[key]!==undefined) return;
  let isOk=false;
  if(q.t===4){
    const st=poolState[key];if(!st||!st.ans.length)return;
    const user=st.ans.map(i=>i.w).join('').replace(/[，。！？\s]/g,'');
    isOk=user===q.a.replace(/[，。！？\s]/g,'');
  } else {
    const ai=document.getElementById('ai');if(!ai||!ai.value.trim())return;
    const user=ai.value.trim(), uN=normP(user);
    const alts=q.a.split('/').map(s=>s.trim());
    isOk=alts.some(alt=>{
      const cn=alt.replace(/[^\u4e00-\u9fff]/g,''), un=user.replace(/[^\u4e00-\u9fff]/g,'');
      if(cn&&un) return cn===un;
      const aN=normP(alt);
      return uN===aN||uN.replace(/\s/g,'')===aN.replace(/\s/g,'');
    });
    if(q.t===5){
      const aFlat=normP(q.a.split('(')[0].split('（')[0]);
      isOk=isOk||normP(user).split(' ').some(w=>w.length>1&&aFlat.includes(w));
    }
    if(q.t===2){
      const aWords=q.a.split(/[,，\s]+/).filter(w=>w.length>1);
      const uWords=user.split(/[,，\s]+/);
      if(!isOk&&aWords.length>0){
        const matched=aWords.filter(aw=>uWords.some(uw=>uw.includes(aw)||aw.includes(uw)));
        isOk=matched.length>=Math.ceil(aWords.length*0.6);
      }
    }
    if(q.t===3&&!isOk){
      const pinyinList=RAW.pinyin[q._l||curLesson]||[];
      const matchPin=pinyinList.find(p=>p[0]===q.a);
      if(matchPin) isOk=normP(user)===normP(matchPin[1])||normP(user).replace(/\s/g,'')===normP(matchPin[1]).replace(/\s/g,'');
      if(!isOk&&q.a.includes('/')){
        const parts=q.a.split('/').map(s=>s.trim());
        isOk=parts.some(p=>normP(user)===normP(p)||normP(user).replace(/\s/g,'')===normP(p).replace(/\s/g,''));
      }
    }
    ai.disabled=true;
  }
  answered[key]=isOk;
  if(isOk) correct++;
  else { wrong++; addToLog(key,q,(q.t===4)?'(어순배열)':(document.getElementById('ai')?.value||'')); }
  updateUI();
  let extraInfo='';
  if(q.t===4&&q.ko) extraInfo=`<div style="font-size:13px;color:var(--text2);margin-top:4px">뜻: ${escHtml(q.ko)}</div>`;
  if(q.t===3&&q.py)extraInfo=`<div style="font-size:13px;color:var(--text2);margin-top:4px">📢 ${escHtml(q.py)}</div>`;
  document.getElementById('rb').innerHTML=`<div class="res ${isOk?'ok':'ng'} on">${isOk?'✓ 정답!':'✗ 오답'} <span class="ans">정답: ${escHtml(q.a)}</span>${extraInfo}</div>`;
  document.getElementById('chk')?.remove();
}
function doShow(key,q){
  if(answered[key]===undefined){answered[key]=false;wrong++;addToLog(key,q,'(정답 보기)');updateUI();}
  const ai=document.getElementById('ai');if(ai)ai.disabled=true;
  let showExtra='';
  if(q.t===4&&q.ko) showExtra=`<div style="font-size:13px;color:var(--text2);margin-top:4px">뜻: ${escHtml(q.ko)}</div>`;
  if(q.t===3&&q.py)showExtra=`<div style="font-size:13px;color:var(--text2);margin-top:4px">📢 ${escHtml(q.py)}</div>`;
  document.getElementById('rb').innerHTML=`<div class="res ng on">정답: <span class="ans">${escHtml(q.a)}</span>${showExtra}</div>`;
  document.getElementById('chk')?.remove();
}
function updateUI(){
  const done=Object.keys(answered).length;
  document.getElementById('sDone').textContent=done;
  document.getElementById('sRight').textContent=correct;
  document.getElementById('sWrong').textContent=wrong;
  document.getElementById('hS').textContent=correct;
  document.getElementById('hD').textContent=done;
  const n=filtered.length,i=curIdx+1;
  document.getElementById('qcnt').textContent=n?`${i} / ${n}`:'';
  const pct=n?Math.round(i/n*100):0;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pPct').textContent=pct+'%';
  document.getElementById('pLbl').textContent=n?`${i}번 문제`:'진행률';
}

function addToLog(key,q,userAns){if(wrongLog.find(w=>w.key===key))return;wrongLog.push({key,q,lesson:q._l||curLesson,userAns,ts:Date.now()});updateLogBadge();}
function removeFromLog(key){wrongLog=wrongLog.filter(w=>w.key!==key);updateLogBadge();renderLog();}
function clearLog(){if(!wrongLog.length)return;if(!confirm(`오답 노트 ${wrongLog.length}개를 모두 삭제할까요?`))return;wrongLog=[];updateLogBadge();renderLog();}
function updateLogBadge(){const n=wrongLog.length;document.getElementById('logCnt').textContent=n;document.getElementById('wlogCntHead').textContent=n+'개';}
function openLog(){logFilter='all';document.querySelectorAll('.wlog-filter').forEach(b=>b.classList.toggle('on',b.dataset.ft==='all'));renderLog();document.getElementById('wlogOverlay').classList.add('on');}
function closeLog(){document.getElementById('wlogOverlay').classList.remove('on');}
function filterLog(ft,btn){logFilter=ft;document.querySelectorAll('.wlog-filter').forEach(b=>b.classList.toggle('on',b===btn));renderLog();}
function renderLog(){
  const body=document.getElementById('wlogBody');
  const list=logFilter==='all'?wrongLog:wrongLog.filter(w=>String(w.q.t)===logFilter);
  if(!list.length){body.innerHTML=`<div class="wlog-empty">${wrongLog.length?'이 유형의 오답이 없어요 🎉':'아직 오답이 없어요 🎉<br><span style="font-size:13px">틀린 문제가 여기에 쌓여요.</span>'}</div>`;return;}
  body.innerHTML=list.slice().reverse().map(w=>{
    const q=w.q,lbl=TYPE_NAME[q.t]||'',lesson=w.lesson||'';
    let qHtml='';
    if(q.t===1) qHtml=`<div class="wi-zh">${escHtml(q.q)}</div><div class="wi-ko">${escHtml(q.kor)}</div>`;
    else if(q.t===2) qHtml=`<div class="wi-zh">${escHtml(q.q)}</div>`;
    else if(q.t===3) qHtml=`<div class="wi-zh" style="font-family:-apple-system,sans-serif;font-size:15px">${escHtml(q.q)}</div>`;
    else if(q.t===4) qHtml=`<div class="wi-zh">${q.words.map(w=>escHtml(w)).join(' / ')}</div>`;
    else if(q.t===5){const hl=escHtml(q.sentence).replace(escHtml(q.key),`<span class="uline">${escHtml(q.key)}</span>`);qHtml=`<div class="wi-zh">${hl}</div>`;}
    else if(q.t===7) qHtml=`<div class="wi-zh">${escHtml(q.q)}</div>`;
    const userTxt=w.userAns&&w.userAns!=='(어순배열)'&&w.userAns!=='(정답 보기)'?`내 답: <span style="text-decoration:line-through;color:var(--text3)">${escHtml(w.userAns)}</span> &nbsp;→&nbsp; `:'';
    return `<div class="wi"><div class="wi-top"><span class="b b-t" style="font-size:10px">${lbl}</span>${lesson?`<span class="b b-l" style="font-size:10px">${lesson}</span>`:''}</div>${qHtml}<div class="wi-ans">${userTxt}<strong>정답: ${escHtml(q.a)}</strong></div><div class="wi-retry"><button class="btn-sm" onclick="goToQ('${escHtml(w.key)}')">문제로 이동</button><button class="btn-sm del" onclick="removeFromLog('${escHtml(w.key)}')">삭제</button></div></div>`;
  }).join('');
}
function exportLog(){
  if(!wrongLog.length){alert('오답이 없어요!');return;}
  const list=logFilter==='all'?wrongLog:wrongLog.filter(w=>String(w.q.t)===logFilter);
  const lines=list.slice().reverse().map(w=>{const q=w.q,lbl=TYPE_NAME[q.t]||'';let qStr=q.q||(q.words?q.words.join(' / '):q.sentence)||'';return `[${w.lesson||''}] ${lbl}\n문제: ${qStr}\n정답: ${q.a}${w.userAns&&w.userAns!=='(어순배열)'&&w.userAns!=='(정답 보기)'?'\n내 답: '+w.userAns:''}\n`;}).join('\n');
  const txt=`중회화 오답 노트 (${list.length}개)\n${'='.repeat(40)}\n\n${lines}`;
  navigator.clipboard.writeText(txt).then(()=>alert('클립보드에 복사됐어요!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('클립보드에 복사됐어요!');});
}
function goToQ(key){
  const entry=wrongLog.find(w=>w.key===key);if(!entry)return;
  closeLog();setLesson(entry.lesson);setType(entry.q.t);
  const idx=filtered.findIndex(q=>getKey(q)===key);
  if(idx>=0){curIdx=idx;renderQ();}
}
function escHtml(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function loadLog(){updateLogBadge();}
init();
loadLog();
document.getElementById('wlogOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('wlogOverlay'))closeLog();});

</script>
</body>
</html>
